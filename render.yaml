services:
  - type: web
    name: bbpms
    runtime: python

    # ✅ FIX: ép Python version
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        generateValue: true

      - key: ENVIRONMENT
        value: production

      - key: OTA_ENABLED
        value: "false"

    # ✅ FIX: tránh build từ source
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt --prefer-binary

    # ✅ OK nhưng có thể tối ưu thêm bên dưới
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
