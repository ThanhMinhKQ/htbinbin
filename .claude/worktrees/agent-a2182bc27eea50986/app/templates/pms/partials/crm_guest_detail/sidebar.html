{# CRM Guest Detail - Sidebar Profile #}

<!-- ════════ LEFT SIDEBAR ════════ -->
<div class="gd-sidebar">

  <!-- Profile Section -->
  <div class="gd-profile-card">
    <div class="gd-profile-avatar-wrap">
      <div class="gd-profile-avatar" :style="'background:' + avatarColor(guest.full_name)">
        <span x-text="(guest.full_name||'?')[0].toUpperCase()"></span>
      </div>
      <template x-if="!guest.is_blacklisted">
        <div class="gd-online-badge"></div>
      </template>
      <template x-if="guest.is_blacklisted">
        <div class="gd-blocked-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
      </template>
    </div>
    <div class="gd-profile-text">
      <h2 class="gd-profile-name" x-text="guest.full_name"></h2>
      <div class="gd-profile-sub">
        <span class="gd-flag" x-text="(guest.nationality || 'VNM').split('-')[0].trim()"></span>
        <span class="gd-country" x-text="guest.nationality ? guest.nationality.split('-').slice(1).join('-').trim() : 'Việt Nam'"></span>
      </div>
    </div>
    <button type="button" class="gd-blacklist-toggle" @click="toggleBlacklist()"
      :class="{ active: guest.is_blacklisted }"
      :title="guest.is_blacklisted ? 'Gỡ khỏi danh sách đen' : 'Đưa vào danh sách đen'">
      <span x-text="guest.is_blacklisted ? 'Gỡ chặn' : 'Blacklist'"></span>
    </button>
  </div>

  <template x-if="guest.risk_flags && (guest.risk_flags.is_blacklisted || guest.risk_flags.has_unpaid_debt)">
    <div class="gd-risk-alert" :class="{ danger: guest.risk_flags.is_blacklisted }">
      <template x-for="w in guest.risk_flags.warnings" :key="w.type">
        <div class="gd-risk-line" x-text="w.message"></div>
      </template>
    </div>
  </template>

  <!-- Membership Card -->
  <div class="gd-membership-card" :style="'--tier-color:' + tierColor(membership?.tier)">
    <div class="gd-mc-top">
      <div class="gd-tier-badge">
        <span class="gd-tier-icon" x-html="tierIcon(membership?.tier)"></span>
        <span class="gd-tier-name" x-text="membership?.tier_display || 'Khách thường'"></span>
      </div>
    </div>

    <div class="gd-mc-stats">
      <div class="gd-mc-stat">
        <span class="gd-mc-stat-value" x-text="fmtMoneyFull(profile?.stats?.total_spent || 0)"></span>
        <span class="gd-mc-stat-label">Chi tiêu</span>
      </div>
      <div class="gd-mc-stat">
        <span class="gd-mc-stat-value" x-text="(profile?.stats?.total_stays || membership?.total_stays || 0)"></span>
        <span class="gd-mc-stat-label">Lưu trú</span>
      </div>
      <div class="gd-mc-stat">
        <span class="gd-mc-stat-value" x-text="(membership?.loyalty_points || 0).toLocaleString('vi-VN')"></span>
        <span class="gd-mc-stat-label">Điểm</span>
      </div>
    </div>

    <template x-if="next_tier">
      <div class="gd-tier-progress">
        <div class="gd-tp-track">
          <div class="gd-tp-fill" :style="'width:' + (next_tier.progress_percent||0) + '%'"></div>
        </div>
        <div class="gd-tp-labels">
          <span>→ <strong x-text="next_tier.tier_display"></strong></span>
          <span x-text="(next_tier.progress_percent||0).toFixed(0) + '%'"></span>
        </div>
      </div>
    </template>
    <template x-if="!next_tier && membership?.tier === 'VIP'">
      <div class="gd-vip-crown">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>VIP - Hạng cao nhất</span>
      </div>
    </template>
  </div>

  <!-- Personal Info -->
  <div class="gd-detail-section">
    <h3 class="gd-section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Thông tin cá nhân
    </h3>
    <div class="gd-detail-grid">
      <div class="gd-detail-row">
        <span class="gd-detail-key">CCCD</span>
        <span class="gd-detail-val" x-text="guest.cccd || '-'"></span>
      </div>
      <div class="gd-detail-row">
        <span class="gd-detail-key">Hạn CCCD</span>
        <span class="gd-detail-val" :class="isExpiringSoon(guest.cccd_expire_date) ? 'gd-expiring' : ''" x-text="fmtDate(guest.cccd_expire_date) || '-'"></span>
      </div>
      <div class="gd-detail-row">
        <span class="gd-detail-key">Giới tính</span>
        <span class="gd-detail-val" x-text="guest.gender || '-'"></span>
      </div>
      <div class="gd-detail-row">
        <span class="gd-detail-key">Ngày sinh</span>
        <span class="gd-detail-val" x-text="fmtDate(guest.date_of_birth)"></span>
      </div>
      <div class="gd-detail-row gd-address-row">
        <span class="gd-detail-key">Địa chỉ</span>
        <span class="gd-detail-val" x-text="guest.address || '-'"></span>
      </div>
    </div>
  </div>

  <!-- Contact Section -->
  <div class="gd-detail-section">
    <h3 class="gd-section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Liên hệ nhanh
    </h3>
    <div class="gd-quick-actions">
      <template x-if="guest.phone">
        <a class="gd-action-chip gd-action-call" :href="'tel:' + guest.phone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span x-text="guest.phone"></span>
        </a>
      </template>
      <template x-if="guest.email">
        <a class="gd-action-chip gd-action-email" :href="'mailto:' + guest.email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span x-text="guest.email"></span>
        </a>
      </template>
    </div>
  </div>

</div>
