{# CRM Guest Detail - Tab Services #}

<!-- ── TAB: Services ── -->
<div class="gd-panel gd-panel-enter" x-show="activeTab === 'services'" x-cloak>
  <template x-if="servicesLoading">
    <div class="gd-loading">
      <div class="gd-spinner"></div> Đang tải...
    </div>
  </template>
  <template x-if="!servicesLoading">
    <div>
      <!-- Service stats -->
      <template x-if="serviceStats && Object.keys(serviceStats.by_category||{}).length > 0">
        <div class="gd-card">
          <div class="gd-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 20V10M12 20V4M6 20v-6" />
            </svg>
            Thống kê dịch vụ
          </div>
          <div style="margin-bottom:16px;font-size:13px;color:var(--crm-text-secondary);">
            Tổng: <span style="font-weight:700;color:var(--crm-text);"
              x-text="fmtMoney(serviceStats.total_spent||0)"></span>
            &nbsp;·&nbsp; <span x-text="(serviceStats.total_services||0) + ' lần sử dụng'"></span>
          </div>
          <div class="gd-svc-bar-wrap">
            <template x-for="[cat, info] in Object.entries(serviceStats.by_category||{})" :key="cat">
              <div class="gd-svc-bar-row">
                <div class="gd-svc-bar-label" x-text="cat"></div>
                <div class="gd-svc-bar-bg">
                  <div class="gd-svc-bar-fill"
                    :style="'width:' + Math.min(100, info.amount / (serviceStats.total_spent||1) * 100) + '%;background:' + svcColor(cat)">
                  </div>
                </div>
                <div class="gd-svc-bar-val" x-text="fmtMoney(info.amount)"></div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Service table -->
      <template x-if="services.length > 0">
        <div class="gd-card" style="padding:0;overflow:hidden;">
          <table class="gd-table">
            <thead>
              <tr>
                <th>Dịch vụ</th>
                <th>Loại</th>
                <th style="text-align:center">SL</th>
                <th style="text-align:right">Tiền</th>
                <th>Phòng</th>
                <th>Ngày</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="sv in services" :key="sv.id">
                <tr>
                  <td style="font-weight:700;" x-text="sv.name"></td>
                  <td><span class="gd-tag" x-text="sv.category"></span></td>
                  <td style="text-align:center" x-text="sv.quantity"></td>
                  <td style="text-align:right" class="gd-money" x-text="fmtMoney(sv.total_amount)"></td>
                  <td x-text="sv.room_number || '-'"></td>
                  <td style="font-size:11px;" x-text="fmtDateTime(sv.used_at)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
      <template x-if="services.length === 0 && !servicesLoading">
        <div class="gd-card">
          <div class="gd-empty">
            <div class="gd-empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </div>
            <div class="gd-empty-text">Chưa sử dụng dịch vụ nào</div>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
