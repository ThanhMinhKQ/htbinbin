{# CRM Guest Detail - Tab Stays #}

<!-- ── TAB: Stays ── -->
<div class="gd-panel gd-panel-enter" x-show="activeTab === 'stays'" x-cloak>
  <!-- Stays Header Stats -->
  <div class="gd-stats-row">
    <div class="gd-stat-item">
      <div class="gd-stat-item-icon" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="gd-stat-item-content">
        <span class="gd-stat-item-label">Tổng lần ở</span>
        <span class="gd-stat-item-value" x-text="profile?.stats?.total_stays || membership?.total_stays || stays.length || 0">0</span>
      </div>
    </div>
    <div class="gd-stat-item">
      <div class="gd-stat-item-icon" style="background:linear-gradient(135deg,#10b981,#059669);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
      </div>
      <div class="gd-stat-item-content">
        <span class="gd-stat-item-label">Tổng đêm</span>
        <span class="gd-stat-item-value" x-text="profile?.stats?.total_nights || membership?.total_nights || 0">0</span>
      </div>
    </div>
    <div class="gd-stat-item">
      <div class="gd-stat-item-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div class="gd-stat-item-content">
        <span class="gd-stat-item-label">Tổng chi tiêu</span>
        <span class="gd-stat-item-value" x-text="fmtMoney(profile?.stats?.total_spent || 0)">0đ</span>
      </div>
    </div>
    <div class="gd-stat-item">
      <div class="gd-stat-item-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="gd-stat-item-content">
        <span class="gd-stat-item-label">TB/Lần ở</span>
        <span class="gd-stat-item-value" x-text="fmtMoney(profile?.stats?.avg_per_stay || 0)">0đ</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <template x-if="staysLoading">
    <div class="gd-loading">
      <div class="gd-spinner"></div> Đang tải lịch sử lưu trú...
    </div>
  </template>

  <!-- Empty -->
  <template x-if="!staysLoading && stays.length === 0">
    <div class="gd-card">
      <div class="gd-empty">
        <div class="gd-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="gd-empty-text">Chưa có lịch sử lưu trú</div>
      </div>
    </div>
  </template>

  <!-- Stays List -->
  <template x-if="!staysLoading && stays.length > 0">
    <div class="gd-stays-list">
      <template x-for="stay in stays" :key="stay.id">
        <div class="gd-stay-card">
          <div class="gd-stay-header">
            <div class="gd-stay-room">
              <span class="gd-stay-room-num" x-text="'P.' + (stay.room_number || '-')">P.101</span>
              <span class="gd-stay-branch" x-text="stay.branch_name || 'Chi nhánh'" x-show="stay.branch_name"></span>
            </div>
            <span class="gd-stay-status" :class="'status-' + (stay.status || 'completed')" x-text="stayStatusLabel(stay.status)">Hoàn thành</span>
          </div>
          
          <div class="gd-stay-dates">
            <div class="gd-stay-date-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>Check-in: <strong x-text="fmtDateTime(stay.check_in_at)"></strong></span>
            </div>
            <div class="gd-stay-date-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>Check-out: <strong x-text="stay.check_out_at ? fmtDateTime(stay.check_out_at) : 'Đang ở'"></strong></span>
            </div>
            <div class="gd-stay-date-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span>Thời lượng: <strong x-text="stay.duration_display || '-'"></strong></span>
            </div>
          </div>
          
          <div class="gd-stay-details">
            <div class="gd-stay-detail-item">
              <span class="gd-stay-detail-label">Đêm ở</span>
              <span class="gd-stay-detail-value" x-text="stay.nights || 0">0</span>
            </div>
            <div class="gd-stay-detail-item">
              <span class="gd-stay-detail-label">Số khách</span>
              <span class="gd-stay-detail-value" x-text="stay.guest_count || 1">1</span>
            </div>
            <div class="gd-stay-detail-item">
              <span class="gd-stay-detail-label">Còn nợ</span>
              <span class="gd-stay-detail-value" :class="{ 'gd-debt-text': (stay.debt_amount || 0) > 0 }" x-text="fmtMoney(stay.debt_amount || 0)">0đ</span>
            </div>
          </div>

          <template x-if="stayActivities(stay).length > 0">
            <div class="gd-stay-timeline">
              <div class="gd-stay-timeline-title">Timeline</div>
              <template x-for="a in stayActivities(stay)" :key="a.id">
                <div class="gd-stay-timeline-item">
                  <span class="gd-stay-timeline-dot" :class="a.activity_group || 'system'"></span>
                  <div class="gd-stay-timeline-body">
                    <div class="gd-stay-timeline-head">
                      <strong x-text="a.title || a.activity_type"></strong>
                      <span x-text="fmtDateTime(a.created_at)"></span>
                    </div>
                    <div class="gd-stay-timeline-desc" x-text="a.description || ''"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>
          
          <div class="gd-stay-footer">
            <div class="gd-stay-amount">
              <span class="gd-stay-amount-label">Tổng tiền</span>
              <span class="gd-stay-amount-value" x-text="fmtMoney(stay.final_amount || 0)">0đ</span>
            </div>
            <div class="gd-stay-payment">
              <span class="gd-stay-payment-method" x-text="fmtPaymentMethod(stay.payment_methods)">-</span>
            </div>
          </div>
        </div>
      </template>
      
      <!-- Pagination -->
      <div class="gd-stays-pagination" x-show="staysMeta.pages > 1">
        <button class="gd-page-btn" :disabled="staysMeta.page <= 1" @click="loadStays(staysMeta.page - 1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15,18 9,12 15,6"/></svg>
          Trước
        </button>
        <span class="gd-page-info">
          Trang <strong x-text="staysMeta.page">1</strong> / <strong x-text="staysMeta.pages">1</strong>
        </span>
        <button class="gd-page-btn" :disabled="staysMeta.page >= staysMeta.pages" @click="loadStays(staysMeta.page + 1)">
          Sau
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
      </div>
    </div>
  </template>
</div>
