<div class="bk-modal" id="bk-assign-modal">
  <div class="bk-dialog" style="max-width:620px;">
    <div class="bk-dialog-head">
      <div>
        <h2>Gán phòng</h2>
        <p id="bk-assign-sub">Chọn phòng trống đúng loại phòng đã đặt.</p>
      </div>
      <button class="bk-close" type="button" onclick="BookingHub.closeAssign()">×</button>
    </div>
    <div class="bk-dialog-body">
      <div class="bk-loading" id="bk-assign-loading">
        <div class="bk-skeleton"></div>
        <div class="bk-skeleton"></div>
      </div>
      <div class="bk-assign-list" id="bk-assign-list"></div>
    </div>
    <div class="bk-dialog-foot">
      <button class="bk-btn" type="button" onclick="BookingHub.closeAssign()">Đóng</button>
      <button class="bk-btn primary" id="bk-assign-submit" type="button" onclick="BookingHub.assignRoom()" disabled>Xác nhận gán phòng</button>
    </div>
  </div>
</div>
