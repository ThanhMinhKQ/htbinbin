<div class="bk-modal bk-detail-modal" id="bk-detail-modal">
  <div class="bk-dialog bk-detail-dialog">
    <div class="bk-detail-hero">
      <div class="bk-detail-tools">
        <button class="bk-detail-tool bk-detail-capture-tool" id="bk-detail-capture-btn" type="button" onclick="BookingHub.captureDetailImage()" aria-label="Chụp ảnh xác nhận">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8a2 2 0 0 1 2-2h2l1.4-2h5.2L16 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z"/><circle cx="12" cy="13" r="3.5"/></svg>
          <span>Ảnh</span>
        </button>
        <button class="bk-detail-tool bk-detail-print-tool" id="bk-detail-print-btn" type="button" onclick="BookingHub.openConfirmationPrint()" aria-label="In hoặc lưu PDF">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/></svg>
          <span>PDF</span>
        </button>
      </div>
      <button class="bk-detail-close" type="button" onclick="BookingHub.closeDetail()" aria-label="Đóng">×</button>
      <div class="bk-detail-hero-row">
        <div class="bk-detail-hero-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/><path d="m9 15 2 2 4-5"/></svg></div>
        <div>
          <div class="bk-detail-kicker">Chi tiết đặt phòng</div>
          <h2 id="bk-detail-title">Đang tải...</h2>
        </div>
      </div>
      <div class="bk-detail-hero-meta" id="bk-detail-hero-meta">
        <span>Booking</span>
      </div>
    </div>
    <div class="bk-dialog-body bk-detail-body" id="bk-detail-body">
      <div class="bk-loading" style="display:flex;">
        <div class="bk-skeleton"></div>
        <div class="bk-skeleton"></div>
      </div>
    </div>
    <div class="bk-dialog-foot bk-detail-foot" id="bk-detail-actions">
      <button class="bk-btn" type="button" onclick="BookingHub.closeDetail()">Đóng</button>
    </div>
  </div>
</div>

<div class="bk-modal" id="bk-ota-confirm-modal">
  <div class="bk-dialog bk-ota-confirm-dialog">
    <div class="bk-dialog-head">
      <div>
        <h2>Chọn loại phòng nội bộ để xác nhận OTA</h2>
        <p id="bk-ota-confirm-title">Booking OTA</p>
      </div>
      <button type="button" onclick="BookingHub.closeOtaConfirm()" aria-label="Đóng">×</button>
    </div>
    <div class="bk-dialog-body">
      <div class="bk-ota-confirm-meta" id="bk-ota-confirm-meta"></div>
      <div class="bk-loading" id="bk-ota-confirm-loading" style="display:none;">
        <div class="bk-skeleton"></div>
        <div class="bk-skeleton"></div>
      </div>
      <div class="bk-ota-confirm-list" id="bk-ota-confirm-list"></div>
    </div>
    <div class="bk-dialog-foot">
      <button class="bk-btn" type="button" onclick="BookingHub.closeOtaConfirm()">Đóng</button>
      <button class="bk-btn primary" id="bk-ota-confirm-submit" type="button" onclick="BookingHub.confirmOtaWithRoomType()" disabled>Xác nhận đặt phòng</button>
    </div>
  </div>
</div>
