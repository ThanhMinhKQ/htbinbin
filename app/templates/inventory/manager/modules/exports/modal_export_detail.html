<div x-show="isExportDetailModalOpen" style="display: none; z-index: 12000;" class="fixed inset-0 overflow-y-auto"
    aria-modal="true" x-cloak>
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" @click="closeExportDetailModal()">
    </div>

    <!-- Modal Panel -->
    <div class="flex items-center justify-center min-h-screen p-4">
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl transform transition-all w-full max-w-5xl flex flex-col max-h-[90vh] animate-scale-in">

            <!-- Header -->
            <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-t-2xl shrink-0 flex items-center justify-between">
                <div class="flex items-center gap-2.5 min-w-0">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 shrink-0">Xuất kho</span>
                    <h3 class="text-sm font-black text-slate-900 dark:text-white tracking-tight font-mono truncate"
                        x-text="exportDetail?.code"></h3>
                    <span x-show="exportDetail?.status"
                        class="shrink-0 rounded-full border px-2 py-0.5 text-[10px] font-bold"
                        :class="{
                            'border-yellow-200 bg-yellow-50 text-yellow-700 dark:border-yellow-800 dark:bg-yellow-950/40 dark:text-yellow-300': exportDetail?.status === 'SHIPPING',
                            'border-emerald-200 bg-emerald-50 text-emerald-700 dark:border-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-300': exportDetail?.status === 'COMPLETED'
                        }"
                        x-text="exportDetail?.status === 'SHIPPING' ? 'Đang giao' : (exportDetail?.status === 'COMPLETED' ? 'Hoàn thành' : exportDetail?.status)">
                    </span>
                </div>
                <div class="flex items-center gap-0.5 shrink-0">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-5xl'))"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white"
                        title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeExportDetailModal()"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Metadata Section -->
            <div class="px-3 pt-3 sm:px-4 sm:pt-4">
                <section class="rounded-xl border border-slate-200/80 bg-white p-4 dark:border-slate-700/50 dark:bg-slate-800/50">
                    <div class="flex flex-wrap items-stretch gap-3">
                        <div class="flex min-w-[140px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Luồng hàng</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="(exportDetail?.source_warehouse_name || '---') + ' → ' + (exportDetail?.branch_name || '---')"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[130px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Thời gian tạo</div>
                                <div class="mt-0.5 truncate font-mono text-[13px] font-bold text-slate-900 dark:text-white" x-text="formatDate(exportDetail?.created_at)"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[100px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Tổng SP</div>
                                <div class="mt-0.5 font-mono text-[13px] font-bold text-slate-900 dark:text-white" x-text="(exportDetail?.items?.length || 0) + ' loại'"></div>
                            </div>
                        </div>
                    </div>
                    <div x-show="exportDetail?.notes" class="mt-3 flex items-start gap-2.5 rounded-lg bg-slate-50 px-3.5 py-2.5 border border-slate-200/70 dark:bg-slate-800/60 dark:border-slate-600/20">
                        <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-500 dark:bg-slate-700 dark:text-slate-400">
                            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                        </div>
                        <div class="min-w-0 text-[13px] leading-relaxed text-slate-700 dark:text-slate-300" x-text="exportDetail?.notes"></div>
                    </div>
                </section>
            </div>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-y-auto p-0 flex flex-col"
                x-show="!loadingExportDetail">
                <div class="p-3 sm:p-4 flex-1">
                <section class="overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
                    <div class="max-h-[42vh] overflow-y-auto overflow-x-auto">
                        <table class="min-w-[600px] w-full table-fixed border-collapse text-left text-sm">
                            <colgroup>
                                <col class="w-[30px]">
                                <col class="w-auto">
                                <col class="w-[62px]">
                                <col class="w-[88px]">
                            </colgroup>
                            <thead>
                                <tr class="bg-slate-100 text-[11px] font-bold uppercase tracking-wide text-slate-600 dark:bg-slate-900 dark:text-slate-300">
                                    <th class="border-b border-r border-slate-200 px-1.5 py-2 text-center text-slate-400 dark:border-slate-800 dark:text-slate-500">#</th>
                                    <th class="border-b border-r border-slate-200 px-4 py-2 text-left text-slate-700 dark:border-slate-800 dark:text-slate-200">Tên hàng hóa / Vật tư</th>
                                    <th class="border-b border-r border-slate-200 px-2 py-2 text-left text-slate-500 dark:border-slate-800 dark:text-slate-400">ĐVT</th>
                                    <th class="border-b border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Số lượng</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(item, idx) in (exportDetail?.items || [])" :key="item.id">
                                    <tr class="bg-white hover:bg-slate-50 dark:bg-slate-950 dark:hover:bg-slate-900/70">
                                        <td class="border-b border-r border-slate-200 px-1.5 py-3 text-center font-mono text-xs text-slate-400 dark:border-slate-800 dark:text-slate-500" x-text="idx + 1"></td>
                                        <td class="border-b border-r border-slate-200 px-4 py-3 dark:border-slate-800">
                                            <div class="whitespace-normal break-words text-[13px] font-semibold leading-snug text-slate-950 dark:text-white" x-text="item.product_name"></div>
                                            <div class="mt-1 text-xs font-medium text-slate-500 dark:text-slate-400" x-text="item.category_name || 'Khác'"></div>
                                        </td>
                                        <td class="border-b border-r border-slate-200 px-2 py-3 text-left text-xs font-semibold text-slate-500 dark:border-slate-800 dark:text-slate-300" x-text="item.request_unit || '---'"></td>
                                        <td class="border-b border-slate-200 px-2 py-3 text-center font-mono text-sm font-black tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.approved_quantity"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>
                </div>
            </div>

            <!-- Loading State -->
            <div x-show="loadingExportDetail" class="flex-1 flex items-center justify-center min-h-[300px]">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600"></div>
            </div>

            <!-- Footer Actions -->
            <div
                class="inv-detail-footer px-6 py-3 border-t dark:border-slate-700 flex justify-end shrink-0 rounded-b-2xl gap-3">
                <button x-show="exportDetail?.status === 'SHIPPING'" @click="openExportEditModal(exportDetail.id)"
                    class="px-5 py-2 rounded-lg border border-amber-300 bg-amber-50 text-amber-700 font-bold hover:bg-amber-100 transition text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Chỉnh sửa
                </button>
                <button @click="closeExportDetailModal()"
                    class="px-5 py-2 rounded-lg border border-slate-300 text-slate-600 font-bold hover:bg-slate-50 transition text-sm">
                    Đóng
                </button>
            </div>

        </div>
    </div>
</div>
