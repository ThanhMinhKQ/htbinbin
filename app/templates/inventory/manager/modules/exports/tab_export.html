<div x-show="currentTab === 'export'" class="inv-tab-page" x-cloak>
    <div class="inv-tab-header">
        <div>
            <p class="inv-tab-eyebrow">Xuất kho</p>
            <h2 class="inv-tab-title">Xuất trực tiếp</h2>
            <p class="inv-tab-copy">Xuất hàng từ kho nguồn, theo dõi phiếu đang giao và lịch sử hoàn tất theo chi nhánh nhận.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <button @click="resetExportDateFilter()" class="inv-btn-secondary" title="Reset về tháng hiện tại">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Tháng này
            </button>
            <button @click="openDirectExportModal()" class="inv-btn-primary">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4v16m8-8H4" />
                </svg>
                Tạo phiếu xuất
            </button>
        </div>
    </div>

    <div class="inv-kpi-grid">
        <div class="inv-kpi-card">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="inv-kpi-label">Tổng phiếu xuất</p>
                    <p class="inv-kpi-value text-red-600 dark:text-red-300" x-text="totalExportRecords || 0"></p>
                </div>
                <div class="h-10 w-10 rounded-lg bg-red-50 text-red-600 flex items-center justify-center dark:bg-red-900/30 dark:text-red-300">
                    <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>
            </div>
        </div>
        <div class="inv-kpi-card">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="inv-kpi-label">Đang hiển thị</p>
                    <p class="inv-kpi-value" x-text="exportsList.length || 0"></p>
                </div>
                <div class="h-10 w-10 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center dark:bg-slate-800 dark:text-slate-300">
                    <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M4 6h16M4 10h16M4 14h10M4 18h10" />
                    </svg>
                </div>
            </div>
        </div>
        <div class="inv-kpi-card">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="inv-kpi-label">Đang giao</p>
                    <p class="inv-kpi-value text-amber-600 dark:text-amber-300"
                        x-text="exportsList.filter(r => r.status === 'SHIPPING').length"></p>
                </div>
                <div class="h-10 w-10 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center dark:bg-amber-950/50 dark:text-amber-300">
                    <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>
        <div class="inv-kpi-card">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="inv-kpi-label">Hoàn tất</p>
                    <p class="inv-kpi-value text-emerald-600 dark:text-emerald-300"
                        x-text="exportsList.filter(r => r.status === 'COMPLETED').length"></p>
                </div>
                <div class="h-10 w-10 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center dark:bg-emerald-950/50 dark:text-emerald-300">
                    <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div class="inv-toolbar">
        <div class="inv-status-strip mb-3">
            <button type="button" @click="exportFilters.status = ''; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === '' }"
                class="inv-status-chip">
                Tất cả
            </button>
            <button type="button" @click="exportFilters.status = 'SHIPPING'; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === 'SHIPPING' }"
                class="inv-status-chip">
                Đang giao
            </button>
            <button type="button" @click="exportFilters.status = 'COMPLETED'; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === 'COMPLETED' }"
                class="inv-status-chip">
                Hoàn tất
            </button>
        </div>

        <div class="flex flex-col lg:flex-row gap-4 justify-between items-center">
            <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto flex-1 flex-wrap">
                <div class="relative w-full sm:w-64">
                    <input type="text" x-model="exportFilters.search" @keydown.enter="fetchExports(1)"
                        class="inv-field-search"
                        placeholder="Tìm mã phiếu, ghi chú...">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>

                <select x-model="exportFilters.status" @change="fetchExports(1)" class="inv-field w-full sm:w-40">
                    <option value="">Tất cả trạng thái</option>
                    <option value="COMPLETED">Hoàn tất</option>
                    <option value="SHIPPING">Đang giao</option>
                </select>

                <input type="date" x-model="exportFilters.date_from" @change="fetchExports(1)"
                    class="inv-field w-full sm:w-40"
                    placeholder="Từ ngày">

                <input type="date" x-model="exportFilters.date_to" @change="fetchExports(1)"
                    class="inv-field w-full sm:w-40"
                    placeholder="Đến ngày">

                <button @click="fetchExports(1)" class="inv-btn-secondary">
                    Lọc
                </button>

                <button @click="resetExportDateFilter()" class="inv-btn-secondary" title="Reset về tháng hiện tại">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <div class="flex items-center gap-2 w-full lg:w-auto justify-end">
                <button @click="openDirectExportModal()" class="inv-btn-primary">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4v16m8-8H4" />
                    </svg>
                    Tạo phiếu xuất
                </button>
            </div>
        </div>
    </div>

    <div class="inv-table-card">
        <div class="inv-table-scroll">
            <div x-show="loadingExports"
                class="absolute inset-0 bg-white/50 dark:bg-slate-900/50 z-20 flex items-center justify-center backdrop-blur-sm">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
            </div>

            <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400 border-collapse">
                <thead class="inv-table-head">
                    <tr>
                        <th class="px-4 py-3 text-left cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors group"
                            @click="sortExports('code')">
                            <div class="flex items-center gap-1">
                                Mã phiếu
                                <span class="text-slate-400" :class="{'text-red-600': exportSort.column === 'code'}">
                                    <svg x-show="exportSort.column !== 'code'" class="w-3 h-3" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                                    </svg>
                                    <svg x-show="exportSort.column === 'code' && exportSort.order === 'asc'"
                                        class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4h13M3 8h9m-9 4h6m4 0l4 4m0 0l4 4m-4-4v12" />
                                    </svg>
                                    <svg x-show="exportSort.column === 'code' && exportSort.order === 'desc'"
                                        class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4h13M3 8h9m-9 4h6m4 0l4 4m0 0l4 4m-4-4v12"
                                            style="transform: scaleY(-1); transform-origin: center;" />
                                    </svg>
                                </span>
                            </div>
                        </th>
                        <th class="px-4 py-3 text-left cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="sortExports('created_at')">
                            <div class="flex items-center gap-1">
                                Ngày tạo
                                <span class="text-slate-400"
                                    :class="{'text-red-600': exportSort.column === 'created_at'}">
                                    <svg x-show="exportSort.column !== 'created_at'" class="w-3 h-3" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                                    </svg>
                                    <svg x-show="exportSort.column === 'created_at' && exportSort.order === 'asc'"
                                        class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" />
                                    </svg>
                                    <svg x-show="exportSort.column === 'created_at' && exportSort.order === 'desc'"
                                        class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4h13M3 8h9m-9 4h6m4 0l4 4m0 0l4 4m-4-4v12"
                                            style="transform: scaleY(-1); transform-origin: center;" />
                                    </svg>
                                </span>
                            </div>
                        </th>
                        <th class="px-4 py-3 text-left">Chi nhánh nhận</th>
                        <th class="px-4 py-3 text-center">Trạng thái</th>
                        <th class="px-4 py-3 text-left">Ghi chú</th>
                        <th class="px-4 py-3 text-right">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="r in exportsList" :key="r.id">
                        <tr class="inv-row cursor-pointer" @click="openExportDetail(r.id)">
                            <td class="px-4 py-3 font-mono text-red-600 dark:text-red-300 font-bold" x-text="r.code"></td>
                            <td class="px-4 py-3 text-slate-500" x-text="formatDate(r.created_at)"></td>
                            <td class="px-4 py-3 font-medium text-slate-800 dark:text-slate-200" x-text="r.branch_name"></td>
                            <td class="px-4 py-3 text-center">
                                <span class="px-2 py-0.5 rounded text-xs font-bold border" :class="{
                                        'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-900/60': r.status === 'SHIPPING',
                                        'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-950/40 dark:text-emerald-300 dark:border-emerald-900/60': r.status === 'COMPLETED'
                                    }"
                                    x-text="r.status === 'SHIPPING' ? 'Đang giao' : (r.status === 'COMPLETED' ? 'Hoàn tất' : r.status)">
                                </span>
                            </td>
                            <td class="px-4 py-3 text-slate-500 italic truncate max-w-xs" x-text="r.notes"></td>
                            <td class="px-4 py-3 text-right">
                                <button type="button" @click.stop="openExportDetail(r.id)"
                                    class="inv-action-chip inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold shadow-sm transition hover:bg-slate-100 dark:hover:bg-slate-800">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    Chi tiết
                                </button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="exportsList.length === 0 && !loadingExports">
                        <td colspan="6" class="p-12 text-center text-slate-400">
                            <div class="inv-empty-state">
                                <div class="inv-empty-icon">
                                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                            d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14" />
                                    </svg>
                                </div>
                                <span>Chưa có lịch sử xuất hàng nào.</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div
            class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="text-sm text-slate-500" id="export-record-count"></div>
                <select x-model="exportPerPage" @change="fetchExports(1)"
                    class="ml-2 text-sm border-slate-200 dark:border-slate-700 rounded-lg focus:ring-red-500 bg-white dark:bg-slate-800">
                    <option value="10">10 / trang</option>
                    <option value="50">50 / trang</option>
                    <option value="100">100 / trang</option>
                </select>
            </div>

            <div id="export-pagination-controls" class="flex items-center gap-1" x-show="totalExportPages > 1"></div>
        </div>
    </div>
</div>
