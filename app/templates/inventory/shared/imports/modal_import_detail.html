<div x-show="isImportDetailModalOpen" style="display: none;" class="fixed inset-0 z-[80] overflow-y-auto"
    aria-modal="true" x-cloak>
    <!-- Backdrop -->
    <div x-show="isImportDetailModalOpen" x-transition:enter="ease-out duration-300"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
        @click="closeImportDetailModal()">
    </div>

    <!-- Modal Panel -->
    <div class="flex items-center justify-center min-h-screen p-4">
        <div x-show="isImportDetailModalOpen" x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl transform transition-all w-full max-w-5xl flex flex-col max-h-[90vh]">

            <!-- Header -->
            <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-t-2xl shrink-0 flex items-center justify-between">
                <div class="flex items-center gap-2.5 min-w-0">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 shrink-0">Nhập kho</span>
                    <h3 class="text-sm font-black text-slate-900 dark:text-white tracking-tight font-mono truncate"
                        x-text="importDetail?.code"></h3>
                    <span class="shrink-0 rounded-full border border-emerald-200 bg-emerald-50 px-2 py-0.5 text-[10px] font-bold text-emerald-700 dark:border-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-300">
                        Đã Nhập Kho
                    </span>
                </div>
                <div class="flex items-center gap-0.5 shrink-0">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-5xl'))"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white"
                        title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeImportDetailModal()"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Metadata Section -->
            <div class="px-3 pt-3 sm:px-4 sm:pt-4">
                <section class="rounded-xl border border-slate-200/80 bg-white p-4 dark:border-slate-700/50 dark:bg-slate-800/50">
                    <div class="flex flex-wrap items-stretch gap-3">
                        <div class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Nhà cung cấp</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="importDetail?.supplier_name || '---'"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Người tạo</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="importDetail?.creator_name || '---'"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[130px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Thời gian tạo</div>
                                <div class="mt-0.5 truncate font-mono text-[13px] font-bold text-slate-900 dark:text-white" x-text="formatDate(importDetail?.created_at)"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[100px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Tổng tiền</div>
                                <div class="mt-0.5 truncate font-mono text-[13px] font-bold text-emerald-700 dark:text-emerald-400" x-text="formatMoney(importDetail?.total_amount)"></div>
                            </div>
                        </div>
                    </div>
                    <div x-show="importDetail?.notes" class="mt-3 flex items-start gap-2.5 rounded-lg bg-slate-50 px-3.5 py-2.5 border border-slate-200/70 dark:bg-slate-800/60 dark:border-slate-600/20">
                        <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-500 dark:bg-slate-700 dark:text-slate-400">
                            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                        </div>
                        <div class="min-w-0 text-[13px] leading-relaxed text-slate-700 dark:text-slate-300" x-text="importDetail?.notes"></div>
                    </div>
                </section>
            </div>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-y-auto p-0 flex flex-col"
                x-show="!loadingImportDetail">
                <div class="p-3 sm:p-4 space-y-4 flex-1">
                <section class="overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
                    <div class="max-h-[42vh] overflow-y-auto overflow-x-auto">
                        <table class="min-w-[680px] w-full table-fixed border-collapse text-left text-sm">
                            <colgroup>
                                <col class="w-[30px]">
                                <col class="w-auto">
                                <col class="w-[62px]">
                                <col class="w-[78px]">
                                <col class="w-[100px]">
                                <col class="w-[110px]">
                            </colgroup>
                            <thead>
                                <tr class="bg-slate-100 text-[11px] font-bold uppercase tracking-wide text-slate-600 dark:bg-slate-900 dark:text-slate-300">
                                    <th class="border-b border-r border-slate-200 px-1.5 py-2 text-center text-slate-400 dark:border-slate-800 dark:text-slate-500">#</th>
                                    <th class="border-b border-r border-slate-200 px-4 py-2 text-left text-slate-700 dark:border-slate-800 dark:text-slate-200">Tên hàng hóa / Vật tư</th>
                                    <th class="border-b border-r border-slate-200 px-2 py-2 text-left text-slate-500 dark:border-slate-800 dark:text-slate-400">ĐVT</th>
                                    <th class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">SL</th>
                                    <th class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Đơn giá</th>
                                    <th class="border-b border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(item, idx) in (importDetail?.items || [])" :key="item.id">
                                    <tr class="bg-white hover:bg-slate-50 dark:bg-slate-950 dark:hover:bg-slate-900/70">
                                        <td class="border-b border-r border-slate-200 px-1.5 py-3 text-center font-mono text-xs text-slate-400 dark:border-slate-800 dark:text-slate-500" x-text="idx + 1"></td>
                                        <td class="border-b border-r border-slate-200 px-4 py-3 dark:border-slate-800">
                                            <div class="whitespace-normal break-words text-[13px] font-semibold leading-snug text-slate-950 dark:text-white" x-text="item.product_name"></div>
                                            <div class="mt-1 text-xs font-medium text-slate-500 dark:text-slate-400" x-text="item.category_name || 'Khác'"></div>
                                        </td>
                                        <td class="border-b border-r border-slate-200 px-2 py-3 text-left text-xs font-semibold text-slate-500 dark:border-slate-800 dark:text-slate-300" x-text="item.unit || '---'"></td>
                                        <td class="border-b border-r border-slate-200 px-2 py-3 text-center font-mono text-sm font-black tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.quantity"></td>
                                        <td class="border-b border-r border-slate-200 px-2 py-3 text-center font-mono text-xs font-semibold text-slate-600 dark:border-slate-800 dark:text-slate-300" x-text="formatMoney(item.unit_price)"></td>
                                        <td class="border-b border-slate-200 px-2 py-3 text-center font-mono text-sm font-bold text-emerald-700 dark:border-slate-800 dark:text-emerald-400" x-text="formatMoney(item.total_price)"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>

                    <!-- Images Section -->
                    <div x-show="importDetail?.images && importDetail.images.length > 0"
                        class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900/60">
                        <div class="mb-3 flex items-center justify-between gap-3">
                            <h4 class="text-xs font-black uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">Hình ảnh đính kèm</h4>
                            <span class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-bold text-slate-500 dark:bg-slate-800 dark:text-slate-300" x-text="(importDetail?.images?.length || 0) + ' ảnh'"></span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4">
                            <template x-for="(img, index) in (importDetail?.images || [])" :key="img.id">
                                <button type="button" class="group relative aspect-[4/3] overflow-hidden rounded-lg border border-slate-200 bg-slate-100 transition hover:border-blue-400 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:border-slate-700 dark:bg-slate-800 dark:focus:ring-offset-slate-950" @click="viewImage(img)">
                                    <img :src="((img.thumbnail_path || img.file_path) && (img.thumbnail_path || img.file_path).startsWith('http')) ? (img.thumbnail_path || img.file_path) : ((img.thumbnail_path && img.thumbnail_path.startsWith('/') ? '' : '/') + (img.thumbnail_path || img.file_path))" class="h-full w-full object-cover transition duration-200 group-hover:scale-105">
                                    <span class="absolute inset-0 flex items-center justify-center bg-black/0 transition group-hover:bg-black/25">
                                        <svg class="h-7 w-7 text-white opacity-0 drop-shadow transition group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m1.1-5.4a6.5 6.5 0 11-13 0 6.5 6.5 0 0113 0z" /></svg>
                                    </span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>



            <!-- Loading State -->
            <div x-show="loadingImportDetail" class="flex-1 flex items-center justify-center min-h-[300px]">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            </div>

            <!-- Footer Actions -->
            <div
                class="inv-detail-footer px-6 py-3 border-t dark:border-slate-700 flex justify-end shrink-0 rounded-b-2xl gap-3">
                <button @click="openEditImportModal(importDetail?.id)"
                    class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg font-bold shadow-md transition-transform active:scale-95 flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Chỉnh sửa
                </button>
                <button @click="closeImportDetailModal()"
                    class="px-5 py-2 rounded-lg border border-slate-300 text-slate-600 font-bold hover:bg-slate-50 transition text-sm">
                    Đóng
                </button>
            </div>

        </div>
    </div>
</div>
