<!-- MODAL: CHI TIẾT LỊCH SỬ YÊU CẦU -->
<div x-show="viewingRequestTicket" style="display: none; z-index: 12000;" class="fixed inset-0 isolate overflow-y-auto" aria-modal="true" x-cloak
     x-data="{
         getRequestStatusInfo() {
             const status = this.viewingRequestTicket?.status;
             const normalized = typeof normalizeTicketStatus === 'function' ? normalizeTicketStatus(status) : status;
             return { isShipping: normalized === 'SHIPPING', isCompleted: normalized === 'COMPLETED' };
         }
     }">
    <div class="fixed inset-0 z-0 bg-slate-950/55 backdrop-blur-[2px]" @click="closeRequestDetailModal()"></div>

    <div class="relative z-10 flex min-h-screen items-center justify-center p-3 sm:p-5">
        <div class="flex max-h-[92vh] w-full max-w-5xl flex-col overflow-hidden rounded-xl border border-slate-200 bg-white shadow-2xl dark:border-slate-800 dark:bg-slate-950">
            <header class="shrink-0 border-b border-slate-200 bg-white px-5 py-4 dark:border-slate-800 dark:bg-slate-900">
                <div class="flex items-start justify-between gap-4">
                    <div class="min-w-0">
                        <div class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">Phiếu yêu cầu kho</div>
                        <div class="mt-1 flex flex-wrap items-center gap-2">
                            <h2 class="truncate font-mono text-xl font-black tracking-tight text-slate-950 dark:text-white" x-text="viewingRequestTicket?.code || '---'"></h2>
                            <span class="rounded-full border border-slate-300 bg-slate-100 px-2.5 py-1 text-[11px] font-bold text-slate-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200" x-text="getStatusLabel(viewingRequestTicket?.status)"></span>
                            <span x-show="viewingRequestTicket?.code?.includes('REQ_COMP')" class="rounded-full border border-slate-300 px-2.5 py-1 text-[11px] font-bold text-slate-600 dark:border-slate-700 dark:text-slate-300">Bù hàng</span>
                        </div>
                    </div>
                    <div class="flex shrink-0 items-center gap-1">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-5xl'))" class="rounded-lg p-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-white" title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeRequestDetailModal()" class="rounded-lg p-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto bg-slate-50 p-3 dark:bg-slate-950 sm:p-4">
                <section class="grid gap-2 rounded-lg border border-slate-200 bg-white p-3 dark:border-slate-700 dark:bg-slate-900 sm:grid-cols-2 lg:grid-cols-4">
                    <div class="min-w-0 rounded-md bg-slate-50 px-3 py-2 dark:bg-slate-800/80">
                        <div class="text-[10px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Luồng hàng</div>
                        <div class="mt-1 truncate text-sm font-bold text-slate-950 dark:text-white" x-text="(viewingRequestTicket?.source_warehouse_name || '---') + ' → ' + (viewingRequestTicket?.branch_name || '---')"></div>
                    </div>
                    <div class="min-w-0 rounded-md bg-slate-50 px-3 py-2 dark:bg-slate-800/80">
                        <div class="text-[10px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Người lập</div>
                        <div class="mt-1 truncate text-sm font-semibold text-slate-950 dark:text-white" x-text="viewingRequestTicket?.requester_name || '---'"></div>
                    </div>
                    <div class="min-w-0 rounded-md bg-slate-50 px-3 py-2 dark:bg-slate-800/80" x-show="viewingRequestTicket?.approver_name">
                        <div class="text-[10px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Người duyệt</div>
                        <div class="mt-1 truncate text-sm font-semibold text-slate-950 dark:text-white" x-text="viewingRequestTicket?.approver_name"></div>
                    </div>
                    <div class="min-w-0 rounded-md bg-slate-50 px-3 py-2 dark:bg-slate-800/80">
                        <div class="text-[10px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400">Thời gian tạo</div>
                        <div class="mt-1 truncate font-mono text-sm font-semibold text-slate-950 dark:text-white" x-text="formatDate(viewingRequestTicket?.created_at)"></div>
                    </div>
                    <div x-show="viewingRequestTicket?.notes || viewingRequestTicket?.approver_notes" class="rounded-md bg-slate-50 px-3 py-2 text-sm text-slate-800 dark:bg-slate-800/80 dark:text-slate-200 sm:col-span-2 lg:col-span-4">
                        <span class="font-bold text-slate-950 dark:text-white">Ghi chú:</span>
                        <span x-show="viewingRequestTicket?.notes" x-text="viewingRequestTicket?.notes"></span>
                        <span x-show="viewingRequestTicket?.approver_notes" x-text="' / ' + viewingRequestTicket?.approver_notes"></span>
                    </div>
                </section>

                <section class="mt-4 overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
                    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3 dark:border-slate-800">
                        <h3 class="text-xs font-black uppercase tracking-[0.18em] text-slate-600 dark:text-slate-300">Danh sách vật tư</h3>
                        <span class="text-xs font-semibold text-slate-500" x-text="(viewingRequestTicket?.items || []).length + ' dòng'"></span>
                    </div>
                    <table class="w-full table-fixed border-collapse text-left text-sm">
                        <colgroup>
                            <col class="w-[34px]">
                            <col class="min-w-[240px]">
                            <col class="w-[62px]">
                            <col x-show="!getRequestStatusInfo().isShipping" class="w-[88px]">
                            <col x-show="getRequestStatusInfo().isShipping || getRequestStatusInfo().isCompleted" class="w-[88px]">
                            <col x-show="getRequestStatusInfo().isCompleted" class="w-[88px]">
                            <col x-show="getRequestStatusInfo().isCompleted" class="w-[126px]">
                        </colgroup>
                        <thead>
                            <tr class="bg-slate-100 text-[11px] font-bold uppercase tracking-wide text-slate-600 dark:bg-slate-900 dark:text-slate-300">
                                <th class="border-b border-r border-slate-200 px-1.5 py-2 text-center text-slate-400 dark:border-slate-800 dark:text-slate-500">#</th>
                                <th class="border-b border-r border-slate-200 px-4 py-2 text-left text-slate-700 dark:border-slate-800 dark:text-slate-200">Tên hàng hóa / Vật tư</th>
                                <th class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">ĐVT</th>
                                <th x-show="!getRequestStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-2 text-right text-slate-500 dark:border-slate-800 dark:text-slate-400">Yêu cầu</th>
                                <th x-show="getRequestStatusInfo().isShipping || getRequestStatusInfo().isCompleted" class="border-b border-r border-slate-200 px-2 py-2 text-right text-slate-500 dark:border-slate-800 dark:text-slate-400">Thực xuất</th>
                                <th x-show="getRequestStatusInfo().isCompleted" class="border-b border-r border-slate-200 px-2 py-2 text-right text-slate-500 dark:border-slate-800 dark:text-slate-400">Thực nhận</th>
                                <th x-show="getRequestStatusInfo().isCompleted" class="border-b border-slate-200 px-2 py-2 text-left text-slate-500 dark:border-slate-800 dark:text-slate-400">Tình trạng</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(item, idx) in (viewingRequestTicket?.items || [])" :key="item.id">
                                <tr class="bg-white hover:bg-slate-50 dark:bg-slate-950 dark:hover:bg-slate-900/70">
                                    <td class="border-b border-r border-slate-200 px-1.5 py-3 text-center font-mono text-xs text-slate-400 dark:border-slate-800 dark:text-slate-500" x-text="idx + 1"></td>
                                    <td class="border-b border-r border-slate-200 px-4 py-3 dark:border-slate-800">
                                        <div class="whitespace-normal break-words text-[13px] font-semibold leading-snug text-slate-950 dark:text-white" x-text="item.product_name"></div>
                                        <div class="mt-1 text-xs font-medium text-slate-500 dark:text-slate-400" x-text="item.category_name || 'Khác'"></div>
                                    </td>
                                    <td class="border-b border-r border-slate-200 px-2 py-3 text-center text-xs font-semibold text-slate-500 dark:border-slate-800 dark:text-slate-300" x-text="item.request_unit || '---'"></td>
                                    <td x-show="!getRequestStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-3 text-right font-mono text-sm font-black tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.request_quantity"></td>
                                    <td x-show="getRequestStatusInfo().isShipping || getRequestStatusInfo().isCompleted" class="border-b border-r border-slate-200 px-2 py-3 text-right font-mono text-sm font-black tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.approved_quantity !== null ? item.approved_quantity : '--'"></td>
                                    <td x-show="getRequestStatusInfo().isCompleted" class="border-b border-r border-slate-200 px-2 py-3 text-right font-mono text-sm font-black tabular-nums dark:border-slate-800" :class="(item.received_quantity < item.approved_quantity) ? 'text-red-600 dark:text-red-400' : 'text-slate-900 dark:text-white'" x-text="item.received_quantity !== undefined ? item.received_quantity : 'Chưa nhận'"></td>
                                    <td x-show="getRequestStatusInfo().isCompleted" class="border-b border-slate-200 px-2 py-3 text-xs font-semibold dark:border-slate-800">
                                        <template x-if="item.received_quantity !== undefined && item.approved_quantity !== null && item.received_quantity < item.approved_quantity">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-red-200 bg-red-50 px-2 py-1 text-red-700 dark:border-red-900/60 dark:bg-red-950/40 dark:text-red-300">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.19-1.458-1.516-2.625L8.485 2.495ZM10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Thiếu <span x-text="Math.round(item.approved_quantity - item.received_quantity)"></span></span>
                                            </span>
                                        </template>
                                        <template x-if="item.received_quantity !== undefined && item.approved_quantity !== null && item.received_quantity >= item.approved_quantity">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-emerald-200 bg-emerald-50 px-2 py-1 text-emerald-700 dark:border-emerald-900/60 dark:bg-emerald-950/40 dark:text-emerald-300">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.236 4.45-1.674-1.674a.75.75 0 1 0-1.06 1.06l2.3 2.3a.75.75 0 0 0 1.137-.089l3.747-5.165Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Đủ hàng</span>
                                            </span>
                                        </template>
                                        <template x-if="item.received_quantity === undefined">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-2 py-1 text-slate-500 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-12.25a.75.75 0 0 0-1.5 0V10c0 .199.079.39.22.53l2.25 2.25a.75.75 0 1 0 1.06-1.06l-2.03-2.03V5.75Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Chưa nhận</span>
                                            </span>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </section>

                <div x-show="viewingRequestTicket?.compensation_history && viewingRequestTicket.compensation_history.length > 0" class="mt-4 rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/60">
                    <div class="border-b border-slate-200 px-4 py-3 text-xs font-black uppercase tracking-[0.18em] text-slate-500 dark:border-slate-800">Lịch sử bù hàng liên kết</div>
                    <template x-for="child in (viewingRequestTicket?.compensation_history || [])" :key="child.id">
                        <div class="flex items-center justify-between gap-3 border-b border-slate-100 px-4 py-3 text-xs last:border-b-0 dark:border-slate-800">
                            <div class="min-w-0"><div class="truncate font-mono font-bold text-slate-900 dark:text-white" x-text="child.code"></div><div class="text-[10px] text-slate-400" x-text="formatDate(child.created_at)"></div></div>
                            <div class="flex shrink-0 items-center gap-3"><span class="font-semibold text-slate-500" x-text="getStatusLabel(child.status)"></span><button x-show="normalizeTicketStatus(child.status) === 'SHIPPING'" @click="openReceiptModal(child); closeRequestDetailModal()" class="font-bold text-slate-900 underline dark:text-white">Nhận hàng</button><button x-show="normalizeTicketStatus(child.status) !== 'SHIPPING'" @click="openChildModal(child)" class="font-bold text-slate-900 underline dark:text-white">Chi tiết</button></div>
                        </div>
                    </template>
                </div>

                <template x-if="viewingRequestTicket && viewingRequestTicket.images && viewingRequestTicket.images.length > 0">
                    <div class="mt-4 rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900/60">
                        <h4 class="mb-3 text-xs font-black uppercase tracking-[0.18em] text-slate-500">Hình ảnh đính kèm</h4>
                        <div class="grid grid-cols-4 gap-2 sm:grid-cols-6 md:grid-cols-8">
                            <template x-for="img in viewingRequestTicket.images" :key="img.id">
                                <button type="button" class="aspect-square overflow-hidden rounded-md border border-slate-200 dark:border-slate-800" @click="viewingImage = img">
                                    <img :src="((img.thumbnail_path || img.file_path) && (img.thumbnail_path || img.file_path).startsWith('http')) ? (img.thumbnail_path || img.file_path) : ((img.thumbnail_path && img.thumbnail_path.startsWith('/') ? '' : '/') + (img.thumbnail_path || img.file_path))" class="h-full w-full object-cover">
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </main>

            <footer class="flex shrink-0 items-center justify-between border-t border-slate-200 bg-slate-50 px-5 py-3 dark:border-slate-800 dark:bg-slate-900">
                <div class="font-mono text-xs text-slate-500 dark:text-slate-400" x-text="'Mã tra cứu #' + (viewingRequestTicket?.id || '')"></div>
                <button @click="closeRequestDetailModal()" class="rounded-lg bg-slate-900 px-5 py-2 text-xs font-bold text-white transition hover:bg-slate-700 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200">Đóng</button>
            </footer>
        </div>
    </div>
</div>
