<!-- MODAL: CHILD TICKET DETAILS -->
<div x-show="viewingChildTicket" style="display: none; z-index: 12000;" class="fixed inset-0 isolate overflow-y-auto" aria-modal="true" x-cloak>
    <div class="fixed inset-0 z-0 bg-slate-950/45 backdrop-blur-sm" @click="closeChildModal()"></div>

    <div class="relative z-10 flex min-h-screen items-center justify-center p-3 sm:p-4">
        <div class="w-full max-w-3xl max-h-[88vh] overflow-hidden rounded-2xl border border-slate-200 bg-[#fbfaf7] shadow-2xl dark:border-slate-800 dark:bg-slate-950">
            <!-- Header -->
            <div class="flex items-center justify-between gap-3 border-b border-slate-200 bg-white px-4 py-3 dark:border-slate-800 dark:bg-slate-900">
                <div class="min-w-0">
                    <div class="mb-1 flex items-center gap-2">
                        <span class="text-[10px] font-bold uppercase tracking-[0.22em] text-slate-400">Phiếu đang giao</span>
                        <span class="rounded-full border border-orange-200 bg-orange-50 px-1.5 py-0.5 text-[8px] font-black uppercase tracking-wider text-orange-600 dark:border-orange-900 dark:bg-orange-950/20 dark:text-orange-300">Phiếu bù</span>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <h3 class="font-mono text-sm font-black tracking-tight text-slate-900 dark:text-white" x-text="viewingChildTicket?.code"></h3>
                        <span class="rounded-full border px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide"
                            :class="getStatusClass(viewingChildTicket?.status)"
                            x-text="getStatusLabel(viewingChildTicket?.status)"></span>
                    </div>
                </div>
                <div class="flex items-center gap-1.5 shrink-0">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-3xl'))"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white"
                        title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeChildModal()" class="rounded-lg p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-800 dark:hover:text-slate-200">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Metadata -->
            <div class="grid gap-2 border-b border-slate-200 bg-[#f4f1ea] px-4 py-3 text-xs dark:border-slate-800 dark:bg-slate-900/70 sm:grid-cols-3">
                <div class="rounded-xl bg-white/70 p-3 dark:bg-slate-950/50">
                    <div class="mb-1 text-[9px] font-bold uppercase tracking-widest text-slate-400">Luồng giao</div>
                    <div class="text-slate-500">Từ <span class="font-semibold text-slate-900 dark:text-slate-100" x-text="viewingChildTicket?.source_warehouse_name || '---'"></span></div>
                    <div class="text-slate-500">Đến <span class="font-semibold text-slate-900 dark:text-slate-100" x-text="viewingChildTicket?.branch_name || '---'"></span></div>
                </div>
                <div class="rounded-xl bg-white/70 p-3 dark:bg-slate-950/50">
                    <div class="mb-1 text-[9px] font-bold uppercase tracking-widest text-slate-400">Nhân sự</div>
                    <div class="text-slate-500">Tạo <span class="font-semibold text-slate-900 dark:text-slate-100" x-text="viewingChildTicket?.requester_name || '---'"></span></div>
                    <div x-show="viewingChildTicket?.approver_name" class="text-slate-500">Duyệt <span class="font-semibold text-slate-900 dark:text-slate-100" x-text="viewingChildTicket?.approver_name"></span></div>
                </div>
                <div class="rounded-xl bg-white/70 p-3 dark:bg-slate-950/50">
                    <div class="mb-1 text-[9px] font-bold uppercase tracking-widest text-slate-400">Thời gian</div>
                    <div class="font-mono text-slate-600 dark:text-slate-300" x-text="formatDate(viewingChildTicket?.created_at)"></div>
                    <div x-show="viewingChildTicket?.approved_at" class="font-mono text-slate-400" x-text="'Duyệt ' + formatDate(viewingChildTicket?.approved_at)"></div>
                </div>
            </div>

            <div class="max-h-[62vh] overflow-y-auto px-4 py-4">
                <div x-show="viewingChildTicket?.notes || viewingChildTicket?.approver_notes" class="mb-3 rounded-xl border border-dashed border-slate-300 bg-white px-3 py-2 text-xs text-slate-600 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300">
                    <div x-show="viewingChildTicket?.notes"><span class="font-semibold text-slate-900 dark:text-white">Ghi chú:</span> <span x-text="viewingChildTicket?.notes"></span></div>
                    <div x-show="viewingChildTicket?.approver_notes"><span class="font-semibold text-slate-900 dark:text-white">Ý kiến duyệt:</span> <span x-text="viewingChildTicket?.approver_notes"></span></div>
                </div>

                <!-- Shipping items: exported quantity only -->
                <div class="space-y-3">
                    <template x-for="(category, catName) in (viewingChildTicket?.items || []).reduce((acc, item) => {
                        const cat = item.category_name || item.product_category_name || 'Khác';
                        if (!acc[cat]) acc[cat] = [];
                        acc[cat].push(item);
                        return acc;
                    }, {})" :key="catName">
                        <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
                            <div class="flex items-center justify-between border-b border-slate-100 bg-slate-50 px-3 py-2 dark:border-slate-800 dark:bg-slate-800/60">
                                <h4 class="text-[10px] font-black uppercase tracking-[0.18em] text-slate-500 dark:text-slate-300" x-text="catName"></h4>
                                <span class="rounded-full bg-white px-2 py-0.5 text-[10px] font-bold text-slate-400 dark:bg-slate-900" x-text="category.length + ' món'"></span>
                            </div>
                            <div class="divide-y divide-slate-100 dark:divide-slate-800">
                                <template x-for="(item, idx) in category" :key="item.id">
                                    <div class="grid grid-cols-[2rem_minmax(0,1fr)_auto] items-center gap-3 px-3 py-2.5">
                                        <div class="font-mono text-[11px] text-slate-400" x-text="idx + 1"></div>
                                        <div class="min-w-0">
                                            <div class="text-sm font-semibold leading-snug text-slate-900 dark:text-white" x-text="item.product_name"></div>
                                            <div class="text-[10px] uppercase tracking-wider text-slate-400" x-text="catName"></div>
                                        </div>
                                        <div class="rounded-xl bg-blue-600 px-3 py-1.5 text-right text-white shadow-sm dark:bg-blue-500">
                                            <div class="text-[9px] font-black uppercase tracking-widest opacity-70">Thực xuất</div>
                                            <div class="font-mono text-sm font-black">
                                                <template x-if="item.approved_quantity !== null"><span><span x-text="item.approved_quantity"></span> <span class="text-[9px] font-bold opacity-70" x-text="item.request_unit"></span></span></template>
                                                <template x-if="item.approved_quantity === null"><span>--</span></template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>
                </div>
            </div>

            <div class="flex justify-end border-t border-slate-200 bg-white px-4 py-3 dark:border-slate-800 dark:bg-slate-900">
                <button @click="closeChildModal()" class="rounded-lg border border-slate-300 px-4 py-2 text-xs font-bold text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">Đóng</button>
            </div>
        </div>
    </div>
</div>
