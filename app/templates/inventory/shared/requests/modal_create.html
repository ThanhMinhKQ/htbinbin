<!-- PHIẾU TẠO YÊU CẦU NHẬP HÀNG -->

<div x-show="isCreateModalOpen" style="display: none;" class="fixed inset-0 z-[1100] overflow-y-auto inv-flow-modal" aria-modal="true"
    x-cloak>
    <div x-show="isCreateModalOpen" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" @click="closeCreateModal()"></div>

    <div class="flex items-center justify-center min-h-screen px-4 py-4 sm:p-6">
        <div x-show="isCreateModalOpen" x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            class="relative w-full max-w-5xl transform overflow-hidden rounded-2xl bg-white dark:bg-slate-800 text-left shadow-2xl transition-all border border-slate-100 dark:border-slate-700 flex flex-col max-h-[90vh] inv-flow-dialog">

            <div
                class="shrink-0 px-6 py-5 border-b border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 flex justify-between items-start sticky top-0 z-20 inv-flow-header">
                <div class="flex items-start gap-4">
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-blue-600 dark:text-blue-400 inv-flow-icon">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                            <span>Tạo Yêu Cầu Mới</span>
                        </h3>
                        <p class="text-sm text-slate-500 mt-1">Nhập thông tin chi tiết và danh sách vật tư cần
                            nhập.</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button @click="closeCreateModal()"
                        class="group p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <svg class="w-6 h-6 text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto bg-slate-50/50 dark:bg-slate-900/50 px-6 py-6 inv-flow-body">

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-6">
                    <div class="col-span-12 md:col-span-4">
                        <label
                            class="block text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider mb-2">Nguồn
                            hàng</label>
                        <div class="relative">
                            <select x-model="createForm.source_warehouse_id"
                                class="w-full pl-4 pr-10 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 shadow-sm appearance-none transition-all cursor-pointer">
                                <option value="">Chọn Kho Cần Nhập</option>
                                {% for w in warehouses %}
                                {% if w.branch_id != current_branch_id %}
                                {% if not (user_role == 'letan' and w.type == 'TRANSIT') %}
                                <option value="{{ w.id }}">{{ w.name }}</option>
                                {% endif %}
                                {% endif %}
                                {% endfor %}
                            </select>
                            <div
                                class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-12 md:col-span-8">
                        <label
                            class="block text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider mb-2">Ghi
                            chú phiếu</label>
                        <div class="relative">
                            <input type="text" x-model="createForm.notes"
                                placeholder="Ví dụ: Xuất bổ sung cho dự án A..."
                                class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 shadow-sm transition-all">
                        </div>
                    </div>
                </div>

                <div class="space-y-5 pb-6">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-blue-100 dark:border-blue-900/50 shadow-sm p-4 relative inv-flow-card">
                        <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider mb-2">Tìm và thêm vật tư</label>
                        <div class="relative inv-flow-search" @click.outside="createForm.is_search_open = false">
                            <input type="text" x-model="createForm.product_search"
                                @input="createForm.is_search_open = createForm.product_search.trim().length > 0"
                                @keydown.escape="createForm.is_search_open = false"
                                placeholder="Gõ tên vật tư cần nhập..."
                                class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-semibold text-slate-800 dark:text-white py-3 pl-11 pr-11 focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 shadow-sm placeholder:text-slate-400">
                            <svg class="absolute left-4 top-3.5 w-5 h-5 text-blue-400 inv-flow-search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.5 4.5a7.5 7.5 0 0012.15 12.15z" />
                            </svg>
                            <button type="button" x-show="createForm.product_search" x-cloak
                                @click="clearCreateProductSearch()"
                                class="absolute right-3 top-2.5 p-1.5 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>

                            <div x-show="createForm.is_search_open && createForm.product_search.trim().length > 0" x-cloak
                                class="absolute z-50 mt-2 w-full max-h-80 overflow-y-auto rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 shadow-2xl shadow-slate-900/20 dark:shadow-black/50">
                                <template x-for="p in getCreateProductSearchResults()" :key="p.id">
                                    <button type="button" @click="addCreateProductQuick(p)"
                                        class="w-full text-left px-4 py-3 hover:bg-blue-50 dark:hover:bg-blue-900/30 border-b border-slate-100 dark:border-slate-800 last:border-b-0 transition-colors flex items-center justify-between gap-3 inv-flow-result">
                                        <div class="min-w-0">
                                            <div class="font-bold text-sm text-slate-800 dark:text-slate-100 truncate" x-text="p.name"></div>
                                            <div class="mt-0.5 text-[11px] text-slate-500 dark:text-slate-400">Bấm để thêm vào phiếu</div>
                                        </div>
                                        <span class="shrink-0 px-2 py-1 rounded-lg bg-slate-100 dark:bg-slate-800 text-xs font-semibold text-slate-600 dark:text-slate-300"
                                            x-text="p.packing_unit && p.conversion_rate > 1 ? `${p.packing_unit} / ${p.base_unit}` : p.base_unit"></span>
                                    </button>
                                </template>
                                <div x-show="getCreateProductSearchResults().length === 0"
                                    class="px-4 py-5 text-sm text-slate-400 text-center">
                                    Không tìm thấy vật tư phù hợp
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden inv-flow-card">
                        <div class="grid grid-cols-12 gap-3 px-4 py-3 bg-slate-50 dark:bg-slate-900/70 border-b border-slate-200 dark:border-slate-700">
                            <div class="col-span-6 text-[10px] font-bold text-slate-400 uppercase">Sản phẩm</div>
                            <div class="col-span-3 text-[10px] font-bold text-slate-400 uppercase text-center">Số lượng</div>
                            <div class="col-span-3 text-[10px] font-bold text-slate-400 uppercase">Đơn vị</div>
                        </div>

                        <template x-if="getFlatCreateFormItems().length === 0">
                            <div class="px-4 py-8 text-center text-sm text-slate-400">
                                Chưa có vật tư nào. Hãy tìm kiếm và thêm vật tư vào phiếu.
                            </div>
                        </template>

                        <div class="divide-y divide-slate-100 dark:divide-slate-700">
                            <template x-for="(group, gIdx) in createForm.itemGroups" :key="group.id">
                                <template x-for="(item, iIdx) in group.items" :key="item.id">
                                    <div class="grid grid-cols-12 gap-3 px-4 py-3 items-center hover:bg-slate-50 dark:hover:bg-slate-900/40 transition-colors">
                                        <div class="col-span-6 min-w-0">
                                            <div class="font-bold text-sm text-slate-800 dark:text-slate-100 truncate" x-text="getCreateProductName(item.product_id)"></div>
                                        </div>

                                        <div class="col-span-3">
                                            <input type="number" x-model="item.quantity" placeholder="0" min="0" step="any"
                                                class="w-full text-center bg-slate-50 dark:bg-slate-900 border-none rounded-lg py-2.5 text-sm font-bold text-blue-600 focus:ring-1 focus:ring-blue-500 placeholder:text-slate-300">
                                        </div>

                                        <div class="col-span-3 flex items-center gap-2">
                                            <select x-model="item.unit"
                                                class="min-w-0 flex-1 bg-slate-50 dark:bg-slate-900 border-none rounded-lg text-sm text-slate-600 dark:text-slate-300 py-2.5 pl-2 focus:ring-1 focus:ring-blue-500 cursor-pointer">
                                                <template x-for="u in item.available_units" :key="u">
                                                    <option :value="u" x-text="u"></option>
                                                </template>
                                            </select>
                                            <button type="button" @click="removeItemFromCreateGroup(gIdx, iIdx)"
                                                class="p-2.5 text-slate-300 hover:text-red-500 bg-transparent hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"
                                                title="Xóa dòng">
                                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="shrink-0 px-6 py-4 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 flex flex-col-reverse sm:flex-row items-center justify-between gap-4 sticky bottom-0 z-20">
                <div class="text-sm text-slate-500 w-full sm:w-auto text-center sm:text-left">
                    <span class="hidden sm:inline">Tổng số dòng: </span>
                    <span
                        class="font-bold text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded ml-1"
                        x-text="getFlatCreateFormItems().length"></span>
                </div>

                <div class="flex w-full sm:w-auto gap-3">
                    <button type="button" @click="closeCreateModal()"
                        class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 hover:text-slate-800 transition-all shadow-sm inv-btn-secondary">
                        Hủy bỏ
                    </button>
                    <button type="button" @click="submitCreateRequest()" :disabled="isSubmitting"
                        class="flex-[2] sm:flex-none px-8 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5 active:translate-y-0 text-sm flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed inv-flow-primary">
                        <svg x-show="isSubmitting" class="animate-spin h-4 w-4 text-white" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        <span>Gửi Yêu Cầu</span>
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
