<!-- MODAL: CHI TIẾT LỊCH SỬ DUYỆT -->
<div x-show="viewingApprovalTicket" style="display: none; z-index: 12000;" class="fixed inset-0 isolate overflow-y-auto" aria-modal="true" x-cloak
     x-data="{
         getStatusInfo() {
             const status = this.viewingApprovalTicket?.status;
             const isShip = status === 'SHIPPING' || (typeof normalizeTicketStatus === 'function' && normalizeTicketStatus(status) === 'SHIPPING');
             const isPen = status === 'PENDING' || (typeof normalizeTicketStatus === 'function' && normalizeTicketStatus(status) === 'PENDING');
             return { isShipping: isShip, isPending: isPen };
         }
     }">
    <div class="fixed inset-0 z-0 bg-slate-950/55 backdrop-blur-[2px]" @click="closeApprovalDetailModal()"></div>

    <div class="relative z-10 flex min-h-screen items-center justify-center p-3 sm:p-5">
        <div class="flex max-h-[92vh] w-full max-w-6xl flex-col overflow-hidden rounded-xl border border-slate-200 bg-white shadow-2xl dark:border-slate-800 dark:bg-slate-950">
            <header class="shrink-0 border-b border-slate-200 bg-white px-4 py-3 dark:border-slate-800 dark:bg-slate-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2.5 min-w-0">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 shrink-0" x-text="getStatusInfo().isShipping ? 'Đang giao' : 'Kiểm nhận'"></span>
                        <h2 class="truncate font-mono text-sm font-black tracking-tight text-slate-950 dark:text-white" x-text="viewingApprovalTicket?.code || '---'"></h2>
                        <span class="shrink-0 rounded-full border border-slate-300 bg-slate-100 px-2 py-0.5 text-[10px] font-bold text-slate-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200" x-text="getStatusLabel(viewingApprovalTicket?.status)"></span>
                        <span x-show="viewingApprovalTicket?.code?.includes('REQ_COMP')" class="shrink-0 rounded-full border border-slate-300 px-2 py-0.5 text-[10px] font-bold text-slate-600 dark:border-slate-700 dark:text-slate-300">Bù hàng</span>
                    </div>
                    <div class="flex shrink-0 items-center gap-0.5">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-6xl'))" class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white" title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeApprovalDetailModal()" class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto bg-slate-50 p-3 dark:bg-slate-950 sm:p-4">
                <section class="rounded-xl border border-slate-200/80 bg-white p-4 dark:border-slate-700/50 dark:bg-slate-800/50">
                    <div class="flex flex-wrap items-stretch gap-3">
                        <div class="flex min-w-[140px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Luồng hàng</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="(viewingApprovalTicket?.source_warehouse_name || '---') + ' → ' + (viewingApprovalTicket?.branch_name || '---')"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Người lập</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="viewingApprovalTicket?.requester_name || '---'"></div>
                            </div>
                        </div>
                        <div x-show="viewingApprovalTicket?.approver_name" class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Người duyệt</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="viewingApprovalTicket?.approver_name"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[130px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Thời gian tạo</div>
                                <div class="mt-0.5 truncate font-mono text-[13px] font-bold text-slate-900 dark:text-white" x-text="formatDate(viewingApprovalTicket?.created_at) || '---'"></div>
                            </div>
                        </div>
                    </div>
                    <div x-show="viewingApprovalTicket?.notes || viewingApprovalTicket?.approver_notes || viewingApprovalTicket?.code?.includes('REQ_COMP')" class="mt-3 flex items-start gap-2.5 rounded-lg bg-slate-50 px-3.5 py-2.5 border border-slate-200/70 dark:bg-slate-800/60 dark:border-slate-600/20">
                        <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-500 dark:bg-slate-700 dark:text-slate-400">
                            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                        </div>
                        <div class="min-w-0 text-[13px] leading-relaxed text-slate-700 dark:text-slate-300">
                            <span x-show="viewingApprovalTicket?.notes" x-text="viewingApprovalTicket?.notes"></span>
                            <span x-show="viewingApprovalTicket?.approver_notes" class="text-slate-500 dark:text-slate-400" x-text="' — ' + viewingApprovalTicket?.approver_notes"></span>
                            <span x-show="viewingApprovalTicket?.code?.includes('REQ_COMP')" class="italic text-slate-500 dark:text-slate-400"> Phiếu bù hàng tự động.</span>
                        </div>
                    </div>
                </section>

                <section class="mt-4 overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
                    <div class="max-h-[42vh] overflow-y-auto overflow-x-auto">
                        <table class="min-w-[760px] w-full table-fixed border-collapse text-left text-sm">
                        <colgroup>
                            <col class="w-[30px]">
                            <col class="w-auto">
                            <col class="w-[62px]">
                            <col x-show="!getStatusInfo().isShipping" class="w-[88px]">
                            <col x-show="!getStatusInfo().isPending" class="w-[88px]">
                            <col x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="w-[88px]">
                            <col x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="w-[126px]">
                        </colgroup>
                        <thead>
                            <tr class="bg-slate-100 text-[11px] font-bold uppercase tracking-wide text-slate-600 dark:bg-slate-900 dark:text-slate-300">
                                <th class="border-b border-r border-slate-200 px-1.5 py-2 text-center text-slate-400 dark:border-slate-800 dark:text-slate-500">#</th>
                                <th class="border-b border-r border-slate-200 px-4 py-2 text-left text-slate-700 dark:border-slate-800 dark:text-slate-200">Tên hàng hóa / Vật tư</th>
                                <th class="border-b border-r border-slate-200 px-2 py-2 text-left text-slate-500 dark:border-slate-800 dark:text-slate-400">ĐVT</th>
                                <th x-show="!getStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Yêu cầu</th>
                                <th x-show="!getStatusInfo().isPending" class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Thực xuất</th>
                                <th x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-2 text-center text-slate-500 dark:border-slate-800 dark:text-slate-400">Thực nhận</th>
                                <th x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="border-b border-slate-200 px-2 py-2 text-left text-slate-500 dark:border-slate-800 dark:text-slate-400">Tình trạng</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(item, idx) in (viewingApprovalTicket?.items || [])" :key="item.id">
                                <tr class="bg-white hover:bg-slate-50 dark:bg-slate-950 dark:hover:bg-slate-900/70">
                                    <td class="border-b border-r border-slate-200 px-1.5 py-3 text-center font-mono text-xs text-slate-400 dark:border-slate-800 dark:text-slate-500" x-text="idx + 1"></td>
                                    <td class="border-b border-r border-slate-200 px-4 py-3 dark:border-slate-800">
                                        <div class="whitespace-normal break-words text-[13px] font-semibold leading-snug text-slate-950 dark:text-white" x-text="item.product_name"></div>
                                        <div class="mt-1 text-xs font-medium text-slate-500 dark:text-slate-400" x-text="item.category_name || 'Khác'"></div>
                                    </td>
                                    <td class="border-b border-r border-slate-200 px-2 py-3 text-left text-xs font-semibold text-slate-500 dark:border-slate-800 dark:text-slate-300" x-text="item.request_unit || '---'"></td>
                                    <td x-show="!getStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-3 text-center font-mono text-sm font-bold tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.request_quantity"></td>
                                    <td x-show="!getStatusInfo().isPending" class="border-b border-r border-slate-200 px-2 py-3 text-center font-mono text-sm font-bold tabular-nums text-slate-900 dark:border-slate-800 dark:text-white" x-text="item.approved_quantity !== null ? item.approved_quantity : '--'"></td>
                                    <td x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="border-b border-r border-slate-200 px-2 py-3 text-center font-mono text-sm font-bold tabular-nums dark:border-slate-800" :class="(item.received_quantity < item.approved_quantity) ? 'text-red-600 dark:text-red-400' : 'text-slate-900 dark:text-white'" x-text="item.received_quantity !== undefined ? item.received_quantity : 'Chưa nhận'"></td>
                                    <td x-show="!getStatusInfo().isPending && !getStatusInfo().isShipping" class="border-b border-slate-200 px-2 py-3 text-xs font-semibold dark:border-slate-800">
                                        <template x-if="item.received_quantity !== undefined && item.approved_quantity !== null && item.received_quantity < item.approved_quantity">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-red-200 bg-red-50 px-2 py-1 text-red-700 dark:border-red-900/60 dark:bg-red-950/40 dark:text-red-300">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.19-1.458-1.516-2.625L8.485 2.495ZM10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Thiếu <span x-text="Math.round(item.approved_quantity - item.received_quantity)"></span></span>
                                            </span>
                                        </template>
                                        <template x-if="item.received_quantity !== undefined && item.approved_quantity !== null && item.received_quantity >= item.approved_quantity">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-slate-200/60 bg-emerald-50 px-2 py-1 text-emerald-700 dark:border-emerald-900/60 dark:bg-emerald-950/40 dark:text-emerald-300">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.236 4.45-1.674-1.674a.75.75 0 1 0-1.06 1.06l2.3 2.3a.75.75 0 0 0 1.137-.089l3.747-5.165Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Đủ hàng</span>
                                            </span>
                                        </template>
                                        <template x-if="item.received_quantity === undefined">
                                            <span class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-2 py-1 text-slate-500 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400">
                                                <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-12.25a.75.75 0 0 0-1.5 0V10c0 .199.079.39.22.53l2.25 2.25a.75.75 0 1 0 1.06-1.06l-2.03-2.03V5.75Z" clip-rule="evenodd" />
                                                </svg>
                                                <span>Chưa nhận</span>
                                            </span>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                        </table>
                    </div>
                </section>

                <section x-show="viewingApprovalTicket?.has_shortage && !getStatusInfo().isPending && !getStatusInfo().isShipping" class="mt-3 rounded-lg border border-red-200 bg-white p-4 text-xs text-red-700 dark:border-red-900/50 dark:bg-slate-900/60 dark:text-red-300">
                    Chênh lệch thiếu hàng: <span class="font-mono font-bold" x-text="(viewingApprovalTicket?.items || []).reduce((sum, i) => sum + Math.max(0, parseFloat(i.approved_quantity || 0) - parseFloat(i.received_quantity || 0)), 0).toFixed(0) + ' SP'"></span>
                </section>

                <div x-show="viewingApprovalTicket?.compensation_history && viewingApprovalTicket.compensation_history.length > 0" class="mt-4 rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/60">
                    <div class="border-b border-slate-200 px-4 py-3 text-xs font-black uppercase tracking-[0.18em] text-slate-500 dark:border-slate-800">Chứng từ bù hàng liên kết</div>
                    <template x-for="(child, index) in (viewingApprovalTicket?.compensation_history || [])" :key="child.id">
                        <div class="flex items-center justify-between gap-3 border-b border-slate-100 px-4 py-3 text-xs last:border-b-0 dark:border-slate-800">
                            <div class="min-w-0"><div class="truncate font-mono font-bold text-slate-900 dark:text-white" x-text="child.code"></div><div class="text-[10px] text-slate-400" x-text="formatDate(child.created_at)"></div></div>
                            <div class="flex shrink-0 items-center gap-3"><span class="font-semibold text-slate-500" x-text="getStatusLabel(child.status)"></span><button @click="openChildModal(child)" class="font-bold text-slate-900 underline dark:text-white">Chi tiết</button></div>
                        </div>
                    </template>
                </div>
            </main>

            <footer class="flex shrink-0 items-center justify-between border-t border-slate-200 bg-slate-50 px-5 py-3 dark:border-slate-800 dark:bg-slate-900">
                <div class="font-mono text-xs text-slate-500 dark:text-slate-400" x-text="'Mã phiếu #' + (viewingApprovalTicket?.id || '')"></div>
                <button @click="closeApprovalDetailModal()" class="rounded-lg bg-slate-900 px-5 py-2 text-xs font-bold text-white transition hover:bg-slate-700 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200">Đóng</button>
            </footer>
        </div>
    </div>
</div>
