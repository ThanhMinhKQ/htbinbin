<div x-show="currentTab === 'export'" class="inv-tab-page" x-cloak>

    <div class="inv-kpi-grid">
        <div class="inv-kpi-card" data-accent="coral">
            <p class="inv-kpi-label">Tổng phiếu</p>
            <p class="inv-kpi-value" x-text="totalExportRecords || 0"></p>
            <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
        </div>
        <div class="inv-kpi-card" data-accent="yellow">
            <p class="inv-kpi-label">Đang giao</p>
            <p class="inv-kpi-value" x-text="exportList.filter(r => r.status === 'SHIPPING').length"></p>
            <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div class="inv-kpi-card" data-accent="teal">
            <p class="inv-kpi-label">Hoàn tất</p>
            <p class="inv-kpi-value" x-text="exportList.filter(r => r.status === 'COMPLETED').length"></p>
            <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
    </div>

    <!-- Filters -->
    <div class="inv-toolbar">
        <div class="inv-status-strip mb-3">
            <button type="button" @click="exportFilters.status = ''; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === '' }" class="inv-status-chip">Tất cả</button>
            <button type="button" @click="exportFilters.status = 'SHIPPING'; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === 'SHIPPING' }" class="inv-status-chip">Đang giao</button>
            <button type="button" @click="exportFilters.status = 'COMPLETED'; fetchExports(1)"
                :class="{ 'is-active': exportFilters.status === 'COMPLETED' }" class="inv-status-chip">Hoàn tất</button>
        </div>

        <div class="flex flex-col sm:flex-row gap-2 w-full flex-wrap">
            <div class="relative w-full sm:w-64">
                <input type="text" x-model="exportFilters.search" @keydown.enter="fetchExports(1)"
                    class="inv-field-search" placeholder="Tìm mã phiếu, ghi chú...">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <input type="date" x-model="exportFilters.date_from" @change="fetchExports(1)" class="inv-field w-full sm:w-40">
            <input type="date" x-model="exportFilters.date_to" @change="fetchExports(1)" class="inv-field w-full sm:w-40">
            <button @click="fetchExports(1)" class="inv-btn-secondary">Lọc</button>
        </div>
    </div>

    <!-- Table -->
    <div class="inv-table-card">
        <div class="inv-table-scroll relative">
            <template x-if="loadingExports">
                <div class="skeleton-stagger">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 dark:border-slate-800">
                                <th class="px-4 py-3"><div class="skeleton skeleton-text" style="width:70px;"></div></th>
                                <th class="px-4 py-3"><div class="skeleton skeleton-text" style="width:80px;"></div></th>
                                <th class="px-4 py-3"><div class="skeleton skeleton-text" style="width:80px;"></div></th>
                                <th class="px-4 py-3"><div class="skeleton skeleton-text" style="width:70px;"></div></th>
                                <th class="px-4 py-3"><div class="skeleton skeleton-text" style="width:70px;"></div></th>
                                <th class="px-4 py-3 text-center"><div class="skeleton skeleton-text" style="width:50px;margin:0 auto;"></div></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                            <template x-for="i in 5" :key="i">
                                <tr>
                                    <td class="px-4 py-3">
                                        <div class="skeleton skeleton-text" style="width:88px;"></div>
                                        <div class="skeleton skeleton-text-sm" style="width:56px;margin-top:4px;"></div>
                                    </td>
                                    <td class="px-4 py-3"><div class="skeleton skeleton-text" style="width:90px;"></div></td>
                                    <td class="px-4 py-3"><div class="skeleton skeleton-text" style="width:90px;"></div></td>
                                    <td class="px-4 py-3"><div class="skeleton skeleton-badge" style="width:68px;"></div></td>
                                    <td class="px-4 py-3"><div class="skeleton skeleton-text" style="width:72px;"></div></td>
                                    <td class="px-4 py-3 text-center"><div class="skeleton skeleton-btn" style="width:64px;height:28px;margin:0 auto;border-radius:8px;"></div></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template x-if="!loadingExports">
            <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400 border-collapse">
                <thead class="inv-table-head">
                    <tr>
                        <th class="px-4 py-3">Mã phiếu</th>
                        <th class="px-4 py-3">Kho nguồn</th>
                        <th class="px-4 py-3">Kho đích</th>
                        <th class="px-4 py-3">Trạng thái</th>
                        <th class="px-4 py-3">Ngày tạo</th>
                        <th class="px-4 py-3 text-center">Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="ticket in exportList" :key="ticket.id">
                        <tr class="inv-table-row">
                            <td class="px-4 py-3 font-medium text-slate-900 dark:text-white" x-text="ticket.code"></td>
                            <td class="px-4 py-3" x-text="ticket.source_warehouse_name || 'Kho Tổng'"></td>
                            <td class="px-4 py-3" x-text="ticket.branch_name || ticket.dest_warehouse_name || ''"></td>
                            <td class="px-4 py-3">
                                <span class="inv-badge"
                                    :class="{
                                        'inv-badge-warning': ticket.status === 'SHIPPING',
                                        'inv-badge-success': ticket.status === 'COMPLETED',
                                        'inv-badge-info': ticket.status === 'PENDING'
                                    }"
                                    x-text="ticket.status === 'SHIPPING' ? 'Đang giao' : ticket.status === 'COMPLETED' ? 'Hoàn tất' : ticket.status === 'PENDING' ? 'Chờ duyệt' : ticket.status">
                                </span>
                            </td>
                            <td class="px-4 py-3" x-text="ticket.created_at ? new Date(ticket.created_at).toLocaleDateString('vi-VN') : ''"></td>
                            <td class="px-4 py-3 text-center">
                                <button @click="openExportDetail(ticket.id)" class="inv-btn-icon" title="Xem chi tiết">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="!loadingExports && exportList.length === 0">
                        <td colspan="6" class="p-12 text-center text-slate-400">
                            <div class="inv-empty-state">
                                <div class="inv-empty-icon">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                    </svg>
                                </div>
                                <span>Chưa có phiếu xuất nào.</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            </template>
        </div>

        <!-- Pagination -->
        <div x-show="totalExportPages > 1" class="inv-pagination">
            <button @click="fetchExports(currentExportPage - 1)" :disabled="currentExportPage <= 1"
                class="inv-btn-secondary" :class="{ 'opacity-50 cursor-not-allowed': currentExportPage <= 1 }">
                Trước
            </button>
            <span class="text-sm text-slate-600 dark:text-slate-400"
                x-text="`Trang ${currentExportPage} / ${totalExportPages}`"></span>
            <button @click="fetchExports(currentExportPage + 1)" :disabled="currentExportPage >= totalExportPages"
                class="inv-btn-secondary" :class="{ 'opacity-50 cursor-not-allowed': currentExportPage >= totalExportPages }">
                Sau
            </button>
        </div>
    </div>
</div>
