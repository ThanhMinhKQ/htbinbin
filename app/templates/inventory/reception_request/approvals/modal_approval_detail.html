<!-- MODAL: CHI TIẾT LỊCH SỬ DUYỆT (APPROVAL DETAIL) -->
<div x-show="viewingApprovalTicket" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto" aria-modal="true"
    x-cloak>
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" @click="closeApprovalDetailModal()">
    </div>

    <!-- Modal Panel -->
    <div class="flex items-center justify-center min-h-screen p-4">
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl transform transition-all w-full max-w-5xl flex flex-col max-h-[90vh]">

            <!-- Header -->
            <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-t-2xl shrink-0 flex items-center justify-between">
                <div class="flex items-center gap-2.5 min-w-0">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 shrink-0">Kiểm nhận</span>
                    <h3 class="text-sm font-black text-slate-900 dark:text-white tracking-tight font-mono truncate"
                        x-text="viewingApprovalTicket?.code"></h3>
                    <span class="shrink-0 rounded-full border px-2 py-0.5 text-[10px] font-bold"
                        :class="getStatusClass(viewingApprovalTicket?.status)"
                        x-text="getStatusLabel(viewingApprovalTicket?.status)"></span>
                </div>
                <div class="flex items-center gap-0.5 shrink-0">
                    <button @click="captureModal($el.closest('.fixed').querySelector('.max-w-5xl'))"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white"
                        title="Chụp ảnh phiếu">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button @click="closeApprovalDetailModal()"
                        class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700 dark:hover:text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Metadata Section -->
            <div class="px-3 pt-3 sm:px-4 sm:pt-4">
                <section class="rounded-xl border border-slate-200/80 bg-white p-4 dark:border-slate-700/50 dark:bg-slate-800/50">
                    <div class="flex flex-wrap items-stretch gap-3">
                        <div class="flex min-w-[140px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Luồng hàng</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="(viewingApprovalTicket?.source_warehouse_name || '---') + ' → ' + (viewingApprovalTicket?.branch_name || '---')"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Người lập</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="viewingApprovalTicket?.requester_name || '---'"></div>
                            </div>
                        </div>
                        <div x-show="viewingApprovalTicket?.approver_name" class="flex min-w-[120px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Người duyệt</div>
                                <div class="mt-0.5 truncate text-[13px] font-bold text-slate-900 dark:text-white" x-text="viewingApprovalTicket?.approver_name"></div>
                            </div>
                        </div>
                        <div class="flex min-w-[130px] flex-1 items-start gap-2.5 rounded-lg bg-slate-50/80 px-3.5 py-2.5 border border-slate-200/60 dark:bg-slate-700/30 dark:border-slate-700/50">
                            <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-600 dark:bg-slate-600/50 dark:text-slate-300">
                                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Thời gian tạo</div>
                                <div class="mt-0.5 truncate font-mono text-[13px] font-bold text-slate-900 dark:text-white" x-text="viewingApprovalTicket?.created_at || '---'"></div>
                            </div>
                        </div>
                    </div>
                    <div x-show="viewingApprovalTicket?.notes || viewingApprovalTicket?.approver_notes" class="mt-3 flex items-start gap-2.5 rounded-lg bg-slate-50 px-3.5 py-2.5 border border-slate-200/70 dark:bg-slate-800/60 dark:border-slate-600/20">
                        <div class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-200/80 text-slate-500 dark:bg-slate-700 dark:text-slate-400">
                            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                        </div>
                        <div class="min-w-0 text-[13px] leading-relaxed text-slate-700 dark:text-slate-300">
                            <span x-show="viewingApprovalTicket?.notes" x-text="viewingApprovalTicket?.notes"></span>
                            <span x-show="viewingApprovalTicket?.approver_notes" class="text-slate-500 dark:text-slate-400" x-text="' — ' + viewingApprovalTicket?.approver_notes"></span>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-y-auto p-0 flex flex-col">

                <!-- Alert: Compensation -->
                <div x-show="viewingApprovalTicket?.code.includes('REQ_COMP')"
                    class="px-6 py-3 bg-purple-50 dark:bg-purple-900/20 border-b border-purple-100 dark:border-purple-800 flex items-center gap-3">
                    <span
                        class="p-1.5 bg-purple-100 dark:bg-purple-800 rounded-full text-purple-600 dark:text-purple-300">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </span>
                    <p class="text-sm text-purple-800 dark:text-purple-300 font-medium">
                        Phiếu bù hàng tự động.
                    </p>
                </div>

                <!-- Products by Category -->
                <div class="px-6 py-4 space-y-6 flex-1">
                    <template x-for="(category, catName) in (viewingApprovalTicket?.items || []).reduce((acc, item) => {
                        const cat = item.category_name || 'Khác';
                        if (!acc[cat]) acc[cat] = [];
                        acc[cat].push(item);
                        return acc;
                    }, {})" :key="catName">
                        <div class="relative">
                            <!-- Category Header -->
                            <div
                                class="sticky top-0 z-10 py-2 bg-slate-50/95 dark:bg-slate-900/95 backdrop-blur-sm mb-3 flex items-center gap-3">
                                <span
                                    class="w-1.5 h-6 rounded-full bg-gradient-to-b from-blue-500 to-indigo-600"></span>
                                <h4 class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-wider"
                                    x-text="catName"></h4>
                                <span
                                    class="px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800 text-[10px] font-bold text-slate-500"
                                    x-text="category.length"></span>
                            </div>

                            <!-- Products in Category -->
                            <div class="grid grid-cols-1 gap-2">
                                <span
                                    class="px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800 text-[10px] font-bold text-slate-500"
                                    x-text="category.length"></span>
                            </div>

                            <!-- Products in Category -->
                            <div class="grid grid-cols-1 gap-2">
                                <template x-for="item in category" :key="item.id">
                                    <div
                                        class="bg-white dark:bg-slate-800 rounded-xl p-3 border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md hover:border-blue-200 dark:hover:border-blue-800 transition-all duration-200">
                                        <!-- Optimized Grid Layout for Better Space Utilization -->
                                        <div class="grid grid-cols-12 gap-3 items-center">
                                            <!-- Product Icon -->
                                            <div class="col-span-1">
                                                <div class="p-1.5 bg-slate-100 dark:bg-slate-700 rounded-lg">
                                                    <svg class="w-4 h-4 text-slate-600 dark:text-slate-300" fill="none"
                                                        viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                                    </svg>
                                                </div>
                                            </div>

                                            <!-- Product Info - Takes more space -->
                                            <div class="col-span-5 min-w-0">
                                                <div class="font-semibold text-sm text-slate-800 dark:text-white truncate"
                                                    x-text="item.product_name"></div>
                                                <!-- Progress Bar (only show if received) -->
                                                <div x-show="item.approved_quantity !== null && item.received_quantity !== undefined"
                                                    class="mt-1.5">
                                                    <div class="flex items-center justify-between text-[10px] mb-0.5">
                                                        <span class="text-slate-500 dark:text-slate-400">Tiến độ</span>
                                                        <span class="font-medium"
                                                            :class="(item.received_quantity >= item.approved_quantity) ? 'text-green-600 dark:text-green-400' : 'text-orange-600 dark:text-orange-400'"
                                                            x-text="(item.approved_quantity > 0 ? Math.min(100, Math.round((item.received_quantity / item.approved_quantity) * 100)) : 0) + '%'"></span>
                                                    </div>
                                                    <div
                                                        class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 overflow-hidden">
                                                        <div class="h-full rounded-full transition-all duration-500"
                                                            :class="(item.received_quantity >= item.approved_quantity) ? 'bg-gradient-to-r from-green-500 to-green-600' : 'bg-gradient-to-r from-orange-400 to-orange-500'"
                                                            :style="`width: ${item.approved_quantity > 0 ? Math.min(100, (item.received_quantity / item.approved_quantity) * 100) : 0}%`">
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Requested Quantity -->
                                            <div class="col-span-2 text-center">
                                                <div class="text-[10px] text-slate-400 uppercase font-bold mb-1">Yêu cầu
                                                </div>
                                                <div class="flex items-baseline gap-1 justify-center">
                                                    <span
                                                        class="font-medium text-slate-600 dark:text-slate-300 text-base"
                                                        x-text="item.request_quantity"></span>
                                                    <span class="text-xs text-slate-400"
                                                        x-text="item.request_unit"></span>
                                                </div>
                                            </div>

                                            <!-- Approved Quantity -->
                                            <div class="col-span-2 text-center">
                                                <div class="text-[10px] text-blue-400 uppercase font-bold mb-1">Thực
                                                    xuất</div>
                                                <div x-show="item.approved_quantity !== null"
                                                    class="flex items-baseline gap-1 justify-center">
                                                    <span class="font-bold text-blue-600 dark:text-blue-400 text-base"
                                                        x-text="item.approved_quantity"></span>
                                                    <span class="text-xs text-blue-400/70"
                                                        x-text="item.request_unit"></span>
                                                </div>
                                                <span x-show="item.approved_quantity === null"
                                                    class="text-slate-300 text-sm">--</span>
                                            </div>

                                            <!-- Received Quantity -->
                                            <div class="col-span-2 text-center">
                                                <div class="text-[10px] text-green-400 uppercase font-bold mb-1">Thực
                                                    nhận</div>
                                                <div x-show="item.received_quantity !== undefined"
                                                    class="flex items-center gap-1 justify-center">
                                                    <span class="font-bold text-base"
                                                        :class="(item.received_quantity < item.approved_quantity) ? 'text-red-500 dark:text-red-400' : 'text-green-600 dark:text-green-400'"
                                                        x-text="item.received_quantity"></span>
                                                    <span class="text-xs text-slate-400"
                                                        x-text="item.request_unit"></span>
                                                    <!-- Status Icon -->
                                                    <svg x-show="item.received_quantity >= item.approved_quantity"
                                                        class="w-3.5 h-3.5 text-green-600 dark:text-green-400"
                                                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                    </svg>
                                                    <svg x-show="item.received_quantity < item.approved_quantity"
                                                        class="w-3.5 h-3.5 text-red-500 dark:text-red-400" fill="none"
                                                        viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                                    </svg>
                                                </div>
                                                <span x-show="item.received_quantity === undefined"
                                                    class="text-slate-300 text-sm">chưa nhận</span>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Compensation History (Footer Section) -->
                <div x-show="viewingApprovalTicket?.compensation_history && viewingApprovalTicket.compensation_history.length > 0"
                    class="border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                    <div
                        class="px-6 py-3 bg-slate-50 dark:bg-slate-800/80 border-b border-slate-100 dark:border-slate-700">
                        <h4 class="font-bold text-slate-700 dark:text-white text-xs uppercase tracking-wider">Lịch sử Bù
                            hàng</h4>
                    </div>
                    <div class="p-0 divide-y divide-slate-100 dark:divide-slate-700">
                        <template x-for="(child, index) in (viewingApprovalTicket?.compensation_history || [])"
                            :key="child.id">
                            <div
                                class="px-6 py-3 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-xs font-bold text-purple-600"
                                        x-text="index + 1"></div>
                                    <div class="flex flex-col">
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-slate-800 dark:text-white text-sm"
                                                x-text="child.code"></span>
                                            <span
                                                class="px-1.5 py-0.5 rounded text-[10px] font-bold border uppercase tracking-wider"
                                                :class="getStatusClass(child.status)"
                                                x-text="getStatusLabel(child.status)"></span>
                                        </div>
                                        <span class="text-[10px] text-slate-400" x-text="child.created_at"></span>
                                    </div>
                                </div>
                                <div>
                                    <button @click="openChildModal(child)"
                                        class="text-xs font-medium text-slate-500 hover:text-slate-700 hover:underline">
                                        Chi tiết
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div>

            <!-- Footer Actions -->
            <div
                class="px-6 py-3 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 flex justify-end shrink-0 rounded-b-2xl">
                <button @click="closeApprovalDetailModal()"
                    class="px-5 py-2 rounded-lg border border-slate-300 text-slate-600 font-bold hover:bg-slate-50 transition text-sm">
                    Đóng
                </button>
            </div>

        </div>
    </div>
</div>
