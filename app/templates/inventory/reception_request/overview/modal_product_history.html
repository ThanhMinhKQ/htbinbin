<div x-show="isHistoryModalOpen" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" x-cloak
     style="display: none; background: rgba(2,6,23,0.78); backdrop-filter: blur(6px); padding: 0; top: -10vh; bottom: -10vh; left: -10vw; right: -10vw;">
    <div class="absolute inset-0" @click="closeHistoryModal()"></div>

    <div class="relative z-10 flex flex-col bg-white dark:bg-slate-900 shadow-2xl border border-transparent dark:border-slate-700/60"
         style="width: 100%; max-width: min(1100px, calc(100vw - 1.5rem)); max-height: 90vh; border-radius: 16px; overflow: hidden;">

        <!-- Header -->
        <div class="shrink-0 border-b border-slate-200 dark:border-slate-700 bg-gradient-to-r from-indigo-50 to-white dark:from-slate-800 dark:to-slate-900"
             style="padding: 14px 20px;">
            <div class="flex items-center justify-between" style="gap: 12px;">
                <div class="flex items-center min-w-0" style="gap: 12px;">
                    <div class="flex items-center justify-center bg-indigo-600 dark:bg-indigo-500 shrink-0"
                         style="width: 36px; height: 36px; border-radius: 10px;">
                        <svg fill="none" viewBox="0 0 24 24" stroke="white" style="width: 18px; height: 18px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                    </div>
                    <div class="min-w-0">
                        <div class="flex items-baseline" style="gap: 8px;">
                            <h3 class="font-black text-slate-900 dark:text-white truncate"
                                style="font-size: 16px; line-height: 1.2;"
                                x-text="viewingHistoryProduct?.product_name || 'Lịch sử giao dịch'"></h3>
                            <span class="font-mono text-slate-400 dark:text-slate-500 hidden sm:inline" style="font-size: 11px;"
                                  x-text="viewingHistoryProduct?.product_code || ''"></span>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400" style="font-size: 12px; margin-top: 2px;">Lịch sử giao dịch xuất nhập kho</p>
                    </div>
                </div>
                <button @click="closeHistoryModal()"
                    class="shrink-0 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    style="width: 32px; height: 32px; border-radius: 8px;">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 18px; height: 18px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Filter pills -->
            <div class="flex items-center"
                 style="margin-top: 10px; gap: 6px; overflow-x: auto; scrollbar-width: none;">
                <template x-for="opt in [
                    {value: 'ALL', label: 'Tất cả'},
                    {value: 'IMPORT', label: 'Nhập'},
                    {value: 'EXPORT', label: 'Xuất'},
                    {value: 'ADJUSTMENT', label: 'Cân chỉnh'}
                ]" :key="opt.value">
                    <button type="button"
                        @click="historyFilterType = opt.value"
                        class="shrink-0 font-bold transition-all"
                        style="padding: 5px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap;"
                        :class="historyFilterType === opt.value
                            ? 'bg-indigo-600 text-white'
                            : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700'"
                        x-text="opt.label">
                    </button>
                </template>
            </div>
        </div>

        <!-- Loading -->
        <div x-show="loadingHistory" class="flex items-center justify-center shrink-0" style="padding: 60px 0;">
            <svg class="animate-spin text-indigo-500" fill="none" viewBox="0 0 24 24" style="width: 28px; height: 28px;">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </div>

        <!-- Empty -->
        <div x-show="!loadingHistory && productHistoryList.length === 0"
            class="flex flex-col items-center justify-center text-center shrink-0"
            style="padding: 60px 24px;">
            <div class="flex items-center justify-center bg-slate-100 dark:bg-slate-800"
                 style="width: 56px; height: 56px; border-radius: 16px; margin-bottom: 12px;">
                <svg class="text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 24px; height: 24px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <p class="font-bold text-slate-600 dark:text-slate-300" style="font-size: 13px;">Chưa có lịch sử giao dịch nào.</p>
        </div>

        <!-- Transaction TABLE (desktop) -->
        <div x-show="!loadingHistory && productHistoryList.length > 0"
            class="hidden sm:block flex-1 overflow-auto"
            style="background: white;"
            :class="{ 'dark:bg-slate-900': true }">

            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                <thead class="bg-slate-50 dark:bg-slate-800 sticky top-0 z-10">
                    <tr class="text-slate-600 dark:text-slate-300 font-black uppercase" style="font-size: 11px; letter-spacing: 0.05em;">
                        <th style="padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; width: 50px;">#</th>
                        <th style="padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; width: 140px;">Loại</th>
                        <th style="padding: 10px 14px; text-align: right; border-bottom: 1px solid #e2e8f0; width: 90px;">Số lượng</th>
                        <th style="padding: 10px 14px; text-align: right; border-bottom: 1px solid #e2e8f0; width: 90px;">Tồn sau</th>
                        <th style="padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; width: 150px;">Thời gian</th>
                        <th style="padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0;">Người thực hiện</th>
                        <th style="padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; width: 180px;">Phiếu liên quan</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(h, idx) in getFilteredHistory()" :key="h.id">
                        <tr class="hover:bg-indigo-50/50 dark:hover:bg-slate-800/50 transition-colors"
                            style="border-bottom: 1px solid #f1f5f9;">
                            <!-- Index -->
                            <td class="text-slate-400 dark:text-slate-500 tabular-nums"
                                style="padding: 12px 14px; font-size: 12px;"
                                x-text="idx + 1"></td>

                            <!-- Type badge -->
                            <td style="padding: 12px 14px;">
                                <span class="inline-flex font-bold uppercase"
                                    style="padding: 4px 10px; border-radius: 6px; font-size: 11px; letter-spacing: 0.03em; white-space: nowrap;"
                                    :class="{
                                        'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300': h.quantity_change > 0,
                                        'bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300': h.quantity_change < 0 && h.type !== 'ADJUSTMENT',
                                        'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300': h.type === 'ADJUSTMENT'
                                    }"
                                    x-text="getLocalizedTransactionType(h.type)">
                                </span>
                            </td>

                            <!-- Quantity -->
                            <td class="font-black tabular-nums text-right"
                                style="padding: 12px 14px; font-size: 14px;"
                                :class="{
                                    'text-emerald-600 dark:text-emerald-400': h.quantity_change > 0,
                                    'text-rose-600 dark:text-rose-400': h.quantity_change < 0 && h.type !== 'ADJUSTMENT',
                                    'text-blue-600 dark:text-blue-400': h.type === 'ADJUSTMENT'
                                }"
                                x-text="(h.quantity_change > 0 ? '+' : '') + h.quantity_change">
                            </td>

                            <!-- Balance after -->
                            <td class="font-bold tabular-nums text-right text-slate-700 dark:text-slate-200"
                                style="padding: 12px 14px;"
                                x-text="h.balance_after">
                            </td>

                            <!-- Time -->
                            <td class="text-slate-600 dark:text-slate-300 tabular-nums whitespace-nowrap"
                                style="padding: 12px 14px; font-size: 12px;"
                                x-text="new Date(h.created_at).toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})">
                            </td>

                            <!-- Actor -->
                            <td class="text-slate-700 dark:text-slate-200 truncate"
                                style="padding: 12px 14px; max-width: 160px;"
                                x-text="h.actor_name">
                            </td>

                            <!-- Ref code -->
                            <td style="padding: 12px 14px;">
                                <button x-show="h.ref_code && h.ref_code !== 'N/A'"
                                    type="button"
                                    class="inline-flex items-center text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-200 hover:underline font-mono"
                                    style="gap: 4px; font-size: 11px; font-weight: 700;"
                                    @click.stop="openReference(h)"
                                    title="Click để xem chi tiết hoặc sao chép mã">
                                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 12px; height: 12px;">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                    <span x-text="h.ref_code"></span>
                                </button>
                                <span x-show="!h.ref_code || h.ref_code === 'N/A'" class="text-slate-300 dark:text-slate-600">—</span>
                            </td>
                        </tr>
                    </template>
                    <!-- Empty filtered state -->
                    <tr x-show="getFilteredHistory().length === 0">
                        <td colspan="7" style="padding: 48px 24px; text-align: center;">
                            <div class="flex flex-col items-center justify-center" style="gap: 10px;">
                                <div class="flex items-center justify-center bg-slate-100 dark:bg-slate-800"
                                     style="width: 48px; height: 48px; border-radius: 14px;">
                                    <svg class="text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 22px; height: 22px;">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    </svg>
                                </div>
                                <p class="font-bold text-slate-600 dark:text-slate-300" style="font-size: 13px;">Không có giao dịch nào trong bộ lọc này.</p>
                                <p class="text-slate-400 dark:text-slate-500" style="font-size: 12px;">Thử chọn "Tất cả" để xem toàn bộ lịch sử.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile list view -->
        <div x-show="!loadingHistory && productHistoryList.length > 0"
            class="sm:hidden flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-950"
            style="padding: 10px 12px;">
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <template x-for="h in getFilteredHistory()" :key="h.id">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700"
                        style="border-radius: 10px; padding: 10px 12px;">
                        <div class="flex items-center justify-between" style="gap: 10px; margin-bottom: 6px;">
                            <span class="inline-flex font-bold uppercase"
                                style="padding: 3px 8px; border-radius: 5px; font-size: 10px; letter-spacing: 0.04em;"
                                :class="{
                                    'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300': h.quantity_change > 0,
                                    'bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300': h.quantity_change < 0 && h.type !== 'ADJUSTMENT',
                                    'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300': h.type === 'ADJUSTMENT'
                                }"
                                x-text="getLocalizedTransactionType(h.type)">
                            </span>
                            <span class="font-black tabular-nums"
                                style="font-size: 16px;"
                                :class="{
                                    'text-emerald-600 dark:text-emerald-400': h.quantity_change > 0,
                                    'text-rose-600 dark:text-rose-400': h.quantity_change < 0 && h.type !== 'ADJUSTMENT',
                                    'text-blue-600 dark:text-blue-400': h.type === 'ADJUSTMENT'
                                }"
                                x-text="(h.quantity_change > 0 ? '+' : '') + h.quantity_change">
                            </span>
                        </div>
                        <div class="text-slate-500 dark:text-slate-400" style="font-size: 11px; margin-bottom: 4px;">
                            Tồn sau: <strong class="font-black tabular-nums text-slate-800 dark:text-slate-100" x-text="h.balance_after"></strong>
                        </div>
                        <div class="flex items-center text-slate-500 dark:text-slate-400" style="gap: 10px; font-size: 11px;">
                            <span class="tabular-nums" x-text="new Date(h.created_at).toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})"></span>
                            <span>•</span>
                            <span class="font-semibold text-slate-700 dark:text-slate-200 truncate" x-text="h.actor_name"></span>
                        </div>
                        <button x-show="h.ref_code && h.ref_code !== 'N/A'"
                            type="button"
                            class="inline-flex items-center text-indigo-600 dark:text-indigo-400 font-mono"
                            style="gap: 4px; font-size: 10px; font-weight: 700; margin-top: 4px;"
                            @click.stop="openReference(h)">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 10px; height: 10px;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                            </svg>
                            <span x-text="h.ref_code"></span>
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Footer -->
        <div class="shrink-0 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between bg-slate-50 dark:bg-slate-800"
             style="padding: 10px 20px; gap: 12px;">
            <span class="text-slate-600 dark:text-slate-400" style="font-size: 12px;" x-show="!loadingHistory">
                Tổng <strong class="font-black text-slate-900 dark:text-white" x-text="getFilteredHistory().length"></strong> giao dịch
            </span>
            <button type="button" @click="closeHistoryModal()"
                class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold hover:opacity-80 transition-opacity"
                style="padding: 7px 18px; border-radius: 8px; font-size: 12px;">
                Đóng
            </button>
        </div>
    </div>
</div>
