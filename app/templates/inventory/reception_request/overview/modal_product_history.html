<div x-show="isHistoryModalOpen" class="fixed inset-0 z-50 flex items-center justify-center" x-cloak
     style="padding: 1rem; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);">
    <div class="absolute inset-0" @click="closeHistoryModal()"></div>

    <div class="relative z-10 flex flex-col bg-white dark:bg-slate-900"
         style="width: min(560px, calc(100vw - 2rem)); max-height: 86vh; border-radius: 24px; overflow: hidden;">

        <!-- Header -->
        <div class="shrink-0 px-5 pt-5 pb-4 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                    <h3 class="text-sm font-black text-slate-900 dark:text-white leading-tight">
                        Lịch sử giao dịch
                    </h3>
                    <p class="mt-0.5 text-base font-black text-indigo-600 dark:text-indigo-400 truncate"
                        x-text="viewingHistoryProduct?.product_name || ''"></p>
                    <p class="mt-0.5 text-[10px] font-mono text-slate-400 uppercase tracking-wider"
                        x-text="viewingHistoryProduct?.product_code || ''"></p>
                </div>
                <button @click="closeHistoryModal()"
                    class="shrink-0 w-8 h-8 flex items-center justify-center rounded-xl text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Filter -->
            <div class="mt-3 flex items-center gap-2 flex-wrap">
                <template x-for="opt in [
                    {value: 'ALL', label: 'Tất cả'},
                    {value: 'IMPORT', label: 'Nhập'},
                    {value: 'EXPORT', label: 'Xuất'},
                    {value: 'ADJUSTMENT', label: 'Cân chỉnh'}
                ]" :key="opt.value">
                    <button type="button"
                        @click="historyFilterType = opt.value"
                        class="px-3 py-1 rounded-lg text-xs font-bold transition-colors"
                        :class="historyFilterType === opt.value
                            ? 'bg-indigo-600 text-white'
                            : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700'"
                        x-text="opt.label">
                    </button>
                </template>
            </div>
        </div>

        <!-- Loading -->
        <div x-show="loadingHistory" class="flex items-center justify-center py-14 shrink-0">
            <svg class="animate-spin h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </div>

        <!-- Empty -->
        <div x-show="!loadingHistory && productHistoryList.length === 0"
            class="flex flex-col items-center justify-center py-14 text-center px-6 shrink-0">
            <div class="w-12 h-12 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-3">
                <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <p class="text-sm font-bold text-slate-500 dark:text-slate-400">Chưa có lịch sử giao dịch nào.</p>
        </div>

        <!-- Transaction list -->
        <div x-show="!loadingHistory && productHistoryList.length > 0"
            class="flex-1 overflow-y-auto custom-scrollbar px-4 py-3 space-y-2">
            <template x-for="h in getFilteredHistory()" :key="h.id">
                <div class="rounded-2xl border overflow-hidden"
                    :class="h.quantity_change > 0
                        ? 'border-emerald-100 dark:border-emerald-800/40 bg-emerald-50/50 dark:bg-emerald-900/10'
                        : 'border-rose-100 dark:border-rose-800/40 bg-rose-50/50 dark:bg-rose-900/10'">

                    <div class="flex items-start gap-3 px-4 py-3">
                        <!-- Change indicator -->
                        <div class="shrink-0 mt-0.5 w-8 h-8 rounded-xl flex items-center justify-center font-black text-xs tabular-nums"
                            :class="h.quantity_change > 0
                                ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300'
                                : 'bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-300'"
                            x-text="(h.quantity_change > 0 ? '+' : '') + h.quantity_change">
                        </div>

                        <!-- Main info -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="text-xs font-black px-2 py-0.5 rounded-lg"
                                    :class="{
                                        'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300': h.quantity_change > 0,
                                        'bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-300': h.quantity_change < 0,
                                        'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300': h.type === 'ADJUSTMENT'
                                    }"
                                    x-text="getLocalizedTransactionType(h.type)">
                                </span>
                                <span class="text-[10px] font-mono text-slate-400 dark:text-slate-500">
                                    Tồn sau: <strong class="text-slate-700 dark:text-slate-200" x-text="h.balance_after"></strong>
                                </span>
                            </div>

                            <div class="mt-1.5 flex items-center gap-3 flex-wrap text-xs text-slate-500 dark:text-slate-400">
                                <!-- Time -->
                                <span class="flex items-center gap-1">
                                    <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    <span x-text="new Date(h.created_at).toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})"></span>
                                </span>
                                <!-- Actor -->
                                <span class="flex items-center gap-1">
                                    <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                    <span class="font-semibold text-slate-700 dark:text-slate-200" x-text="h.actor_name"></span>
                                </span>
                                <!-- Ref -->
                                <span x-show="h.ref_code && h.ref_code !== 'N/A'"
                                    class="flex items-center gap-1 cursor-pointer text-indigo-600 dark:text-indigo-400 hover:underline"
                                    @click.stop="openReference(h)"
                                    title="Click để xem chi tiết hoặc sao chép mã">
                                    <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                    <span class="font-mono text-[10px]" x-text="h.ref_code"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Footer -->
        <div class="shrink-0 px-5 py-3 border-t border-slate-100 dark:border-slate-800 flex justify-end bg-white/80 dark:bg-slate-900/80">
            <button type="button" @click="closeHistoryModal()"
                class="px-5 py-2 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-black uppercase tracking-wider hover:opacity-80 transition-opacity">
                Đóng
            </button>
        </div>
    </div>
</div>
