<div x-show="currentTab === 'overview'" class="inv-tab-page" x-cloak>

    <!-- Main Content Area with Scroll -->
    <div class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pb-10">

        <!-- Skeleton Loading -->
        <div x-show="loadingOverview" x-cloak class="space-y-4">
            <!-- Stats row skeleton -->
            <div class="inv-stats-row grid grid-cols-1 md:grid-cols-4 xl:grid-cols-4 gap-4">
                <!-- Flow card skeleton -->
                <div class="md:col-span-2 xl:col-span-2 skeleton-card p-5 flex flex-col gap-4">
                    <div class="flex items-start justify-between">
                        <div class="flex flex-col gap-2">
                            <div class="skeleton skeleton-text" style="width:70px;"></div>
                            <div class="skeleton skeleton-text-xl" style="width:50px;"></div>
                        </div>
                        <div class="flex gap-2">
                            <div class="skeleton skeleton-badge" style="width:60px;"></div>
                            <div class="skeleton skeleton-badge" style="width:60px;"></div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3 skeleton-stagger">
                        <template x-for="i in 3" :key="i">
                            <div class="flex items-center gap-3">
                                <div class="skeleton skeleton-text" style="width:72px;flex-shrink:0;"></div>
                                <div class="skeleton skeleton-progress flex-1"></div>
                                <div class="skeleton skeleton-text" style="width:48px;flex-shrink:0;"></div>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- Health card skeleton -->
                <div class="skeleton-card p-5 flex flex-col gap-4">
                    <div class="flex items-start justify-between">
                        <div class="flex flex-col gap-2">
                            <div class="skeleton skeleton-text" style="width:80px;"></div>
                            <div class="skeleton skeleton-text-xl" style="width:40px;"></div>
                        </div>
                        <div class="skeleton skeleton-badge" style="width:56px;"></div>
                    </div>
                    <div class="flex justify-center">
                        <div class="skeleton skeleton-circle" style="width:96px;height:96px;"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="skeleton" style="height:36px;border-radius:10px;"></div>
                        <div class="skeleton" style="height:36px;border-radius:10px;"></div>
                    </div>
                </div>
                <!-- Cashflow tiles skeleton -->
                <div class="flex flex-col gap-3">
                    <template x-for="i in 3" :key="i">
                        <div class="skeleton" style="height:56px;border-radius:12px;flex:1;"></div>
                    </template>
                </div>
            </div>
            <!-- Stock toolbar skeleton -->
            <div class="skeleton-card p-4 flex items-center justify-between gap-3">
                <div class="skeleton skeleton-text-lg" style="width:100px;"></div>
                <div class="flex gap-2">
                    <div class="skeleton" style="width:160px;height:34px;border-radius:8px;"></div>
                    <div class="skeleton" style="width:120px;height:34px;border-radius:8px;"></div>
                    <div class="skeleton" style="width:200px;height:34px;border-radius:8px;"></div>
                </div>
            </div>
            <!-- Stock cards skeleton -->
            <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-4 skeleton-stagger">
                <template x-for="i in 6" :key="i">
                    <div class="skeleton-card p-5 flex flex-col gap-3">
                        <div class="flex items-start justify-between">
                            <div class="flex flex-col gap-2 flex-1">
                                <div class="skeleton skeleton-text" style="width:70%;"></div>
                                <div class="skeleton skeleton-text-sm" style="width:40%;"></div>
                            </div>
                            <div class="skeleton skeleton-badge" style="width:52px;"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="skeleton" style="height:52px;border-radius:10px;"></div>
                            <div class="skeleton" style="height:52px;border-radius:10px;"></div>
                            <div class="skeleton" style="height:52px;border-radius:10px;"></div>
                        </div>
                        <div class="skeleton skeleton-progress"></div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="!loadingOverview" class="space-y-4">

            <!-- Flow, Health & Cashflow -->
            <div class="inv-stats-row grid grid-cols-1 md:grid-cols-4 xl:grid-cols-4 gap-4">
                <div class="md:col-span-2 xl:col-span-2 inv-glass-card inv-flow-card">
                    <div class="inv-glass-head">
                        <div class="min-w-0">
                            <p class="inv-glass-eyebrow">Luồng phiếu</p>
                            <div class="inv-glass-headline">
                                <span class="inv-glass-figure" x-text="stats.totalRequests || 0"></span>
                                <span class="inv-glass-figure-label">tổng phiếu</span>
                            </div>
                        </div>
                        <div class="inv-glass-pillset">
                            <span class="inv-glass-stat hover:scale-105 transition-transform duration-200 cursor-pointer" data-tone="success">
                                <span class="inv-glass-stat-dot"></span>
                                <svg class="w-3.5 h-3.5 mr-0.5 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 13l-7 7-7-7m14-6l-7 7-7-7" />
                                </svg>
                                <strong x-text="stats.totalImports || 0" class="mr-1"></strong>
                                <span>Nhập</span>
                            </span>
                            <span class="inv-glass-stat hover:scale-105 transition-transform duration-200 cursor-pointer" data-tone="primary">
                                <span class="inv-glass-stat-dot"></span>
                                <svg class="w-3.5 h-3.5 mr-0.5 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 11l7-7 7 7M5 19l7-7 7 7" />
                                </svg>
                                <strong x-text="stats.totalExports || 0" class="mr-1"></strong>
                                <span>Xuất</span>
                            </span>
                        </div>
                    </div>

                    <div class="inv-flow-stack">
                        <div class="inv-flow-row group/row" data-tone="warning">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="inv-flow-row-label truncate">Chờ duyệt</span>
                            </div>
                            <div class="inv-flow-rail">
                                <span :style="`width: ${stats.totalRequests > 0 ? Math.round(((stats.pendingRequests || 0) / stats.totalRequests) * 100) : 0}%`"></span>
                            </div>
                            <span class="inv-flow-row-num">
                                <strong x-text="stats.pendingRequests || 0"></strong>
                                <em class="px-1.5 py-0.5 rounded-md bg-slate-100/80 dark:bg-slate-800/80 text-[9px] font-black tracking-tight border border-slate-200/40 dark:border-slate-700/40" x-text="`${stats.totalRequests > 0 ? Math.round(((stats.pendingRequests || 0) / stats.totalRequests) * 100) : 0}%`"></em>
                            </span>
                        </div>
                        <div class="inv-flow-row group/row" data-tone="info">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="inv-flow-row-label truncate">Đang giao</span>
                            </div>
                            <div class="inv-flow-rail">
                                <span :style="`width: ${stats.totalRequests > 0 ? Math.round(((stats.shippingRequests || 0) / stats.totalRequests) * 100) : 0}%`"></span>
                            </div>
                            <span class="inv-flow-row-num">
                                <strong x-text="stats.shippingRequests || 0"></strong>
                                <em class="px-1.5 py-0.5 rounded-md bg-slate-100/80 dark:bg-slate-800/80 text-[9px] font-black tracking-tight border border-slate-200/40 dark:border-slate-700/40" x-text="`${stats.totalRequests > 0 ? Math.round(((stats.shippingRequests || 0) / stats.totalRequests) * 100) : 0}%`"></em>
                            </span>
                        </div>
                        <div class="inv-flow-row group/row" data-tone="success">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="inv-flow-row-label truncate">Hoàn thành</span>
                            </div>
                            <div class="inv-flow-rail">
                                <span :style="`width: ${stats.totalRequests > 0 ? Math.round(((stats.completedRequests || 0) / stats.totalRequests) * 100) : 0}%`"></span>
                            </div>
                            <span class="inv-flow-row-num">
                                <strong x-text="stats.completedRequests || 0"></strong>
                                <em class="px-1.5 py-0.5 rounded-md bg-slate-100/80 dark:bg-slate-800/80 text-[9px] font-black tracking-tight border border-slate-200/40 dark:border-slate-700/40" x-text="`${stats.totalRequests > 0 ? Math.round(((stats.completedRequests || 0) / stats.totalRequests) * 100) : 0}%`"></em>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="inv-glass-card inv-health-card-v2">
                    <div class="inv-glass-head">
                        <div>
                            <p class="inv-glass-eyebrow">Sức khỏe kho</p>
                            <div class="inv-glass-headline">
                                <span class="inv-glass-figure" x-text="stocks.length || 0"></span>
                                <span class="inv-glass-figure-label">mã hàng</span>
                            </div>
                        </div>
                        <span class="inv-health-status shadow-sm border border-slate-200/20"
                               :data-tone="(stats.stockWarningPercentage || 0) >= 30 ? 'danger' : (stats.stockWarningPercentage || 0) >= 10 ? 'warning' : 'success'">
                            <div class="flex items-center gap-1">
                                <span class="text-[13px] font-black" x-text="`${Math.round(stats.stockWarningPercentage || 0)}%`"></span>
                                <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path x-show="(stats.stockWarningPercentage || 0) > 0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8L10 17l-4-4-6 6" />
                                    <path x-show="(stats.stockWarningPercentage || 0) === 0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-wider opacity-85">rủi ro</span>
                        </span>
                    </div>

                    <div class="inv-health-ring-wrap">
                        <svg class="inv-health-ring" viewBox="0 0 120 120" aria-hidden="true">
                            <defs>
                                <linearGradient id="invHealthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#24B1B1" />
                                    <stop offset="100%" stop-color="#FFE0C5" />
                                </linearGradient>
                            </defs>
                            <circle cx="60" cy="60" r="50" class="inv-health-ring-track" />
                            <circle cx="60" cy="60" r="50" class="inv-health-ring-fill"
                                stroke="url(#invHealthGradient)"
                                :stroke-dasharray="2 * Math.PI * 50"
                                :stroke-dashoffset="2 * Math.PI * 50 * (1 - ((stats.stockWarningPercentage || 0) / 100))" />
                        </svg>
                        <div class="inv-health-ring-center flex flex-col items-center justify-center">
                            <span class="inv-health-ring-num font-black leading-none" x-text="stats.stockWarningCount || 0"></span>
                            <span class="inv-health-ring-cap text-[9px] font-black uppercase tracking-wider text-slate-400 mt-1" x-text="(stats.stockWarningCount || 0) > 0 ? 'cảnh báo' : 'an toàn'"></span>
                        </div>
                    </div>

                    <div class="inv-health-split">
                        <div class="inv-health-split-row group/split border border-slate-100 dark:border-slate-800 hover:border-emerald-500/20 transition-all duration-200" data-tone="success">
                            <span class="inv-health-split-dot"></span>
                            <span class="inv-health-split-label">Ổn định</span>
                            <strong class="font-black text-slate-800 dark:text-white" x-text="(stocks.length || 0) - (stats.stockWarningCount || 0)"></strong>
                        </div>
                        <div class="inv-health-split-row group/split border border-slate-100 dark:border-slate-800 hover:border-amber-500/20 transition-all duration-200" data-tone="warning">
                            <span class="inv-health-split-dot"></span>
                            <span class="inv-health-split-label">Cảnh báo</span>
                            <strong class="font-black text-slate-800 dark:text-white" x-text="stats.stockWarningCount || 0"></strong>
                        </div>
                    </div>
                </div>

                <!-- Cashflow Column — 3 stat tiles -->
                <div class="flex flex-col gap-3">
                    <div class="inv-cf-tile" data-accent="inflow">
                        <div class="inv-cf-tile-icon">
                            <!-- Premium Trending Up / Inflow Icon -->
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8L10 17l-4-4-6 6" />
                            </svg>
                        </div>
                        <div class="inv-cf-tile-body">
                            <span class="inv-cf-tile-label">Tiền vào</span>
                            <span class="inv-cf-tile-value" x-text="formatMoney(getCashInflow())"></span>
                        </div>
                        <div class="inv-cf-tile-bar">
                            <div class="inv-cf-tile-bar-fill" :style="`width: ${getCashflowWidth(getCashInflow())}`"></div>
                        </div>
                    </div>

                    <div class="inv-cf-tile" data-accent="outflow">
                        <div class="inv-cf-tile-icon">
                            <!-- Premium Trending Down / Outflow Icon -->
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 17h8m0 0V9m0 8L10 7l-4 4-6-6" />
                            </svg>
                        </div>
                        <div class="inv-cf-tile-body">
                            <span class="inv-cf-tile-label">Tiền ra</span>
                            <span class="inv-cf-tile-value" x-text="formatMoney(getCashOutflow())"></span>
                        </div>
                        <div class="inv-cf-tile-bar">
                            <div class="inv-cf-tile-bar-fill" :style="`width: ${getCashflowWidth(getCashOutflow())}`"></div>
                        </div>
                    </div>

                    <div class="inv-cf-tile" :data-accent="getNetCashflow() >= 0 ? 'net-pos' : 'net-neg'">
                        <div class="inv-cf-tile-icon">
                            <!-- Premium Balance Scales Icon -->
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 3v17M3 12h18M3 12l4.5-4.5m13.5 4.5L16.5 7.5M9 21h6" />
                            </svg>
                        </div>
                        <div class="inv-cf-tile-body">
                            <span class="inv-cf-tile-label">Thuần</span>
                            <span class="inv-cf-tile-value" x-text="formatMoney(getNetCashflow())"></span>
                        </div>
                        <div class="inv-cf-tile-bar">
                            <div class="inv-cf-tile-bar-fill" :style="`width: ${getCashflowWidth(getNetCashflow())}`"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Inventory Section Header -->
            <div class="inv-stock-toolbar-v2 mt-6 relative overflow-hidden">
                <!-- Diagonal Cross Top Right Fade Grid Background -->
                <div class="absolute inset-0 pointer-events-none opacity-60 dark:opacity-[0.15]"
                     style="background-image: linear-gradient(45deg, transparent 49%, var(--inv-border) 49%, var(--inv-border) 51%, transparent 51%), linear-gradient(-45deg, transparent 49%, var(--inv-border) 49%, var(--inv-border) 51%, transparent 51%); background-size: 32px 32px; -webkit-mask-image: radial-gradient(ellipse 80% 80% at 0% 0%, #000 50%, transparent 90%); mask-image: radial-gradient(ellipse 80% 80% at 0% 0%, #000 50%, transparent 90%); z-index: 0;">
                </div>

                <!-- Row 1: Title + date + view toggle -->
                <div class="inv-stb-row inv-stb-row-top relative z-10">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="inv-stb-title">Tồn kho</span>
                        <div class="inv-panel-pills">
                            <span><strong x-text="getFlatFilteredStocks().length"></strong> hiển thị</span>
                            <span><strong x-text="stocks.length || 0"></strong> tổng</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <!-- Date range picker -->
                        <div class="inv-stb-datepicker" x-init="$nextTick(() => initOverviewRangePickers($el))">
                            <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <input type="text" placeholder="dd/mm/yyyy" data-overview-date="from" readonly
                                class="inv-stb-date-input">
                            <span class="inv-stb-date-sep">→</span>
                            <input type="text" placeholder="dd/mm/yyyy" data-overview-date="to" readonly
                                class="inv-stb-date-input">
                            <button @click="resetToCurrentMonth()" class="inv-stb-date-reset" title="Về tháng hiện tại">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                        </div>
                        <!-- View toggle -->
                        <div class="inv-segmented">
                            <button type="button" @click="stockViewMode = 'cards'"
                                :class="stockViewMode === 'cards' ? 'is-active' : ''"
                                class="inv-segmented-btn" title="Dạng thẻ">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                                </svg>
                            </button>
                            <button type="button" @click="stockViewMode = 'list'"
                                :class="stockViewMode === 'list' ? 'is-active' : ''"
                                class="inv-segmented-btn" title="Dạng danh sách">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10M4 18h10" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Row 2: Filters + search + actions -->
                <div class="inv-stb-row inv-stb-row-filters relative z-10">
                    <!-- Status pills -->
                    <div class="inv-stb-status-pills">
                        <template x-for="opt in [
                            {value: 'ALL', label: 'Tất cả'},
                            {value: 'STABLE', label: 'Ổn định'},
                            {value: 'WARNING', label: 'Cảnh báo'}
                        ]" :key="opt.value">
                            <button type="button"
                                @click="stockStatusFilter = opt.value"
                                class="inv-stb-status-btn"
                                :class="stockStatusFilter === opt.value ? 'is-active' : ''"
                                :data-status="opt.value.toLowerCase()">
                                <span x-text="opt.label"></span>
                                <span class="inv-stb-status-count" x-text="getStockCountByStatus(opt.value)"></span>
                            </button>
                        </template>
                    </div>

                    <!-- Category select -->
                    <select x-model="selectedCategory" class="inv-field inv-stb-category">
                        <template x-for="category in getAvailableCategories()" :key="category">
                            <option :value="category === 'Tất cả' ? '' : category" x-text="category"></option>
                        </template>
                    </select>

                    <!-- Search -->
                    <div class="relative inv-stb-search">
                        <input type="text" x-model="stockSearch" placeholder="Tìm tên hoặc mã sản phẩm..."
                            class="inv-field-search w-full">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex items-center gap-2 shrink-0 ml-auto">
                        <button x-show="selectedCategory || stockSearch || stockStatusFilter !== 'ALL' || stockSortField"
                            @click="resetStockFilters()"
                            class="inv-btn-secondary px-3"
                            title="Xóa bộ lọc">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </button>
                        <button type="button" @click="exportStockToExcel()"
                            class="inv-btn-secondary inline-flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                            </svg>
                            Excel
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stock List Display Area -->
            <div class="min-h-[400px]">
                <!-- Not Current Month Alert -->
                <div x-show="!isCurrentMonth()" class="inv-table-card min-h-[360px] flex flex-col items-center justify-center text-center p-10 bg-slate-50/50 dark:bg-slate-900/30">
                    <div class="w-20 h-20 rounded-full bg-amber-50 dark:bg-amber-900/20 flex items-center justify-center mb-4 border-4 border-white dark:border-slate-800 shadow-sm">
                        <svg class="w-10 h-10 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h4 class="text-lg font-black text-slate-800 dark:text-slate-100" x-text="getOverviewRangeLabel()"></h4>
                    <span class="mt-2 inv-risk-chip">Chi tiết tồn kho chỉ mở cho tháng hiện tại</span>
                    <button @click="resetToCurrentMonth()" class="mt-6 inv-btn-primary">Về tháng hiện tại</button>
                </div>

                <div x-show="isCurrentMonth()">
                    <!-- Empty State -->
                    <div x-show="stocks.length === 0" class="inv-table-card min-h-[360px] flex flex-col items-center justify-center p-10">
                        <div class="inv-empty-icon w-16 h-16">
                            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5" />
                            </svg>
                        </div>
                        <p class="mt-4 text-sm font-bold text-slate-500">Chưa có dữ liệu tồn kho cho kho này.</p>
                    </div>

                    <!-- Cards View -->
                    <div x-show="stockViewMode === 'cards'" class="space-y-8 mt-2">
                        <template x-for="(items, categoryName) in filteredGroupedStocks()" :key="categoryName">
                            <section>
                                <div class="mb-4 flex items-center gap-3">
                                    <span class="flex-shrink-0 w-1.5 h-6 rounded-full bg-primary-500 shadow-[0_0_8px_rgba(244,143,104,0.4)]"></span>
                                    <h4 class="font-black text-slate-800 dark:text-slate-100 uppercase tracking-wide text-sm" x-text="categoryName"></h4>
                                    <span class="px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-[10px] font-black text-slate-500" x-text="`${items.length} SẢN PHẨM`"></span>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-4">
                                    <template x-for="item in items" :key="item.product_code">
                                        <article @click="openProductHistory(item)"
                                            class="group relative overflow-hidden rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 shadow-sm hover:border-primary-400 hover:shadow-xl transition-all duration-300 cursor-pointer">

                                            <!-- Status Tag -->
                                            <div class="absolute top-0 right-0 p-3">
                                                <span class="px-2 py-1 rounded-bl-xl rounded-tr-lg text-[10px] font-black uppercase tracking-tighter"
                                                    :class="getStockStatusClass(item)" x-text="item.status"></span>
                                            </div>

                                            <div class="flex flex-col h-full">
                                                <div class="mb-4">
                                                    <h5 class="text-sm font-black text-slate-900 dark:text-white group-hover:text-primary-600 transition-colors" x-text="item.product_name"></h5>
                                                    <p class="mt-1 text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest" x-text="item.product_code"></p>
                                                </div>

                                                <div class="grid grid-cols-3 gap-3 mb-5">
                                                    <div class="rounded-xl bg-slate-100 dark:bg-slate-800 p-2.5 border border-slate-200 dark:border-slate-700">
                                                        <p class="text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase">Tồn kho</p>
                                                        <p class="mt-1 text-sm font-black text-slate-900 dark:text-white truncate" x-text="item.display_quantity || `${item.quantity || 0} ${item.base_unit || ''}`"></p>
                                                    </div>
                                                    <div class="rounded-xl bg-emerald-100 dark:bg-emerald-900/40 p-2.5 border border-emerald-200 dark:border-emerald-700/50">
                                                        <p class="text-[9px] font-black text-emerald-700 dark:text-emerald-300 uppercase">Nhập</p>
                                                        <p class="mt-1 text-sm font-black text-emerald-800 dark:text-emerald-200" x-text="item.total_import ?? 0"></p>
                                                    </div>
                                                    <div class="rounded-xl bg-rose-100 dark:bg-rose-900/40 p-2.5 border border-rose-200 dark:border-rose-700/50">
                                                        <p class="text-[9px] font-black text-rose-700 dark:text-rose-300 uppercase">Xuất</p>
                                                        <p class="mt-1 text-sm font-black text-rose-800 dark:text-rose-200" x-text="item.total_export ?? 0"></p>
                                                    </div>
                                                </div>

                                                <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                                    <div class="flex-1 mr-4">
                                                        <div class="h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                                                            <div class="h-full rounded-full bg-primary-500" :style="`width: ${getStockProgress(item)}%`"></div>
                                                        </div>
                                                    </div>
                                                    <button type="button" @click.stop="openProductHistory(item)"
                                                        class="shrink-0 flex items-center gap-1.5 text-[11px] font-black text-primary-600 hover:text-primary-700 transition-colors uppercase tracking-tight">
                                                        Audit Log
                                                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        </article>
                                    </template>
                                </div>
                            </section>
                        </template>
                    </div>

                    <!-- List View -->
                    <div x-show="stockViewMode === 'list'" class="inv-table-card mt-2">
                        <div class="inv-table-scroll">
                            <table class="w-full text-sm">
                                <thead class="inv-table-head">
                                    <tr>
                                        <th class="px-4 py-3 text-left">
                                            <button type="button" @click="setStockSort('product_name')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors"
                                                :class="stockSortField === 'product_name' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Sản phẩm
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('product_name')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-left">
                                            <button type="button" @click="setStockSort('categoryName')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors"
                                                :class="stockSortField === 'categoryName' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Nhóm
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('categoryName')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-right">
                                            <button type="button" @click="setStockSort('quantity')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors ml-auto"
                                                :class="stockSortField === 'quantity' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Tồn
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('quantity')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-right">
                                            <button type="button" @click="setStockSort('total_import')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors ml-auto"
                                                :class="stockSortField === 'total_import' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Nhập
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('total_import')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-right">
                                            <button type="button" @click="setStockSort('total_export')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors ml-auto"
                                                :class="stockSortField === 'total_export' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Xuất
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('total_export')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-center">
                                            <button type="button" @click="setStockSort('status')"
                                                class="inline-flex items-center gap-1 font-black uppercase tracking-tighter hover:text-primary-600 transition-colors mx-auto"
                                                :class="stockSortField === 'status' ? 'text-primary-600 dark:text-primary-400' : ''">
                                                Trạng thái
                                                <span class="text-[10px] tabular-nums" x-text="getStockSortIcon('status')"></span>
                                            </button>
                                        </th>
                                        <th class="px-4 py-3 text-right">Audit</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                                    <template x-for="item in getFlatFilteredStocks()" :key="item.product_code">
                                        <tr class="inv-row cursor-pointer" @click="openProductHistory(item)">
                                            <td class="px-4 py-3">
                                                <div class="font-black text-slate-900 dark:text-white" x-text="item.product_name"></div>
                                                <div class="mt-0.5 text-[10px] font-mono font-bold text-slate-400 uppercase tracking-tighter" x-text="item.product_code"></div>
                                            </td>
                                            <td class="px-4 py-3">
                                                <span class="text-xs font-bold text-slate-500" x-text="item.categoryName"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="font-black text-slate-900 dark:text-white" x-text="item.display_quantity || `${item.quantity || 0} ${item.base_unit || ''}`"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400" x-text="item.total_import ?? 0"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="text-xs font-bold text-rose-600 dark:text-rose-400" x-text="item.total_export ?? 0"></span>
                                            </td>
                                            <td class="px-4 py-3 text-center">
                                                <span class="px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter" :class="getStockStatusClass(item)" x-text="item.status"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <button type="button" @click.stop="openProductHistory(item)"
                                                    class="inv-action-chip px-3 py-1">
                                                    Chi tiết
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
