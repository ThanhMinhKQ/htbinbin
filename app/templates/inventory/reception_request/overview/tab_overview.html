<div x-show="currentTab === 'overview'" class="inv-tab-page" x-cloak>
    <!-- Tab Header -->
    <div class="inv-tab-header inv-overview-header">
        <div class="min-w-0 flex items-center gap-3 inv-overview-warehouse-selector">
            <label class="text-sm font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap">Kho:</label>
            <select x-model="currentWarehouseId"
                @change="initOverview()"
                class="form-select text-sm rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 shadow-sm focus:border-[#F48F68] focus:ring-[#F48F68] w-full sm:w-64">
                <option value="">Chọn Kho Hàng</option>
                <template x-for="w in allWarehouses" :key="w.id">
                    <option :value="w.id" x-text="w.name + (w.branch_name ? ' (' + w.branch_name + ')' : ' (Kho Tổng)')"></option>
                </template>
            </select>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 items-end sm:items-center">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm shadow-sm">
                <input type="month" x-model="selectedMonthInput" @change="updateMonth()"
                    class="border-none bg-transparent text-sm font-bold text-slate-700 dark:text-slate-100 focus:ring-0 cursor-pointer p-0">
                <button @click="resetToCurrentMonth()"
                    class="p-1 rounded-md text-slate-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-slate-700 transition-colors"
                    title="Quay về tháng hiện tại">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <div class="inv-segmented">
                <button type="button" @click="stockViewMode = 'cards'"
                    :class="stockViewMode === 'cards' ? 'is-active' : ''"
                    class="inv-segmented-btn">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    Thẻ
                </button>
                <button type="button" @click="stockViewMode = 'list'"
                    :class="stockViewMode === 'list' ? 'is-active' : ''"
                    class="inv-segmented-btn">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10M4 18h10" />
                    </svg>
                    Danh sách
                </button>
            </div>

            <button type="button" x-show="isCurrentWarehouseBranch()" @click="openShiftSales()"
                class="inv-overview-shift-btn inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-emerald-200 dark:border-emerald-800/60 bg-gradient-to-br from-emerald-50 to-teal-50 dark:from-emerald-900/30 dark:to-teal-900/20 hover:border-emerald-400 hover:shadow-md transition-all"
                title="Xem nhanh các món đã bán trong ca của bạn">
                <span class="inline-flex items-center justify-center w-6 h-6 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-500 text-white shadow-sm shrink-0">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                </span>
                <span class="text-[11px] font-black text-emerald-700 dark:text-emerald-300 whitespace-nowrap">Bán trong ca</span>
            </button>
        </div>
    </div>

    <!-- Main Content Area with Scroll -->
    <div class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pb-10">

        <!-- Skeleton Loading -->
        <div x-show="loadingOverview" x-cloak class="space-y-4">
            <div class="inv-kpi-grid">
                <template x-for="i in 4" :key="i">
                    <div class="inv-kpi-card animate-pulse">
                        <div class="h-3 w-20 bg-slate-200 dark:bg-slate-700 rounded mb-3"></div>
                        <div class="h-8 w-24 bg-slate-200 dark:bg-slate-700 rounded"></div>
                    </div>
                </template>
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
                <div class="xl:col-span-2 inv-table-card p-6 h-48 animate-pulse bg-white/50 dark:bg-slate-800/50"></div>
                <div class="inv-table-card p-6 h-48 animate-pulse bg-white/50 dark:bg-slate-800/50"></div>
            </div>
        </div>

        <div x-show="!loadingOverview" class="space-y-4">
            <!-- Top KPI Grid -->
            <div class="inv-kpi-grid">
                <div class="inv-kpi-card" data-accent="coral">
                    <p class="inv-kpi-label">Yêu cầu</p>
                    <p class="inv-kpi-value" x-text="stats.totalRequests || 0"></p>
                    <div class="mt-3 flex flex-wrap gap-2">
                        <span class="inv-metric-chip is-warning" x-text="`${stats.pendingRequests || 0} chờ`"></span>
                        <span class="inv-metric-chip is-info" x-text="`${stats.shippingRequests || 0} giao`"></span>
                        <span class="inv-metric-chip is-success" x-text="`${stats.completedRequests || 0} xong`"></span>
                    </div>
                    <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5h6M9 12h6m-6 7h6M5 5h.01M5 12h.01M5 19h.01" />
                    </svg>
                </div>

                <div class="inv-kpi-card" data-accent="teal">
                    <p class="inv-kpi-label">Tiền vào</p>
                    <p class="inv-kpi-value text-emerald-600 dark:text-emerald-400" x-text="formatMoney(getCashInflow())"></p>
                    <div class="mt-3 h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div class="h-full rounded-full bg-emerald-500 transition-all duration-700" :style="`width: ${getCashflowWidth(getCashInflow())}`"></div>
                    </div>
                    <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>

                <div class="inv-kpi-card" data-accent="yellow">
                    <p class="inv-kpi-label">Tiền ra</p>
                    <p class="inv-kpi-value text-rose-600 dark:text-rose-400" x-text="formatMoney(getCashOutflow())"></p>
                    <div class="mt-3 h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div class="h-full rounded-full bg-rose-500 transition-all duration-700" :style="`width: ${getCashflowWidth(getCashOutflow())}`"></div>
                    </div>
                    <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>

                <div class="inv-kpi-card" data-accent="slate">
                    <p class="inv-kpi-label">Thuần</p>
                    <p class="inv-kpi-value" :class="getNetCashflow() >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'" x-text="formatMoney(getNetCashflow())"></p>
                    <div class="mt-3 h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-700"
                            :class="getNetCashflow() >= 0 ? 'bg-emerald-500' : 'bg-rose-500'"
                            :style="`width: ${getCashflowWidth(getNetCashflow())}`"></div>
                    </div>
                    <svg class="inv-kpi-watermark" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
            </div>

            <!-- Flow & Health -->
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
                <div class="xl:col-span-2 inv-table-card inv-overview-panel">
                    <div class="inv-panel-topline">
                        <span>Luồng phiếu</span>
                        <div class="inv-panel-pills">
                            <span><strong x-text="stats.totalImports || 0"></strong> nhập</span>
                            <span><strong x-text="stats.totalExports || 0"></strong> xuất</span>
                        </div>
                    </div>

                    <div class="inv-flow-lanes">
                        <template x-for="item in [
                            { label: 'Chờ duyệt', value: stats.pendingRequests || 0, tone: 'warning' },
                            { label: 'Đang giao', value: stats.shippingRequests || 0, tone: 'info' },
                            { label: 'Hoàn thành', value: stats.completedRequests || 0, tone: 'success' }
                        ]" :key="item.label">
                            <div class="inv-flow-lane" :data-tone="item.tone">
                                <div class="inv-flow-lane-head">
                                    <span x-text="item.label"></span>
                                    <strong x-text="item.value"></strong>
                                </div>
                                <div class="inv-flow-track">
                                    <div :style="`width: ${stats.totalRequests > 0 ? Math.round((item.value / stats.totalRequests) * 100) : 0}%`"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="inv-table-card inv-overview-panel inv-health-card">
                    <div class="inv-panel-topline">
                        <span>Sức khỏe kho</span>
                        <span class="inv-risk-chip" x-text="`${Math.round(stats.stockWarningPercentage || 0)}% rủi ro`"></span>
                    </div>

                    <div class="relative py-4 flex flex-col items-center">
                        <div class="relative h-28 w-28">
                            <svg class="h-28 w-28 -rotate-90">
                                <circle cx="56" cy="56" r="48" stroke="currentColor" stroke-width="10" fill="transparent" class="text-slate-100 dark:text-slate-800" />
                                <circle cx="56" cy="56" r="48" stroke="currentColor" stroke-width="10" fill="transparent"
                                    :stroke-dasharray="2 * Math.PI * 48"
                                    :stroke-dashoffset="2 * Math.PI * 48 * (1 - ((stats.stockWarningPercentage || 0) / 100))"
                                    class="text-primary-500 transition-all duration-1000" stroke-linecap="round" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span class="text-3xl font-black text-slate-900 dark:text-white" x-text="stats.stockWarningCount || 0"></span>
                                <span class="text-[9px] font-black uppercase text-slate-400 tracking-tighter">cảnh báo</span>
                            </div>
                        </div>
                    </div>

                    <div class="inv-health-total">
                        <span>Tổng mã hàng</span>
                        <strong x-text="stocks.length || 0"></strong>
                    </div>
                </div>
            </div>

            <!-- Inventory Section Header -->
            <div class="inv-toolbar inv-stock-toolbar">
                <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                    <div class="inv-panel-topline min-w-0">
                        <span>Tồn kho</span>
                        <div class="inv-panel-pills">
                            <span><strong x-text="getFlatFilteredStocks().length"></strong> hiển thị</span>
                            <span><strong x-text="stocks.length || 0"></strong> tổng</span>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-2 w-full xl:w-auto">
                        <select x-model="selectedCategory"
                            class="inv-field w-full sm:w-48">
                            <template x-for="category in getAvailableCategories()" :key="category">
                                <option :value="category === 'Tất cả' ? '' : category" x-text="category"></option>
                            </template>
                        </select>
                        <div class="relative w-full sm:w-72">
                            <input type="text" x-model="stockSearch" placeholder="Tìm tên hoặc mã sản phẩm..."
                                class="inv-field-search w-full">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                        </div>
                        <button x-show="selectedCategory || stockSearch" @click="resetStockFilters()"
                            class="inv-btn-secondary">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                            Xóa lọc
                        </button>
                        <button type="button" @click="exportStockToExcel()"
                            class="inv-btn-secondary shrink-0 inline-flex items-center gap-1.5">
                            <svg class="w-4 h-4 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                            </svg>
                            Xuất Excel
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stock List Display Area -->
            <div class="min-h-[400px]">
                <!-- Not Current Month Alert -->
                <div x-show="!isCurrentMonth()" class="inv-table-card min-h-[360px] flex flex-col items-center justify-center text-center p-10 bg-slate-50/50 dark:bg-slate-900/30">
                    <div class="w-20 h-20 rounded-full bg-amber-50 dark:bg-amber-900/20 flex items-center justify-center mb-4 border-4 border-white dark:border-slate-800 shadow-sm">
                        <svg class="w-10 h-10 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h4 class="text-lg font-black text-slate-800 dark:text-slate-100" x-text="selectedMonthInput"></h4>
                    <span class="mt-2 inv-risk-chip">Chi tiết tồn kho chỉ mở cho tháng hiện tại</span>
                    <button @click="resetToCurrentMonth()" class="mt-6 inv-btn-primary">Về tháng hiện tại</button>
                </div>

                <div x-show="isCurrentMonth()">
                    <!-- Empty State -->
                    <div x-show="stocks.length === 0" class="inv-table-card min-h-[360px] flex flex-col items-center justify-center p-10">
                        <div class="inv-empty-icon w-16 h-16">
                            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5" />
                            </svg>
                        </div>
                        <p class="mt-4 text-sm font-bold text-slate-500">Chưa có dữ liệu tồn kho cho kho này.</p>
                    </div>

                    <!-- Cards View -->
                    <div x-show="stockViewMode === 'cards'" class="space-y-8 mt-2">
                        <template x-for="(items, categoryName) in filteredGroupedStocks()" :key="categoryName">
                            <section>
                                <div class="mb-4 flex items-center gap-3">
                                    <span class="flex-shrink-0 w-1.5 h-6 rounded-full bg-primary-500 shadow-[0_0_8px_rgba(244,143,104,0.4)]"></span>
                                    <h4 class="font-black text-slate-800 dark:text-slate-100 uppercase tracking-wide text-sm" x-text="categoryName"></h4>
                                    <span class="px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-[10px] font-black text-slate-500" x-text="`${items.length} SẢN PHẨM`"></span>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-4">
                                    <template x-for="item in items" :key="item.product_code">
                                        <article @click="openProductHistory(item)"
                                            class="group relative overflow-hidden rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 shadow-sm hover:border-primary-400 hover:shadow-xl transition-all duration-300 cursor-pointer">

                                            <!-- Status Tag -->
                                            <div class="absolute top-0 right-0 p-3">
                                                <span class="px-2 py-1 rounded-bl-xl rounded-tr-lg text-[10px] font-black uppercase tracking-tighter"
                                                    :class="getStockStatusClass(item)" x-text="item.status"></span>
                                            </div>

                                            <div class="flex flex-col h-full">
                                                <div class="mb-4">
                                                    <h5 class="text-sm font-black text-slate-900 dark:text-white group-hover:text-primary-600 transition-colors" x-text="item.product_name"></h5>
                                                    <p class="mt-1 text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest" x-text="item.product_code"></p>
                                                </div>

                                                <div class="grid grid-cols-3 gap-3 mb-5">
                                                    <div class="rounded-xl bg-slate-100 dark:bg-slate-800 p-2.5 border border-slate-200 dark:border-slate-700">
                                                        <p class="text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase">Tồn kho</p>
                                                        <p class="mt-1 text-sm font-black text-slate-900 dark:text-white truncate" x-text="item.display_quantity || `${item.quantity || 0} ${item.base_unit || ''}`"></p>
                                                    </div>
                                                    <div class="rounded-xl bg-emerald-100 dark:bg-emerald-900/40 p-2.5 border border-emerald-200 dark:border-emerald-700/50">
                                                        <p class="text-[9px] font-black text-emerald-700 dark:text-emerald-300 uppercase">Nhập</p>
                                                        <p class="mt-1 text-sm font-black text-emerald-800 dark:text-emerald-200" x-text="item.total_import ?? 0"></p>
                                                    </div>
                                                    <div class="rounded-xl bg-rose-100 dark:bg-rose-900/40 p-2.5 border border-rose-200 dark:border-rose-700/50">
                                                        <p class="text-[9px] font-black text-rose-700 dark:text-rose-300 uppercase">Xuất</p>
                                                        <p class="mt-1 text-sm font-black text-rose-800 dark:text-rose-200" x-text="item.total_export ?? 0"></p>
                                                    </div>
                                                </div>

                                                <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                                    <div class="flex-1 mr-4">
                                                        <div class="h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                                                            <div class="h-full rounded-full bg-primary-500" :style="`width: ${getStockProgress(item)}%`"></div>
                                                        </div>
                                                    </div>
                                                    <button type="button" @click.stop="openProductHistory(item)"
                                                        class="shrink-0 flex items-center gap-1.5 text-[11px] font-black text-primary-600 hover:text-primary-700 transition-colors uppercase tracking-tight">
                                                        Audit Log
                                                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        </article>
                                    </template>
                                </div>
                            </section>
                        </template>
                    </div>

                    <!-- List View -->
                    <div x-show="stockViewMode === 'list'" class="inv-table-card mt-2">
                        <div class="inv-table-scroll">
                            <table class="w-full text-sm">
                                <thead class="inv-table-head">
                                    <tr>
                                        <th class="px-4 py-3 text-left">Sản phẩm</th>
                                        <th class="px-4 py-3 text-left">Nhóm</th>
                                        <th class="px-4 py-3 text-right">Tồn</th>
                                        <th class="px-4 py-3 text-right">Nhập</th>
                                        <th class="px-4 py-3 text-right">Xuất</th>
                                        <th class="px-4 py-3 text-center">Trạng thái</th>
                                        <th class="px-4 py-3 text-right">Audit</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                                    <template x-for="item in getFlatFilteredStocks()" :key="item.product_code">
                                        <tr class="inv-row cursor-pointer" @click="openProductHistory(item)">
                                            <td class="px-4 py-3">
                                                <div class="font-black text-slate-900 dark:text-white" x-text="item.product_name"></div>
                                                <div class="mt-0.5 text-[10px] font-mono font-bold text-slate-400 uppercase tracking-tighter" x-text="item.product_code"></div>
                                            </td>
                                            <td class="px-4 py-3">
                                                <span class="text-xs font-bold text-slate-500" x-text="item.categoryName"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="font-black text-slate-900 dark:text-white" x-text="item.display_quantity || `${item.quantity || 0} ${item.base_unit || ''}`"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400" x-text="item.total_import ?? 0"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <span class="text-xs font-bold text-rose-600 dark:text-rose-400" x-text="item.total_export ?? 0"></span>
                                            </td>
                                            <td class="px-4 py-3 text-center">
                                                <span class="px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter" :class="getStockStatusClass(item)" x-text="item.status"></span>
                                            </td>
                                            <td class="px-4 py-3 text-right">
                                                <button type="button" @click.stop="openProductHistory(item)"
                                                    class="inv-action-chip px-3 py-1">
                                                    Chi tiết
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
