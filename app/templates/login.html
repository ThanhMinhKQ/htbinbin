<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập - Bin Bin Hotel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    :root {
      --bg-body: linear-gradient(45deg, #f7eaff 0%, #fde2ea 100%);
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-blur: blur(32px);
      --card-border: rgba(255, 255, 255, 0.85);
      --form-bg: rgba(255, 255, 255, 0.75);
      --form-border: rgba(255, 255, 255, 0.9);
      --input-bg: rgba(255, 255, 255, 0.88);
      --input-border: rgba(200, 180, 240, 0.55);
      --input-focus-border: rgba(124, 58, 237, 0.55);
      --input-focus-shadow: rgba(124, 58, 237, 0.1);
      --text-primary: #1e1b4b;
      --text-secondary: #6b5fa0;
      --text-hint: #9f97b8;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --btn-gradient: linear-gradient(135deg, #7c3aed 0%, #a855f7 60%, #c026d3 100%);
      --btn-shadow: rgba(124, 58, 237, 0.38);
      --error-bg: rgba(239, 68, 68, 0.07);
      --error-border: rgba(239, 68, 68, 0.22);
    }

    [data-theme="dark"] {
      --bg-body: linear-gradient(45deg, #0f0a1e 0%, #1a0d2e 100%);
      --card-bg: rgba(18, 10, 40, 0.55);
      --card-border: rgba(255, 255, 255, 0.08);
      --form-bg: rgba(15, 8, 35, 0.65);
      --form-border: rgba(255, 255, 255, 0.07);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(140, 100, 220, 0.25);
      --input-focus-border: rgba(167, 139, 250, 0.6);
      --input-focus-shadow: rgba(167, 139, 250, 0.12);
      --text-primary: #f1eeff;
      --text-secondary: #a89dc8;
      --text-hint: #6b5f88;
      --accent: #a78bfa;
      --accent-dark: #8b5cf6;
      --btn-gradient: linear-gradient(135deg, #7c3aed 0%, #9333ea 60%, #c026d3 100%);
      --btn-shadow: rgba(124, 58, 237, 0.5);
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: rgba(239, 68, 68, 0.3);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 5% 40%, rgba(175, 109, 255, 0.48), transparent 67%),
        radial-gradient(ellipse 70% 60% at 45% 45%, rgba(255, 100, 180, 0.41), transparent 67%),
        radial-gradient(ellipse 62% 52% at 83% 76%, rgba(255, 235, 170, 0.44), transparent 63%),
        radial-gradient(ellipse 60% 48% at 75% 20%, rgba(120, 190, 255, 0.36), transparent 66%),
        var(--bg-body);
      background-attachment: fixed;
      overflow: hidden;
      padding: 24px;
      transition: background 0.4s;
    }

    [data-theme="dark"] body {
      background-color: #f5f5dc;
      background-image:
        linear-gradient(180deg, 
          rgba(245,245,220,1) 0%, 
          rgba(255,223,186,0.8) 25%, 
          rgba(255,182,193,0.6) 50%, 
          rgba(147,112,219,0.7) 75%, 
          rgba(72,61,139,0.9) 100%
        ),
        radial-gradient(circle at 30% 20%, rgba(255,255,224,0.4) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(72,61,139,0.6) 0%, transparent 70%),
        radial-gradient(circle at 50% 60%, rgba(147,112,219,0.3) 0%, transparent 60%);
      /* override shorthand background set on body */
      background-attachment: fixed;
    }

    /* ── Split Card ── */
    .login-card {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 32px 80px rgba(80, 30, 160, 0.22),
        0 4px 20px rgba(0, 0, 0, 0.1);
      animation: slide-up 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(32px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── LEFT: Brand Panel ── */
    .panel-brand {
      flex: 1;
      position: relative;
      background:
        radial-gradient(ellipse 110% 90% at 10% 30%, rgba(175, 109, 255, 0.75), transparent 65%),
        radial-gradient(ellipse 90% 80% at 65% 60%, rgba(255, 100, 180, 0.6), transparent 65%),
        radial-gradient(ellipse 70% 60% at 90% 85%, rgba(255, 200, 150, 0.45), transparent 60%),
        linear-gradient(145deg, #9333ea 0%, #c026d3 55%, #f472b6 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 38px;
      overflow: hidden;
      transition: background 0.4s;
    }

    [data-theme="dark"] .panel-brand {
      background:
        radial-gradient(ellipse 110% 90% at 10% 30%, rgba(100, 50, 200, 0.8), transparent 65%),
        radial-gradient(ellipse 80% 70% at 70% 60%, rgba(160, 50, 180, 0.65), transparent 65%),
        linear-gradient(145deg, #3b1170 0%, #5b1fa8 55%, #7c3aed 100%);
    }

    /* Deco circles */
    .panel-brand::before {
      content: '';
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      border: 90px solid rgba(255, 255, 255, 0.12);
      top: -70px;
      right: -90px;
      pointer-events: none;
    }

    .panel-brand::after {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.07);
      bottom: -55px;
      left: -45px;
      pointer-events: none;
    }

    .circle-mid {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 55px solid rgba(255, 255, 255, 0.09);
      bottom: 50px;
      right: -15px;
      pointer-events: none;
    }

    /* Logo row */
    .brand-logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 2;
    }

    .brand-logo-img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 12px;
      filter: drop-shadow(0 3px 10px rgba(0, 0, 0, 0.25));
      transition: transform 0.3s, filter 0.3s;
    }

    .brand-logo-img:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.35));
    }

    .brand-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
    }

    .brand-name span {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Tagline */
    .brand-tagline {
      position: relative;
      z-index: 2;
    }

    .brand-eyebrow {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .brand-heading {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.55;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    /* ── RIGHT: Glass Form Panel ── */
    .panel-form {
      width: 430px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-left: 1px solid rgba(255, 255, 255, 0.55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 50px;
      position: relative;
      transition: background 0.4s, border-color 0.4s;
    }

    [data-theme="dark"] .panel-form {
      background: rgba(12, 5, 30, 0.42);
      border-left-color: rgba(255, 255, 255, 0.06);
    }

    /* Theme toggle button */
    .btn-theme {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 17px;
      transition: all 0.22s;
      backdrop-filter: blur(8px);
    }

    .btn-theme:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: rotate(20deg) scale(1.1);
      box-shadow: 0 4px 14px var(--btn-shadow);
    }

    /* Logo mobile */
    .form-logo-mobile {
      display: none;
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 14px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .form-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-align: center;
      transition: color 0.3s;
    }

    .form-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 40px;
      text-align: center;
      transition: color 0.3s;
    }

    /* Error Box */
    .error-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      margin-bottom: 20px;
      animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }

    .error-icon {
      color: #ef4444;
      font-size: 20px;
      flex-shrink: 0;
    }

    .error-label {
      font-size: 10px;
      font-weight: 700;
      color: #ef4444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .error-msg {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Input group */
    .input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .input-field {
      width: 100%;
      padding: 14px 46px 14px 46px;
      border-radius: 50px;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s, background 0.22s, transform 0.15s;
      line-height: 1.5;
    }

    .input-field::placeholder {
      color: var(--text-hint);
      font-weight: 400;
    }

    .input-field:focus {
      border-color: var(--input-focus-border);
      background: var(--input-bg);
      box-shadow: 0 0 0 4px var(--input-focus-shadow);
      transform: translateY(-1px);
    }

    .input-field:hover:not(:focus) {
      border-color: var(--accent);
      box-shadow: 0 2px 8px var(--input-focus-shadow);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-hint);
      font-size: 17px;
      pointer-events: none;
      transition: color 0.22s;
    }

    .input-group:focus-within .input-icon {
      color: var(--accent);
    }

    .input-action {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-hint);
      font-size: 17px;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s, transform 0.2s;
      border-radius: 50%;
    }

    .input-action:hover {
      color: var(--accent);
      transform: translateY(-50%) scale(1.15);
    }

    /* Forgot password */
    .form-meta {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 26px;
      margin-top: 4px;
    }

    .link-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      transition: color 0.2s, letter-spacing 0.2s;
      padding: 2px 0;
      position: relative;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--accent);
      transition: width 0.22s;
    }

    .link-btn:hover::after {
      width: 100%;
    }

    .link-btn:hover {
      color: var(--accent-dark);
    }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #ffffff;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--btn-gradient);
      box-shadow: 0 6px 22px var(--btn-shadow);
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255, 255, 255, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.22s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px var(--btn-shadow);
    }

    .btn-submit:hover::after {
      opacity: 1;
    }

    .btn-submit:active {
      transform: translateY(0) scale(0.985);
      box-shadow: 0 3px 12px var(--btn-shadow);
    }

    /* Responsive */
    @media (max-width: 680px) {
      .panel-brand {
        display: none;
      }

      .panel-form {
        width: 100%;
        border-radius: 28px;
        padding: 44px 32px;
      }

      .form-logo-mobile {
        display: block;
      }

      .login-card {
        border-radius: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="login-card">

    <!-- ── LEFT: Brand Panel ── -->
    <div class="panel-brand">
      <div class="circle-mid"></div>

      <div class="brand-logo-row">
        <img src="/static/logo.png" class="brand-logo-img" alt="Bin Bin Hotel" />
        <div class="brand-name">
          Bin Bin Hotel
          <span>Management System</span>
        </div>
      </div>

      <div class="brand-tagline">
        <p class="brand-eyebrow">Chào mừng trở lại</p>
        <h2 class="brand-heading">
          Hệ Thống<br>Quản Lý Khách Sạn<br>
        </h2>
      </div>
    </div>

    <!-- ── RIGHT: Glass Form Panel ── -->
    <div class="panel-form">

      <!-- Theme toggle -->
      <button class="btn-theme" id="btn-theme" title="Chuyển chế độ tối/sáng">
        <i class="ph ph-moon" id="theme-icon"></i>
      </button>

      <!-- Mobile logo -->
      <img src="/static/logo.png" class="form-logo-mobile" alt="Bin Bin Hotel" />

      <h1 class="form-title">ĐĂNG NHẬP</h1>
      <p class="form-subtitle">Nhập thông tin tài khoản của bạn</p>

      {% if error and error|trim|length > 0 %}
      <div class="error-box">
        <span class="error-icon"><i class="ph ph-warning-circle"></i></span>
        <div>
          <p class="error-label">Đăng nhập thất bại</p>
          <p class="error-msg">{{ error }}</p>
        </div>
      </div>
      {% endif %}

      <form method="post" action="/login" id="loginForm">
        <div class="input-group">
          <span class="input-icon"><i class="ph ph-user"></i></span>
          <input type="text" name="username" id="usernameInput" class="input-field" placeholder="Mã nhân viên"
            autocomplete="username" required />
        </div>

        <div class="input-group">
          <span class="input-icon"><i class="ph ph-lock-key"></i></span>
          <input type="password" id="passwordInput" name="password" class="input-field" placeholder="Mật khẩu"
            autocomplete="current-password" required />
          <button type="button" id="togglePassword" class="input-action">
            <i class="ph ph-eye-slash" id="eyeIcon"></i>
          </button>
        </div>

        <div class="form-meta">
          <button type="button" class="link-btn" onclick="showForgotPass()">Quên mật khẩu?</button>
        </div>

        <button type="submit" class="btn-submit">Đăng Nhập</button>
      </form>
    </div>
  </div>

  <script>
    // ── Dark / Light Mode ──
    const html = document.documentElement;
    const themeIcon = document.getElementById('theme-icon');

    function applyTheme(dark) {
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeIcon.className = dark ? 'ph ph-sun' : 'ph ph-moon';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    // Init theme
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefersDark);

    document.getElementById('btn-theme').onclick = () => {
      applyTheme(html.getAttribute('data-theme') !== 'dark');
    };

    // ── Toggle password ──
    document.getElementById('togglePassword').onclick = () => {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      icon.className = show ? 'ph ph-eye' : 'ph ph-eye-slash';
    };

    // ── Forgot password ──
    window.showForgotPass = () => {
      alert("🔒 CẤP LẠI MẬT KHẨU\n\nVui lòng liên hệ trực tiếp quản lý để xác minh danh tính và cấp lại mật khẩu mới.\n\n📞 Hotline hỗ trợ: 0559 913 929");
    };

    // ── Clear URL error params ──
    if (window.history.replaceState) {
      const url = new URL(window.location.href);
      if (url.searchParams.has('error')) {
        url.searchParams.delete('error');
        url.searchParams.delete('role');
        window.history.replaceState({}, document.title, url.toString());
      }
    }
  </script>
</body>

</html>
