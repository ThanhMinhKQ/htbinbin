<!-- hr/modals/employee.html — Modal thêm/sửa nhân viên (redesigned UI/UX) -->
<div x-show="showEmployeeModal" x-cloak
     x-transition:enter="hr-emp-fade-enter"
     x-transition:enter-start="hr-emp-fade-start"
     x-transition:enter-end="hr-emp-fade-end"
     class="hr-modal-backdrop hr-emp-backdrop" @click.self="showEmployeeModal = false">
    <div class="hr-modal hr-emp-modal" @click.stop>
        <!-- HEADER -->
        <div class="hr-emp-hero" :class="editingEmployee ? 'is-edit' : 'is-new'">
            <div class="hr-emp-hero-content">
                <div class="hr-emp-hero-avatar" x-text="editingEmployee ? getInitials(editingEmployee.name || form.name) : (form.name ? getInitials(form.name) : '+')"></div>
                <div class="hr-emp-hero-meta">
                    <span class="hr-emp-hero-eyebrow" x-text="editingEmployee ? 'Chỉnh sửa hồ sơ nhân viên' : 'Tạo hồ sơ nhân viên mới'"></span>
                    <h2 class="hr-emp-hero-title" x-text="editingEmployee ? (editingEmployee.name || 'Nhân viên') : (form.name || 'Nhân viên mới')"></h2>
                    <div class="hr-emp-hero-tags" x-show="editingEmployee">
                        <span class="hr-emp-hero-tag" x-text="editingEmployee?.employee_id || '—'"></span>
                        <span class="hr-emp-hero-tag" x-text="editingEmployee?.branch_code || ''" x-show="editingEmployee?.branch_code"></span>
                        <span class="hr-emp-hero-tag" :class="editingEmployee?.is_active ? 'ok' : 'off'" x-text="editingEmployee?.is_active ? 'Đang hoạt động' : 'Tạm khoá'"></span>
                    </div>
                </div>
                <div class="hr-emp-hero-actions">
                    <button class="hr-emp-hero-scan" type="button" @click="HrScan.scan($data)" title="Quét CCCD tự động điền">
                        <i class="bi bi-qr-code-scan"></i>
                        <span>Quét CCCD</span>
                    </button>
                    <button class="hr-emp-hero-close" type="button" @click="showEmployeeModal = false" aria-label="Đóng">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- BODY: 2 cột -->
        <div class="hr-emp-body">
            <div class="hr-emp-cols">
                <!-- CỘT TRÁI: Công việc -->
                <section class="hr-emp-col">
                    <header class="hr-emp-section">
                        <span class="hr-emp-section-icon"><i class="bi bi-briefcase-fill"></i></span>
                        <div>
                            <span class="hr-emp-section-title">Thông tin công việc</span>
                            <span class="hr-emp-section-sub">Định danh, phân ca, vai trò</span>
                        </div>
                    </header>

                    <div class="hr-form-grid">
                        <div class="hr-form-row">
                            <div class="hr-field">
                                <label>Mã NV <span class="hr-required">*</span></label>
                                <input class="hr-input" type="text" x-model="form.employee_id" :disabled="!!editingEmployee" placeholder="VD: NV099">
                            </div>
                            <div class="hr-field">
                                <label>Mã đăng nhập <span class="hr-required">*</span></label>
                                <input class="hr-input" type="text" x-model="form.employee_code" placeholder="VD: lt.abcde">
                            </div>
                        </div>

                        <div class="hr-field">
                            <label>Họ và tên <span class="hr-required">*</span></label>
                            <input class="hr-input" type="text" x-model="form.name" placeholder="Nguyễn Văn A">
                        </div>

                        <div class="hr-form-row">
                            <div class="hr-field">
                                <label>Chi nhánh <span class="hr-required">*</span></label>
                                <select class="hr-select" x-model="form.main_branch_id">
                                    <option value="">Chọn chi nhánh</option>
                                    <template x-for="b in hotelBranches()" :key="b.id">
                                        <option :value="b.id" x-text="branchLabel(b)"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="hr-field">
                                <label>Vai trò <span class="hr-required">*</span></label>
                                <select class="hr-select" x-model="form.department_id">
                                    <option value="">Chọn vai trò</option>
                                    <template x-for="d in departments" :key="d.id">
                                        <option :value="d.id" x-text="d.name"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div class="hr-field">
                            <label>Ca làm việc</label>
                            <div class="hr-emp-shift">
                                <label class="hr-emp-shift-chip" :class="{ active: !form.shift }">
                                    <input type="radio" value="" x-model="form.shift">
                                    <i class="bi bi-dash-circle"></i> Không có ca
                                </label>
                                <label class="hr-emp-shift-chip" :class="{ active: form.shift === 'CS' }">
                                    <input type="radio" value="CS" x-model="form.shift">
                                    <i class="bi bi-sun-fill"></i> CS · Sáng
                                </label>
                                <label class="hr-emp-shift-chip" :class="{ active: form.shift === 'CT' }">
                                    <input type="radio" value="CT" x-model="form.shift">
                                    <i class="bi bi-moon-stars-fill"></i> CT · Tối
                                </label>
                            </div>
                        </div>

                        <div class="hr-field" x-show="!editingEmployee">
                            <label>Mật khẩu ban đầu</label>
                            <input class="hr-input" type="text" x-model="form.password" placeholder="123456">
                        </div>

                        <!-- Trạng thái (chỉ khi sửa) -->
                        <div x-show="editingEmployee" class="hr-emp-status-block">
                            <span class="hr-emp-status-label">Trạng thái tài khoản</span>
                            <div class="hr-emp-status-toggle">
                                <label :class="{ active: form.is_active === true }">
                                    <input type="radio" :value="true" x-model="form.is_active">
                                    <i class="bi bi-check-circle-fill"></i> Active
                                </label>
                                <label :class="{ active: form.is_active === false }">
                                    <input type="radio" :value="false" x-model="form.is_active">
                                    <i class="bi bi-pause-circle-fill"></i> Inactive
                                </label>
                            </div>
                            <div x-show="editingEmployee?.created_at" class="hr-emp-meta-card">
                                <div class="hr-emp-meta-cell">
                                    <span><i class="bi bi-calendar-check"></i> Ngày tạo</span>
                                    <strong x-text="editingEmployee?.created_at ? new Date(editingEmployee.created_at).toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—'"></strong>
                                </div>
                                <div class="hr-emp-meta-cell">
                                    <span><i class="bi bi-clock-history"></i> Hoạt động</span>
                                    <strong x-text="formatAccountAge(editingEmployee?.account_age_days)"></strong>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- CỘT PHẢI: Cá nhân + Địa chỉ -->
                <section class="hr-emp-col">
                    <header class="hr-emp-section">
                        <span class="hr-emp-section-icon"><i class="bi bi-person-vcard-fill"></i></span>
                        <div>
                            <span class="hr-emp-section-title">Thông tin cá nhân</span>
                            <span class="hr-emp-section-sub">CCCD, ngày sinh, địa chỉ thường trú</span>
                        </div>
                    </header>

                    <div class="hr-form-grid">
                        <div class="hr-form-row">
                            <div class="hr-field">
                                <label>CCCD / CMND</label>
                                <input class="hr-input" type="text" x-model="form.cccd" placeholder="079xxxxxxxxx">
                            </div>
                            <div class="hr-field">
                                <label>Giới tính</label>
                                <select class="hr-select" x-model="form.gender">
                                    <option value="">Chọn giới tính</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="hr-form-row">
                            <div class="hr-field">
                                <label>Ngày sinh</label>
                                <input class="hr-input" type="date" x-model="form.date_of_birth">
                            </div>
                            <div class="hr-field">
                                <label>Số điện thoại</label>
                                <input class="hr-input" type="text" x-model="form.phone_number" placeholder="0901234567">
                            </div>
                        </div>

                        <div class="hr-form-row">
                            <div class="hr-field">
                                <label>Email</label>
                                <input class="hr-input" type="email" x-model="form.email" placeholder="abc@gmail.com">
                            </div>
                        </div>

                        <!-- Address Section -->
                        <div class="hr-addr-section hr-emp-addr">
                            <div class="hr-addr-header">
                                <div class="hr-emp-addr-title">
                                    <i class="bi bi-geo-alt-fill"></i>
                                    <span>Địa chỉ thường trú</span>
                                </div>
                                <div class="hr-addr-mode-toggle">
                                    <label :class="{ active: form.addressMode === 'new' }">
                                        <input type="radio" name="hr-addr-mode" value="new" x-model="form.addressMode"
                                            @change="HrAddress.switchMode('new')"> Mới
                                    </label>
                                    <label :class="{ active: form.addressMode === 'old' }">
                                        <input type="radio" name="hr-addr-mode" value="old" x-model="form.addressMode"
                                            @change="HrAddress.switchMode('old')"> Cũ
                                    </label>
                                </div>
                            </div>

                            <div class="hr-emp-addr-grid">
                                <div class="hr-field">
                                    <label>Tỉnh / TP</label>
                                    <input class="hr-input" type="text" x-model="form.province"
                                        placeholder="Chọn tỉnh/TP" list="hr-dl-province"
                                        @change="HrAddress.onProvinceChange(form.province, form.addressMode)">
                                    <datalist id="hr-dl-province"></datalist>
                                </div>
                                <div class="hr-field" x-show="form.addressMode === 'old'">
                                    <label>Quận / Huyện</label>
                                    <input class="hr-input" type="text" x-model="form.district"
                                        placeholder="Chọn quận/huyện" list="hr-dl-district"
                                        @change="HrAddress.onDistrictChange(form.district, form.province)">
                                    <datalist id="hr-dl-district"></datalist>
                                </div>
                                <div class="hr-field">
                                    <label>Phường / Xã</label>
                                    <input class="hr-input" type="text" x-model="form.ward"
                                        placeholder="Chọn phường/xã" list="hr-dl-ward">
                                    <datalist id="hr-dl-ward"></datalist>
                                </div>
                                <div class="hr-field">
                                    <label>Số nhà, đường</label>
                                    <input class="hr-input" type="text" x-model="form.address"
                                        placeholder="123 Nguyễn Huệ">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="hr-emp-foot">
            <div class="hr-emp-foot-hint" x-show="!editingEmployee">
                <i class="bi bi-shield-check"></i> Hồ sơ sẽ được tạo và gán mật khẩu mặc định để nhân viên có thể đăng nhập ngay.
            </div>
            <div class="hr-emp-foot-hint" x-show="editingEmployee">
                <i class="bi bi-pencil-square"></i> Mọi thay đổi sẽ được lưu khi bạn bấm <strong>Lưu thay đổi</strong>.
            </div>
            <div class="hr-emp-foot-actions">
                <button class="hr-btn" type="button" @click="showEmployeeModal = false">Huỷ</button>
                <button class="hr-btn primary hr-emp-save" type="button" @click="saveEmployee()" :disabled="saving">
                    <span x-show="saving" class="hr-spinner"></span>
                    <i class="bi" :class="editingEmployee ? 'bi-check2-circle' : 'bi-person-plus-fill'" x-show="!saving"></i>
                    <span x-text="editingEmployee ? 'Lưu thay đổi' : 'Thêm nhân viên'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
