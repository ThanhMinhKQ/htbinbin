    <!-- MODAL: Reset password -->
    <div x-show="showPasswordModal" x-cloak class="hr-modal-backdrop" @click.self="showPasswordModal = false">
        <div class="hr-modal sm">
            <div class="hr-modal-head">
                <h2>Đặt lại mật khẩu</h2>
                <button class="hr-icon-btn" @click="showPasswordModal = false"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="hr-modal-body">
                <p style="color: var(--bk-muted); font-size: 13px; margin-bottom: 12px;">
                    Đặt lại mật khẩu cho <strong style="color: var(--bk-ink);" x-text="passwordTarget?.name"></strong>
                </p>
                <div class="hr-field">
                    <label>Mật khẩu mới <span class="hr-required">*</span></label>
                    <input class="hr-input" type="text" x-model="newPassword"
                        placeholder="Tối thiểu 4 ký tự" @keydown.enter="doResetPassword()">
                </div>
            </div>
            <div class="hr-modal-foot">
                <button class="hr-btn" @click="showPasswordModal = false">Huỷ</button>
                <button class="hr-btn primary" style="background: var(--hr-grad-amber); box-shadow: 0 4px 12px -4px rgba(245, 158, 11, .5);"
                    @click="doResetPassword()" :disabled="saving">
                    <span x-show="saving" style="width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite;"></span>
                    Đặt lại mật khẩu
                </button>
            </div>
        </div>
    </div>
