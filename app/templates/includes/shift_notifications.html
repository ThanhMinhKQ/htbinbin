{% if user %}
<div id="shift-notice-overlay" class="shift-notice-overlay" hidden>
  <div class="shift-notice-backdrop"></div>
  <section class="shift-notice-panel" role="dialog" aria-modal="true" aria-labelledby="shift-notice-title">
    <div class="shift-notice-head">
      <div>
        <div class="shift-notice-kicker">Thông báo ca làm việc</div>
        <h2 id="shift-notice-title">Thông báo nội bộ</h2>
      </div>
      <span id="shift-notice-count" class="shift-notice-count">1/1</span>
    </div>
    <div id="shift-notice-timeline" class="shift-notice-timeline" style="display: none;"></div>
    <div id="shift-notice-body" class="shift-notice-body sn-rich-content"></div>
    <div class="shift-notice-foot">
      <div class="shift-notice-read-state">
        <div class="shift-notice-read-row">
          <span id="shift-notice-wait" class="shift-notice-wait">Vui lòng đọc thông báo trong 5 giây</span>
          <span class="shift-notice-read-dot" aria-hidden="true"></span>
        </div>
        <div class="shift-notice-progress" aria-hidden="true">
          <span id="shift-notice-progress-bar"></span>
        </div>
      </div>
      <button id="shift-notice-read-btn" type="button" disabled>Đã đọc</button>
    </div>
  </section>
</div>

<style>
  .shift-notice-overlay[hidden] { display: none !important; }
  .shift-notice-overlay {
    --sn-panel: #fffaf0;
    --sn-panel-2: #ffffff;
    --sn-ink: #1f2937;
    --sn-muted: #6b7280;
    --sn-line: rgba(120, 113, 108, 0.18);
    --sn-accent: #d97706;
    --sn-accent-2: #0f766e;
    --sn-glow: rgba(217, 119, 6, 0.28);
    position: fixed;
    inset: 0;
    z-index: 2147483000;
    display: grid;
    place-items: center;
    padding: clamp(16px, 3vw, 44px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  html.dark .shift-notice-overlay {
    --sn-panel: #0f172a;
    --sn-panel-2: #172033;
    --sn-ink: #f8fafc;
    --sn-muted: #a8b3c7;
    --sn-line: rgba(148, 163, 184, 0.18);
    --sn-accent: #f59e0b;
    --sn-accent-2: #2dd4bf;
    --sn-glow: rgba(245, 158, 11, 0.18);
  }
  .shift-notice-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .shift-notice-backdrop {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 18%, rgba(245, 158, 11, 0.26), transparent 30%),
      radial-gradient(circle at 82% 12%, rgba(20, 184, 166, 0.18), transparent 28%),
      linear-gradient(135deg, rgba(15, 23, 42, 0.72), rgba(41, 37, 36, 0.58));
    backdrop-filter: blur(18px) saturate(1.12);
  }
  .shift-notice-backdrop::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.22;
    background-image: linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at center, black, transparent 72%);
  }
  .shift-notice-panel {
    position: relative;
    width: min(920px, 100%);
    max-height: min(780px, calc(100dvh - 32px));
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255, 255, 255, 0.48);
    border-radius: clamp(22px, 2.6vw, 34px);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.72)) padding-box,
      linear-gradient(135deg, rgba(251, 191, 36, 0.72), rgba(20, 184, 166, 0.42), rgba(255,255,255,0.34)) border-box;
    box-shadow: 0 36px 110px -34px rgba(15, 23, 42, 0.66), 0 0 0 1px rgba(255,255,255,0.34) inset;
    transform: translateY(22px) scale(0.96);
    transition: transform 0.46s cubic-bezier(0.2, 1, 0.22, 1), opacity 0.32s ease;
    overflow: hidden;
    isolation: isolate;
  }
  .shift-notice-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 8% 8%, rgba(251, 191, 36, 0.22), transparent 34%),
      radial-gradient(circle at 92% 0%, rgba(45, 212, 191, 0.16), transparent 28%),
      linear-gradient(180deg, var(--sn-panel), var(--sn-panel-2));
  }
  .shift-notice-panel::after {
    content: "";
    position: absolute;
    top: -18%;
    right: -8%;
    width: min(34vw, 280px);
    aspect-ratio: 1;
    border-radius: 999px;
    background: radial-gradient(circle, var(--sn-glow), transparent 68%);
    pointer-events: none;
  }
  html.dark .shift-notice-panel {
    border-color: rgba(148, 163, 184, 0.22);
    color: var(--sn-ink);
    background:
      linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.82)) padding-box,
      linear-gradient(135deg, rgba(245, 158, 11, 0.44), rgba(45, 212, 191, 0.28), rgba(148,163,184,0.16)) border-box;
    box-shadow: 0 36px 120px -34px rgba(0, 0, 0, 0.86), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }
  .shift-notice-overlay.is-open .shift-notice-panel {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .shift-notice-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: clamp(16px, 3vw, 34px);
    padding: clamp(26px, 4vw, 44px) clamp(24px, 4.4vw, 54px) clamp(18px, 2.8vw, 28px);
    border-bottom: 1px solid var(--sn-line);
  }
  .shift-notice-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--sn-accent);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .shift-notice-kicker::before {
    content: "";
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--sn-accent-2);
    box-shadow: 0 0 0 7px rgba(20, 184, 166, 0.12);
  }
  .shift-notice-head h2 {
    margin: 0;
    max-width: 100%;
    color: var(--sn-ink);
    font-size: clamp(20px, 2.6vw, 30px);
    line-height: 1.12;
    font-weight: 800;
    letter-spacing: -0.025em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shift-notice-head > div:first-child {
    min-width: 0;
  }
  .shift-notice-count {
    flex: 0 0 auto;
    border: 1px solid rgba(217, 119, 6, 0.22);
    border-radius: 999px;
    background: rgba(255, 247, 237, 0.86);
    color: #92400e;
    padding: 9px 15px;
    font-size: 13px;
    font-weight: 900;
    box-shadow: 0 12px 28px -20px rgba(146, 64, 14, 0.8);
  }
  html.dark .shift-notice-count {
    border-color: rgba(245, 158, 11, 0.28);
    background: rgba(120, 53, 15, 0.34);
    color: #fcd34d;
  }
  .shift-notice-timeline {
    display: flex;
    gap: 8px;
    padding: 18px clamp(24px, 4.4vw, 54px) 0;
    width: 100%;
  }
  .shift-notice-timeline-step {
    position: relative;
    flex: 1;
    height: 8px;
    background: rgba(120, 113, 108, 0.16);
    border-radius: 999px;
    overflow: hidden;
    transition: transform 0.28s ease, background 0.28s ease;
  }
  html.dark .shift-notice-timeline-step { background: rgba(148, 163, 184, 0.16); }
  .shift-notice-timeline-step.completed::before,
  .shift-notice-timeline-step.active::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(90deg, #14b8a6, #f59e0b);
  }
  .shift-notice-timeline-step.active {
    transform: scaleY(1.28);
    box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1), 0 10px 22px -15px rgba(217, 119, 6, 0.9);
  }
  .shift-notice-timeline-step.active::before {
    animation: shiftNoticeStep 1.6s ease-in-out infinite;
  }
  @keyframes shiftNoticeStep {
    0%, 100% { transform: translateX(-16%); filter: saturate(0.9); }
    50% { transform: translateX(12%); filter: saturate(1.35); }
  }
  .shift-notice-body {
    padding: clamp(22px, 3.2vw, 34px) clamp(24px, 4.4vw, 54px) clamp(24px, 3.8vw, 42px);
    overflow-y: auto;
    min-height: clamp(220px, 34dvh, 420px);
    scrollbar-width: thin;
  }
  .shift-notice-body::-webkit-scrollbar { width: 10px; }
  .shift-notice-body::-webkit-scrollbar-thumb {
    border: 3px solid transparent;
    border-radius: 999px;
    background: rgba(120, 113, 108, 0.36) padding-box;
  }
  .sn-rich-content {
    line-height: 1.76;
    word-break: break-word;
    font-size: clamp(16px, 1.8vw, 18px);
  }
  .shift-notice-body.sn-rich-content {
    color: #374151;
  }
  html.dark .shift-notice-body.sn-rich-content {
    color: #dbe4f0;
  }
  .sn-rich-content p { margin: 0 0 0.65rem; }
  .sn-rich-content ul, .sn-rich-content ol { margin: 0.5rem 0 0.75rem 1.25rem; }
  .sn-rich-content blockquote {
    margin: 0.75rem 0;
    border-left: 3px solid rgb(59 130 246);
    padding-left: 0.75rem;
    color: rgb(71 85 105);
  }
  html.dark .sn-rich-content blockquote { color: rgb(203 213 225); }
  .sn-rich-content a { color: rgb(37 99 235); text-decoration: underline; font-weight: 600; }
  html.dark .sn-rich-content a { color: rgb(96 165 250); }
  .sn-rich-content img {
    display: block;
    max-width: 100%;
    max-height: 360px;
    margin: 0.75rem 0;
    border-radius: 0.75rem;
    border: 1px solid rgb(226 232 240);
  }
  html.dark .sn-rich-content img {
    border-color: rgb(51 65 85);
  }

  /* Attachment styling */
  .sn-attachment-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border-radius: 0.5rem;
    border: 1px solid rgb(226 232 240);
    background-color: rgb(248 250 252);
    padding: 0.375rem 0.75rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: rgb(37 99 235);
    text-decoration: none;
    transition: background-color 0.15s, border-color 0.15s;
    margin: 0.25rem 0.5rem 0.25rem 0;
  }
  .sn-attachment-badge:hover {
    background-color: rgb(241 245 249);
    border-color: rgb(203 213 225);
  }
  html.dark .sn-attachment-badge {
    border-color: rgb(51 65 85);
    background-color: rgb(15, 23, 42);
    color: rgb(96 165 250);
  }
  html.dark .sn-attachment-badge:hover {
    background-color: rgb(30, 41, 59);
    border-color: rgb(71, 85, 105);
  }

  .shift-notice-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(16px, 3vw, 34px);
    padding: clamp(18px, 2.8vw, 28px) clamp(24px, 4.4vw, 54px);
    border-top: 1px solid var(--sn-line);
    background: linear-gradient(180deg, rgba(255,255,255,0.44), rgba(255, 247, 237, 0.78));
  }
  html.dark .shift-notice-foot {
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.28), rgba(2, 6, 23, 0.62));
  }
  .shift-notice-read-state {
    flex: 1 1 auto;
    min-width: 0;
  }
  .shift-notice-read-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .shift-notice-wait {
    min-width: 0;
    color: var(--sn-muted);
    font-size: clamp(13px, 1.4vw, 15px);
    font-weight: 800;
  }
  .shift-notice-read-dot {
    width: 9px;
    height: 9px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: var(--sn-accent);
    box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.35);
    animation: shiftNoticeDot 1.35s infinite;
  }
  .shift-notice-read-state.is-ready .shift-notice-read-dot {
    background: var(--sn-accent-2);
    animation: none;
    box-shadow: 0 0 0 7px rgba(20, 184, 166, 0.12);
  }
  @keyframes shiftNoticeDot {
    70% { box-shadow: 0 0 0 9px rgba(245, 158, 11, 0); }
    100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
  }
  .shift-notice-progress {
    position: relative;
    height: 12px;
    overflow: hidden;
    border: 1px solid rgba(120, 113, 108, 0.16);
    border-radius: 999px;
    background: rgba(120, 113, 108, 0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.58) inset;
  }
  html.dark .shift-notice-progress {
    border-color: rgba(148, 163, 184, 0.16);
    background: rgba(15, 23, 42, 0.72);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
  }
  .shift-notice-progress::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: linear-gradient(120deg, transparent 0 30%, rgba(255,255,255,0.34) 45%, transparent 60% 100%);
    transform: translateX(-100%);
    animation: shiftNoticeProgressShine 1.8s linear infinite;
  }
  .shift-notice-read-state.is-ready .shift-notice-progress::after { display: none; }
  #shift-notice-progress-bar {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 42%, #14b8a6 100%);
    box-shadow: 0 9px 22px -10px rgba(20, 184, 166, 0.9);
    transition: width 0.28s linear;
  }
  @keyframes shiftNoticeProgressShine {
    to { transform: translateX(100%); }
  }
  #shift-notice-read-btn {
    position: relative;
    min-width: clamp(152px, 18vw, 190px);
    height: 54px;
    border: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, #0f766e, #14b8a6 58%, #f59e0b);
    color: #ffffff;
    cursor: pointer;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.01em;
    box-shadow: 0 18px 38px -20px rgba(15, 118, 110, 0.9), 0 1px 0 rgba(255,255,255,0.28) inset;
    transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    overflow: hidden;
  }
  #shift-notice-read-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.32), transparent);
    transform: translateX(-120%);
    transition: transform 0.6s ease;
  }
  #shift-notice-read-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    filter: saturate(1.08);
    box-shadow: 0 24px 46px -22px rgba(15, 118, 110, 0.95), 0 1px 0 rgba(255,255,255,0.3) inset;
  }
  #shift-notice-read-btn:hover:not(:disabled)::before { transform: translateX(120%); }
  #shift-notice-read-btn:active:not(:disabled) { transform: translateY(0); }
  #shift-notice-read-btn:disabled {
    background: linear-gradient(135deg, #d6d3d1, #e7e5e4);
    color: #78716c;
    box-shadow: none;
    cursor: not-allowed;
  }
  html.dark #shift-notice-read-btn:disabled {
    background: linear-gradient(135deg, #334155, #1e293b);
    color: #94a3b8;
  }
  @media (max-width: 720px) {
    .shift-notice-overlay { padding: 10px; align-items: end; }
    .shift-notice-panel {
      width: 100%;
      max-height: calc(100dvh - 20px);
      border-radius: 26px 26px 18px 18px;
    }
    .shift-notice-head { align-items: flex-start; }
    .shift-notice-count { padding: 8px 12px; }
    .shift-notice-foot { flex-direction: column; align-items: stretch; }
    #shift-notice-read-btn { width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .shift-notice-overlay,
    .shift-notice-panel,
    .shift-notice-timeline-step,
    #shift-notice-read-btn,
    #shift-notice-progress-bar { transition: none !important; }
    .shift-notice-timeline-step.active::before,
    .shift-notice-read-dot,
    .shift-notice-progress::after { animation: none !important; }
  }
</style>

<script>
(() => {
  const overlay = document.getElementById('shift-notice-overlay');
  if (!overlay) return;

  const titleEl = document.getElementById('shift-notice-title');
  const bodyEl = document.getElementById('shift-notice-body');
  const countEl = document.getElementById('shift-notice-count');
  const waitEl = document.getElementById('shift-notice-wait');
  const readBtn = document.getElementById('shift-notice-read-btn');
  const progressBar = document.getElementById('shift-notice-progress-bar');
  const readState = document.querySelector('.shift-notice-read-state');

  let items = [];
  let index = 0;
  let timer = null;
  let current = null;

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function safeUrl(value, image = false) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (/^\/uploads\//i.test(raw)) return raw;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (!image && /^(mailto:|tel:)/i.test(raw)) return raw;
    if (image && /^data:image\/(png|jpe?g|gif|webp);base64,/i.test(raw)) return raw;
    return '';
  }

  function sanitizeRichHtml(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const template = document.createElement('template');
    template.innerHTML = raw;
    const allowed = new Set(['P', 'BR', 'DIV', 'SPAN', 'STRONG', 'B', 'EM', 'I', 'U', 'S', 'UL', 'OL', 'LI', 'BLOCKQUOTE', 'A', 'IMG', 'H1', 'H2', 'H3', 'PRE', 'CODE', 'FONT', 'SVG', 'PATH']);
    const cleanNode = (node) => {
      [...node.childNodes].forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) return;
        if (child.nodeType !== Node.ELEMENT_NODE) {
          child.remove();
          return;
        }
        const tag = child.tagName;
        const originalHref = child.getAttribute('href') || '';
        const originalSrc = child.getAttribute('src') || '';
        const originalAlt = child.getAttribute('alt') || '';
        const originalStyle = child.getAttribute('style') || '';
        const originalClass = child.getAttribute('class') || '';
        const originalDownload = child.getAttribute('download') || '';
        
        if (!allowed.has(tag)) {
          if (['SCRIPT', 'STYLE', 'IFRAME', 'OBJECT', 'EMBED'].includes(tag)) {
            child.remove();
            return;
          }
          child.replaceWith(...child.childNodes);
          return;
        }
        
        const svgAttrs = {
          viewBox: child.getAttribute('viewbox') || child.getAttribute('viewBox') || '0 0 24 24',
          fill: child.getAttribute('fill') || 'none',
          stroke: child.getAttribute('stroke') || 'currentColor',
          strokeWidth: child.getAttribute('stroke-width') || child.getAttribute('strokeWidth') || '2',
          d: child.getAttribute('d') || ''
        };

        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
        
        if (tag === 'A') {
          const href = safeUrl(originalHref);
          if (!href) {
            child.replaceWith(...child.childNodes);
            return;
          }
          child.setAttribute('href', href);
          child.setAttribute('target', '_blank');
          child.setAttribute('rel', 'noopener noreferrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalDownload) child.setAttribute('download', originalDownload);
        }
        else if (tag === 'IMG') {
          const src = safeUrl(originalSrc, true);
          if (!src) {
            child.remove();
            return;
          }
          child.setAttribute('src', src);
          child.setAttribute('alt', originalAlt);
          child.setAttribute('loading', 'lazy');
          child.setAttribute('referrerpolicy', 'no-referrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalStyle) child.setAttribute('style', originalStyle);
        }
        else if (tag === 'SVG') {
          child.setAttribute('viewBox', svgAttrs.viewBox);
          child.setAttribute('fill', svgAttrs.fill);
          child.setAttribute('stroke', svgAttrs.stroke);
          child.setAttribute('stroke-width', svgAttrs.strokeWidth);
          if (originalClass) child.setAttribute('class', originalClass);
        }
        else if (tag === 'PATH') {
          if (svgAttrs.d) {
            child.setAttribute('d', svgAttrs.d);
          }
        }
        else if (['P', 'DIV', 'SPAN', 'H1', 'H2', 'H3', 'BLOCKQUOTE'].includes(tag)) {
          const align = originalStyle.match(/text-align\s*:\s*(left|center|right|justify)/i);
          const color = originalStyle.match(/(^|[^-])color\s*:\s*([^;]+)/i);
          const bg = originalStyle.match(/background-color\s*:\s*([^;]+)/i);
          const fontSize = originalStyle.match(/font-size\s*:\s*(12px|15px|20px|28px)/i);
          const fontFamily = originalStyle.match(/font-family\s*:\s*([^;]+)/i);
          const styles = [];
          if (align) styles.push(`text-align: ${align[1].toLowerCase()}`);
          if (color) styles.push(`color: ${color[2].trim()}`);
          if (bg) styles.push(`background-color: ${bg[1].trim()}`);
          if (fontSize) styles.push(`font-size: ${fontSize[1].toLowerCase()}`);
          if (fontFamily) {
            const allowedFonts = ['inter', 'arial', 'times new roman', 'roboto', 'be vietnam pro'];
            const fam = fontFamily[1].trim().replace(/["']/g, '').toLowerCase();
            if (allowedFonts.some(f => fam.includes(f))) styles.push(`font-family: ${fontFamily[1].trim().replace(/["']/g, '')}`);
          }
          if (styles.length) child.setAttribute('style', styles.join('; '));
          if (originalClass) child.setAttribute('class', originalClass);
        }
          cleanNode(child);
      });
    };
    cleanNode(template.content);
    return template.content.firstChild ? template.innerHTML.trim() : raw;
  }

  function updateReadProgress(remaining, total) {
    if (!progressBar) return;
    const percent = Math.max(0, Math.min(100, ((total - remaining) / total) * 100));
    progressBar.style.width = `${percent}%`;
  }

  function lock(seconds) {
    const total = Math.max(1, Number(seconds || 5));
    let remaining = total;
    readBtn.disabled = true;
    readBtn.textContent = `Đã đọc (${remaining}s)`;
    waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    if (readState) readState.classList.remove('is-ready');
    updateReadProgress(remaining, total);
    clearInterval(timer);
    timer = setInterval(() => {
      remaining -= 1;
      updateReadProgress(remaining, total);
      if (remaining <= 0) {
        clearInterval(timer);
        readBtn.disabled = false;
        readBtn.textContent = 'Đã đọc';
        waitEl.textContent = 'Bạn có thể xác nhận sau khi đã đọc xong.';
        if (readState) readState.classList.add('is-ready');
        if (progressBar) progressBar.style.width = '100%';
        return;
      }
      readBtn.textContent = `Đã đọc (${remaining}s)`;
      waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    }, 1000);
  }

  function showOverlay() {
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    overlay.offsetHeight;
    overlay.classList.add('is-open');
  }

  function hideOverlay() {
    overlay.classList.remove('is-open');
    setTimeout(() => {
      if (!overlay.classList.contains('is-open')) {
        overlay.hidden = true;
        document.body.style.removeProperty('overflow');
      }
    }, 300);
  }

  function updateTimeline() {
    const timelineEl = document.getElementById('shift-notice-timeline');
    if (!timelineEl) return;
    timelineEl.innerHTML = '';
    if (items.length > 1) {
      timelineEl.style.display = 'flex';
      for (let i = 0; i < items.length; i++) {
        const step = document.createElement('div');
        step.className = 'shift-notice-timeline-step';
        if (i < index) {
          step.classList.add('completed');
        } else if (i === index) {
          step.classList.add('active');
        }
        timelineEl.appendChild(step);
      }
    } else {
      timelineEl.style.display = 'none';
    }
  }

  function render() {
    current = items[index];
    if (!current) {
      hideOverlay();
      return;
    }
    showOverlay();
    updateTimeline();
    
    titleEl.textContent = current.title || 'Thông báo nội bộ';
    bodyEl.innerHTML = sanitizeRichHtml(current.body || '');
    countEl.textContent = `${index + 1}/${items.length}`;
    countEl.style.display = items.length > 1 ? '' : 'none';

    lock(current.min_read_seconds || 5);
  }

  async function acknowledge() {
    if (!current || readBtn.disabled) return;
    readBtn.disabled = true;
    try {
      await fetch(`/attendance/api/shift-notifications/${current.id}/ack`, {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (e) {
      readBtn.disabled = false;
      return;
    }
    index += 1;
    render();
  }

  readBtn.addEventListener('click', acknowledge);

  async function loadPending() {
    try {
      const res = await fetch('/attendance/api/shift-notifications/pending', { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json();
      items = Array.isArray(data.items) ? data.items : [];
      index = 0;
      if (items.length) render();
    } catch (e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPending, { once: true });
  } else {
    loadPending();
  }
})();
</script>
{% endif %}
