{% if user %}
<div id="shift-notice-overlay" class="shift-notice-overlay" hidden>
  <div class="shift-notice-backdrop"></div>
  <section class="shift-notice-panel" role="dialog" aria-modal="true" aria-labelledby="shift-notice-title">
    <div class="shift-notice-head">
      <div>
        <div class="shift-notice-kicker">Thông báo ca làm việc</div>
        <h2 id="shift-notice-title">Thông báo nội bộ</h2>
      </div>
      <span id="shift-notice-count" class="shift-notice-count">1/1</span>
    </div>
    <div id="shift-notice-timeline" class="shift-notice-timeline" style="display: none;"></div>
    <div class="shift-notice-meta">
      <span id="shift-notice-priority">Bình thường</span>
      <span id="shift-notice-shift">Ca hiện tại</span>
    </div>
    <div id="shift-notice-body" class="shift-notice-body sn-rich-content"></div>
    <div class="shift-notice-foot">
      <div id="shift-notice-wait" class="shift-notice-wait">Vui lòng đọc thông báo trong 5 giây</div>
      <button id="shift-notice-read-btn" type="button" disabled>Đã đọc</button>
    </div>
  </section>
</div>

<style>
  .shift-notice-overlay[hidden] { display: none !important; }
  .shift-notice-overlay {
    position: fixed;
    inset: 0;
    z-index: 2147483000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .shift-notice-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .shift-notice-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(12px);
  }
  .shift-notice-panel {
    position: relative;
    width: min(580px, 100%);
    max-height: min(740px, 90dvh);
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 24px 60px -16px rgba(15, 23, 42, 0.35);
    transform: scale(0.95);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }
  html.dark .shift-notice-panel {
    background: #1e293b;
    border-color: #334155;
    color: #f8fafc;
    box-shadow: 0 24px 60px -16px rgba(0, 0, 0, 0.5);
  }
  .shift-notice-overlay.is-open .shift-notice-panel {
    transform: scale(1);
  }
  .shift-notice-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 24px 24px 16px;
    border-bottom: 1px solid #e2e8f0;
  }
  html.dark .shift-notice-head { border-color: #334155; }
  .shift-notice-kicker {
    margin-bottom: 6px;
    color: #64748b;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  html.dark .shift-notice-kicker { color: #94a3b8; }
  .shift-notice-head h2 {
    margin: 0;
    color: #0f172a;
    font-size: 22px;
    line-height: 1.25;
    font-weight: 800;
  }
  html.dark .shift-notice-head h2 { color: #f8fafc; }
  
  /* Count label */
  .shift-notice-count {
    flex: 0 0 auto;
    border-radius: 999px;
    background: #e0f2fe;
    color: #0369a1;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 800;
  }
  html.dark .shift-notice-count {
    background: rgba(3, 105, 161, 0.2);
    color: #7dd3fc;
  }

  /* Stepper / Timeline */
  .shift-notice-timeline {
    display: flex;
    gap: 6px;
    padding: 4px 24px 14px;
    width: 100%;
  }
  .shift-notice-timeline-step {
    flex: 1;
    height: 4px;
    background: #e2e8f0;
    border-radius: 999px;
    transition: background 0.3s ease;
  }
  html.dark .shift-notice-timeline-step {
    background: #334155;
  }
  .shift-notice-timeline-step.completed {
    background: #10b981;
  }
  .shift-notice-timeline-step.active {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
    animation: pulseActive 2s infinite ease-in-out;
  }
  @keyframes pulseActive {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Metadata container */
  .shift-notice-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 14px 24px 0;
  }
  .shift-notice-meta span:not(.shift-notice-priority-badge) {
    border: 1px solid #cbd5e1;
    border-radius: 999px;
    padding: 4px 10px;
    color: #475569;
    font-size: 11px;
    font-weight: 800;
  }
  html.dark .shift-notice-meta span:not(.shift-notice-priority-badge) {
    border-color: #475569;
    color: #cbd5e1;
  }

  /* Priority Badges */
  .shift-notice-priority-badge {
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 800;
  }

  /* Body & Rich Content styling - 100% identical to attendance_notifications */
  .shift-notice-body {
    padding: 18px 24px 24px;
    overflow-y: auto;
    min-height: 120px;
  }
  .sn-rich-content {
    line-height: 1.65;
    word-break: break-word;
    font-size: 15px;
  }
  .shift-notice-body.sn-rich-content {
    color: #334155;
  }
  html.dark .shift-notice-body.sn-rich-content {
    color: #cbd5e1;
  }
  .sn-rich-content p { margin: 0 0 0.65rem; }
  .sn-rich-content ul, .sn-rich-content ol { margin: 0.5rem 0 0.75rem 1.25rem; }
  .sn-rich-content blockquote {
    margin: 0.75rem 0;
    border-left: 3px solid rgb(59 130 246);
    padding-left: 0.75rem;
    color: rgb(71 85 105);
  }
  html.dark .sn-rich-content blockquote { color: rgb(203 213 225); }
  .sn-rich-content a { color: rgb(37 99 235); text-decoration: underline; font-weight: 600; }
  html.dark .sn-rich-content a { color: rgb(96 165 250); }
  .sn-rich-content img {
    display: block;
    max-width: 100%;
    max-height: 360px;
    margin: 0.75rem 0;
    border-radius: 0.75rem;
    border: 1px solid rgb(226 232 240);
  }
  html.dark .sn-rich-content img {
    border-color: rgb(51 65 85);
  }

  /* Attachment styling */
  .sn-attachment-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border-radius: 0.5rem;
    border: 1px solid rgb(226 232 240);
    background-color: rgb(248 250 252);
    padding: 0.375rem 0.75rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: rgb(37 99 235);
    text-decoration: none;
    transition: background-color 0.15s, border-color 0.15s;
    margin: 0.25rem 0.5rem 0.25rem 0;
  }
  .sn-attachment-badge:hover {
    background-color: rgb(241 245 249);
    border-color: rgb(203 213 225);
  }
  html.dark .sn-attachment-badge {
    border-color: rgb(51 65 85);
    background-color: rgb(15, 23, 42);
    color: rgb(96 165 250);
  }
  html.dark .sn-attachment-badge:hover {
    background-color: rgb(30, 41, 59);
    border-color: rgb(71, 85, 105);
  }

  /* Footer Section */
  .shift-notice-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 24px;
    border-top: 1px solid #e2e8f0;
    background: #f8fafc;
  }
  html.dark .shift-notice-foot {
    border-color: #334155;
    background: #111827;
  }
  .shift-notice-wait {
    min-width: 0;
    color: #64748b;
    font-size: 12px;
    font-weight: 700;
  }
  html.dark .shift-notice-wait { color: #94a3b8; }
  
  #shift-notice-read-btn {
    min-width: 140px;
    height: 44px;
    border: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #0d9488, #0f766e);
    color: #ffffff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25);
    transition: all 0.2s ease;
  }
  #shift-notice-read-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(13, 148, 136, 0.35);
    background: linear-gradient(135deg, #0f766e, #115e59);
  }
  #shift-notice-read-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  #shift-notice-read-btn:disabled {
    background: #cbd5e1;
    color: #94a3b8;
    box-shadow: none;
    cursor: not-allowed;
  }
  html.dark #shift-notice-read-btn:disabled {
    background: #334155;
    color: #64748b;
  }
</style>

<script>
(() => {
  const overlay = document.getElementById('shift-notice-overlay');
  if (!overlay) return;

  const titleEl = document.getElementById('shift-notice-title');
  const bodyEl = document.getElementById('shift-notice-body');
  const countEl = document.getElementById('shift-notice-count');
  const priorityEl = document.getElementById('shift-notice-priority');
  const shiftEl = document.getElementById('shift-notice-shift');
  const waitEl = document.getElementById('shift-notice-wait');
  const readBtn = document.getElementById('shift-notice-read-btn');

  let items = [];
  let index = 0;
  let timer = null;
  let current = null;

  const priorityLabel = {
    urgent: 'Khẩn cấp',
    high: 'Quan trọng',
    normal: 'Bình thường',
    low: 'Thông tin'
  };

  const priorityClass = {
    urgent: 'bg-red-100 text-red-700 border-red-200 dark:bg-red-950/40 dark:text-red-300 dark:border-red-900/50',
    high: 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-900/50',
    normal: 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-950/40 dark:text-blue-300 dark:border-blue-900/50',
    low: 'bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700'
  };

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function safeUrl(value, image = false) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (/^\/uploads\//i.test(raw)) return raw;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (!image && /^(mailto:|tel:)/i.test(raw)) return raw;
    if (image && /^data:image\/(png|jpe?g|gif|webp);base64,/i.test(raw)) return raw;
    return '';
  }

  function sanitizeRichHtml(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const template = document.createElement('template');
    template.innerHTML = raw;
    const allowed = new Set(['P', 'BR', 'DIV', 'SPAN', 'STRONG', 'B', 'EM', 'I', 'U', 'S', 'UL', 'OL', 'LI', 'BLOCKQUOTE', 'A', 'IMG', 'H1', 'H2', 'H3', 'PRE', 'CODE', 'FONT', 'SVG', 'PATH']);
    const cleanNode = (node) => {
      [...node.childNodes].forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) return;
        if (child.nodeType !== Node.ELEMENT_NODE) {
          child.remove();
          return;
        }
        const tag = child.tagName;
        const originalHref = child.getAttribute('href') || '';
        const originalSrc = child.getAttribute('src') || '';
        const originalAlt = child.getAttribute('alt') || '';
        const originalStyle = child.getAttribute('style') || '';
        const originalClass = child.getAttribute('class') || '';
        const originalDownload = child.getAttribute('download') || '';
        
        if (!allowed.has(tag)) {
          if (['SCRIPT', 'STYLE', 'IFRAME', 'OBJECT', 'EMBED'].includes(tag)) {
            child.remove();
            return;
          }
          child.replaceWith(...child.childNodes);
          return;
        }
        
        const svgAttrs = {
          viewBox: child.getAttribute('viewbox') || child.getAttribute('viewBox') || '0 0 24 24',
          fill: child.getAttribute('fill') || 'none',
          stroke: child.getAttribute('stroke') || 'currentColor',
          strokeWidth: child.getAttribute('stroke-width') || child.getAttribute('strokeWidth') || '2',
          d: child.getAttribute('d') || ''
        };

        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
        
        if (tag === 'A') {
          const href = safeUrl(originalHref);
          if (!href) {
            child.replaceWith(...child.childNodes);
            return;
          }
          child.setAttribute('href', href);
          child.setAttribute('target', '_blank');
          child.setAttribute('rel', 'noopener noreferrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalDownload) child.setAttribute('download', originalDownload);
        }
        else if (tag === 'IMG') {
          const src = safeUrl(originalSrc, true);
          if (!src) {
            child.remove();
            return;
          }
          child.setAttribute('src', src);
          child.setAttribute('alt', originalAlt);
          child.setAttribute('loading', 'lazy');
          child.setAttribute('referrerpolicy', 'no-referrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalStyle) child.setAttribute('style', originalStyle);
        }
        else if (tag === 'SVG') {
          child.setAttribute('viewBox', svgAttrs.viewBox);
          child.setAttribute('fill', svgAttrs.fill);
          child.setAttribute('stroke', svgAttrs.stroke);
          child.setAttribute('stroke-width', svgAttrs.strokeWidth);
          if (originalClass) child.setAttribute('class', originalClass);
        }
        else if (tag === 'PATH') {
          if (svgAttrs.d) {
            child.setAttribute('d', svgAttrs.d);
          }
        }
        else if (['P', 'DIV', 'SPAN', 'H1', 'H2', 'H3', 'BLOCKQUOTE'].includes(tag)) {
          const align = originalStyle.match(/text-align\s*:\s*(left|center|right|justify)/i);
          const color = originalStyle.match(/color\s*:\s*([^;]+)/i);
          const bg = originalStyle.match(/background-color\s*:\s*([^;]+)/i);
          const styles = [];
          if (align) styles.push(`text-align: ${align[1].toLowerCase()}`);
          if (color) styles.push(`color: ${color[1].trim()}`);
          if (bg) styles.push(`background-color: ${bg[1].trim()}`);
          if (styles.length) child.setAttribute('style', styles.join('; '));
          if (originalClass) child.setAttribute('class', originalClass);
        }
          cleanNode(child);
      });
    };
    cleanNode(template.content);
    return template.content.firstChild ? template.innerHTML.trim() : raw;
  }

  function lock(seconds) {
    let remaining = Math.max(1, Number(seconds || 5));
    readBtn.disabled = true;
    readBtn.textContent = `Đã đọc (${remaining}s)`;
    waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    clearInterval(timer);
    timer = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(timer);
        readBtn.disabled = false;
        readBtn.textContent = 'Đã đọc';
        waitEl.textContent = 'Bạn có thể xác nhận sau khi đã đọc xong.';
        return;
      }
      readBtn.textContent = `Đã đọc (${remaining}s)`;
      waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    }, 1000);
  }

  function showOverlay() {
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    overlay.offsetHeight;
    overlay.classList.add('is-open');
  }

  function hideOverlay() {
    overlay.classList.remove('is-open');
    setTimeout(() => {
      if (!overlay.classList.contains('is-open')) {
        overlay.hidden = true;
        document.body.style.removeProperty('overflow');
      }
    }, 300);
  }

  function updateTimeline() {
    const timelineEl = document.getElementById('shift-notice-timeline');
    if (!timelineEl) return;
    timelineEl.innerHTML = '';
    if (items.length > 1) {
      timelineEl.style.display = 'flex';
      for (let i = 0; i < items.length; i++) {
        const step = document.createElement('div');
        step.className = 'shift-notice-timeline-step';
        if (i < index) {
          step.classList.add('completed');
        } else if (i === index) {
          step.classList.add('active');
        }
        timelineEl.appendChild(step);
      }
    } else {
      timelineEl.style.display = 'none';
    }
  }

  function render() {
    current = items[index];
    if (!current) {
      hideOverlay();
      return;
    }
    showOverlay();
    updateTimeline();
    
    titleEl.textContent = current.title || 'Thông báo nội bộ';
    bodyEl.innerHTML = sanitizeRichHtml(current.body || '');
    countEl.textContent = `${index + 1}/${items.length}`;
    
    const pClass = current.priority || 'normal';
    priorityEl.textContent = priorityLabel[pClass] || pClass;
    priorityEl.className = 'shift-notice-priority-badge ' + (priorityClass[pClass] || priorityClass.normal);
    
    shiftEl.textContent = current.schedule_shift && current.schedule_shift !== 'ALL'
      ? `Ca ${current.schedule_shift}`
      : 'Ca hiện tại';
    lock(current.min_read_seconds || 5);
  }

  async function acknowledge() {
    if (!current || readBtn.disabled) return;
    readBtn.disabled = true;
    try {
      await fetch(`/attendance/api/shift-notifications/${current.id}/ack`, {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (e) {
      readBtn.disabled = false;
      return;
    }
    index += 1;
    render();
  }

  readBtn.addEventListener('click', acknowledge);

  async function loadPending() {
    try {
      const res = await fetch('/attendance/api/shift-notifications/pending', { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json();
      items = Array.isArray(data.items) ? data.items : [];
      index = 0;
      if (items.length) render();
    } catch (e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPending, { once: true });
  } else {
    loadPending();
  }
})();
</script>
{% endif %}
