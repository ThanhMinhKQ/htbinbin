{% if user %}
<div id="shift-notice-overlay" class="shift-notice-overlay" hidden>
  <div class="shift-notice-backdrop"></div>
  <section class="shift-notice-panel" role="dialog" aria-modal="true" aria-labelledby="shift-notice-title">
    <div class="shift-notice-head">
      <div>
        <div class="shift-notice-kicker">Thông báo ca làm việc</div>
        <h2 id="shift-notice-title">Thông báo nội bộ</h2>
      </div>
      <span id="shift-notice-count" class="shift-notice-count">1/1</span>
    </div>
    <div id="shift-notice-timeline" class="shift-notice-timeline" style="display: none;"></div>
    <div id="shift-notice-body" class="shift-notice-body sn-rich-content"></div>
    <div class="shift-notice-foot">
      <div class="shift-notice-read-state">
        <div class="shift-notice-read-row">
          <span id="shift-notice-wait" class="shift-notice-wait">Vui lòng đọc thông báo trong 5 giây</span>
          <span class="shift-notice-read-dot" aria-hidden="true"></span>
        </div>
        <div class="shift-notice-progress" aria-hidden="true">
          <span id="shift-notice-progress-bar"></span>
        </div>
      </div>
      <div class="shift-notice-foot-actions">
        <button id="shift-notice-back-btn" type="button" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Quay lại</span>
        </button>
        <button id="shift-notice-read-btn" type="button" disabled>Đã đọc</button>
      </div>
    </div>
  </section>
</div>

<!-- Full-screen image viewer (giống CRM xem giấy tờ) -->
<div id="shift-notice-imgviewer" class="snv-overlay" hidden>
  <div class="snv-toolbar">
    <span class="snv-counter" id="snv-counter"></span>
    <div class="snv-tools">
      <button type="button" id="snv-zoom-out" title="Thu nhỏ (-)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span class="snv-zoom" id="snv-zoom">100%</span>
      <button type="button" id="snv-zoom-in" title="Phóng to (+)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button type="button" id="snv-reset" title="Khôi phục kích thước">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><line x1="3" y1="3" x2="3" y2="8"/><line x1="3" y1="8" x2="8" y2="8"/></svg>
      </button>
      <button type="button" id="snv-rotate" title="Xoay ảnh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button type="button" id="snv-download" title="Tải xuống">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button type="button" id="snv-close" class="snv-close-btn" title="Đóng (Esc)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <button type="button" id="snv-prev" class="snv-nav snv-prev" title="Ảnh trước (←)" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button type="button" id="snv-next" class="snv-nav snv-next" title="Ảnh sau (→)" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="snv-stage" id="snv-stage">
    <img id="snv-img" class="snv-img" alt="Xem ảnh lớn" />
  </div>
</div>

<style>
  .shift-notice-overlay[hidden] { display: none !important; }
  .shift-notice-overlay {
    --sn-panel: #fffaf0;
    --sn-panel-2: #ffffff;
    --sn-ink: #1f2937;
    --sn-muted: #6b7280;
    --sn-line: rgba(120, 113, 108, 0.18);
    --sn-accent: #d97706;
    --sn-accent-2: #0f766e;
    --sn-glow: rgba(217, 119, 6, 0.28);
    position: fixed;
    inset: 0;
    z-index: 2147483000;
    display: grid;
    place-items: center;
    padding: clamp(16px, 3vw, 44px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  html.dark .shift-notice-overlay {
    --sn-panel: #0f172a;
    --sn-panel-2: #172033;
    --sn-ink: #f8fafc;
    --sn-muted: #a8b3c7;
    --sn-line: rgba(148, 163, 184, 0.18);
    --sn-accent: #f59e0b;
    --sn-accent-2: #2dd4bf;
    --sn-glow: rgba(245, 158, 11, 0.18);
  }
  .shift-notice-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .shift-notice-backdrop {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 18%, rgba(245, 158, 11, 0.26), transparent 30%),
      radial-gradient(circle at 82% 12%, rgba(20, 184, 166, 0.18), transparent 28%),
      linear-gradient(135deg, rgba(15, 23, 42, 0.72), rgba(41, 37, 36, 0.58));
    backdrop-filter: blur(18px) saturate(1.12);
  }
  .shift-notice-backdrop::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.22;
    background-image: linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at center, black, transparent 72%);
  }
  .shift-notice-panel {
    position: relative;
    width: min(920px, 100%);
    max-height: min(780px, calc(100dvh - 32px));
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255, 255, 255, 0.48);
    border-radius: clamp(22px, 2.6vw, 34px);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.72)) padding-box,
      linear-gradient(135deg, rgba(251, 191, 36, 0.72), rgba(20, 184, 166, 0.42), rgba(255,255,255,0.34)) border-box;
    box-shadow: 0 36px 110px -34px rgba(15, 23, 42, 0.66), 0 0 0 1px rgba(255,255,255,0.34) inset;
    transform: translateY(22px) scale(0.96);
    transition: transform 0.46s cubic-bezier(0.2, 1, 0.22, 1), opacity 0.32s ease;
    overflow: hidden;
    isolation: isolate;
  }
  .shift-notice-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 8% 8%, rgba(251, 191, 36, 0.22), transparent 34%),
      radial-gradient(circle at 92% 0%, rgba(45, 212, 191, 0.16), transparent 28%),
      linear-gradient(180deg, var(--sn-panel), var(--sn-panel-2));
  }
  .shift-notice-panel::after {
    content: "";
    position: absolute;
    top: -18%;
    right: -8%;
    width: min(34vw, 280px);
    aspect-ratio: 1;
    border-radius: 999px;
    background: radial-gradient(circle, var(--sn-glow), transparent 68%);
    pointer-events: none;
  }
  html.dark .shift-notice-panel {
    border-color: rgba(148, 163, 184, 0.22);
    color: var(--sn-ink);
    background:
      linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.82)) padding-box,
      linear-gradient(135deg, rgba(245, 158, 11, 0.44), rgba(45, 212, 191, 0.28), rgba(148,163,184,0.16)) border-box;
    box-shadow: 0 36px 120px -34px rgba(0, 0, 0, 0.86), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }
  .shift-notice-overlay.is-open .shift-notice-panel {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .shift-notice-head {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(14px, 2.4vw, 28px);
    padding: clamp(14px, 2vw, 20px) clamp(20px, 4vw, 44px) clamp(12px, 1.6vw, 16px);
    border-bottom: 1px solid var(--sn-line);
  }
  .shift-notice-kicker {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
    color: var(--sn-accent);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .shift-notice-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sn-accent-2);
    box-shadow: 0 0 0 5px rgba(20, 184, 166, 0.12);
  }
  .shift-notice-head h2 {
    margin: 0;
    max-width: 100%;
    color: var(--sn-ink);
    font-size: clamp(18px, 2.1vw, 24px);
    line-height: 1.12;
    font-weight: 800;
    letter-spacing: -0.025em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shift-notice-head > div:first-child {
    min-width: 0;
  }
  .shift-notice-count {
    flex: 0 0 auto;
    border: 1px solid rgba(217, 119, 6, 0.22);
    border-radius: 999px;
    background: rgba(255, 247, 237, 0.86);
    color: #92400e;
    padding: 9px 15px;
    font-size: 13px;
    font-weight: 900;
    box-shadow: 0 12px 28px -20px rgba(146, 64, 14, 0.8);
  }
  html.dark .shift-notice-count {
    border-color: rgba(245, 158, 11, 0.28);
    background: rgba(120, 53, 15, 0.34);
    color: #fcd34d;
  }
  .shift-notice-timeline {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    padding: 12px clamp(20px, 4vw, 44px) 0;
    width: 100%;
  }
  .shift-notice-timeline-step {
    position: relative;
    flex: 1;
    height: 6px;
    background: rgba(120, 113, 108, 0.16);
    border-radius: 999px;
    overflow: hidden;
    transition: transform 0.28s ease, background 0.28s ease;
  }
  html.dark .shift-notice-timeline-step { background: rgba(148, 163, 184, 0.16); }
  .shift-notice-timeline-step.is-clickable { cursor: pointer; }
  .shift-notice-timeline-step.completed::before,
  .shift-notice-timeline-step.active::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(90deg, #14b8a6, #f59e0b);
  }
  .shift-notice-timeline-step.active {
    transform: scaleY(1.28);
    box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1), 0 10px 22px -15px rgba(217, 119, 6, 0.9);
  }
  .shift-notice-timeline-step.active::before {
    animation: shiftNoticeStep 1.6s ease-in-out infinite;
  }
  @keyframes shiftNoticeStep {
    0%, 100% { transform: translateX(-16%); filter: saturate(0.9); }
    50% { transform: translateX(12%); filter: saturate(1.35); }
  }
  .shift-notice-body {
    flex: 1 1 auto;
    padding: clamp(16px, 2.4vw, 26px) clamp(20px, 4vw, 44px) clamp(18px, 2.6vw, 30px);
    overflow-y: auto;
    min-height: clamp(240px, 46dvh, 560px);
    scrollbar-width: thin;
  }
  .shift-notice-body::-webkit-scrollbar { width: 10px; }
  .shift-notice-body::-webkit-scrollbar-thumb {
    border: 3px solid transparent;
    border-radius: 999px;
    background: rgba(120, 113, 108, 0.36) padding-box;
  }
  .sn-rich-content {
    line-height: 1.76;
    word-break: break-word;
    font-size: clamp(16px, 1.8vw, 18px);
  }
  .shift-notice-body.sn-rich-content {
    color: #374151;
  }
  html.dark .shift-notice-body.sn-rich-content {
    color: #dbe4f0;
  }
  .sn-rich-content p { margin: 0 0 0.65rem; }
  .sn-rich-content ul,
  .sn-rich-content ol {
    margin: 0.5rem 0 0.75rem;
    padding-left: 1.75rem;
  }
  .sn-rich-content ul { list-style: disc outside; }
  .sn-rich-content ol { list-style: decimal outside; }
  .sn-rich-content ul ul { list-style: circle outside; }
  .sn-rich-content ul ul ul { list-style: square outside; }
  .sn-rich-content ol ol { list-style: lower-alpha outside; }
  .sn-rich-content ol ol ol { list-style: lower-roman outside; }
  .sn-rich-content li { margin: 0.2rem 0; padding-left: 0.25rem; }
  .sn-rich-content li::marker { color: var(--sn-accent); font-weight: 700; }
  html.dark .sn-rich-content li::marker { color: var(--sn-accent); }
  .sn-rich-content blockquote {
    margin: 0.75rem 0;
    border-left: 3px solid rgb(59 130 246);
    padding-left: 0.75rem;
    color: rgb(71 85 105);
  }
  html.dark .sn-rich-content blockquote { color: rgb(203 213 225); }
  .sn-rich-content a { color: rgb(37 99 235); text-decoration: underline; font-weight: 600; }
  html.dark .sn-rich-content a { color: rgb(96 165 250); }
  .sn-rich-content img {
    display: block;
    max-width: 100%;
    max-height: 360px;
    margin: 0.75rem 0;
    border-radius: 0.75rem;
    border: 1px solid rgb(226 232 240);
    cursor: zoom-in;
  }
  html.dark .sn-rich-content img {
    border-color: rgb(51 65 85);
  }

  /* Attachment styling */
  .sn-attachment-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border-radius: 0.5rem;
    border: 1px solid rgb(226 232 240);
    background-color: rgb(248 250 252);
    padding: 0.375rem 0.75rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: rgb(37 99 235);
    text-decoration: none;
    transition: background-color 0.15s, border-color 0.15s;
    margin: 0.25rem 0.5rem 0.25rem 0;
  }
  .sn-attachment-badge:hover {
    background-color: rgb(241 245 249);
    border-color: rgb(203 213 225);
  }
  html.dark .sn-attachment-badge {
    border-color: rgb(51 65 85);
    background-color: rgb(15, 23, 42);
    color: rgb(96 165 250);
  }
  html.dark .sn-attachment-badge:hover {
    background-color: rgb(30, 41, 59);
    border-color: rgb(71, 85, 105);
  }

  .shift-notice-foot {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(16px, 3vw, 34px);
    padding: clamp(12px, 1.8vw, 18px) clamp(20px, 4vw, 44px);
    border-top: 1px solid var(--sn-line);
    background: linear-gradient(180deg, rgba(255,255,255,0.44), rgba(255, 247, 237, 0.78));
  }
  html.dark .shift-notice-foot {
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.28), rgba(2, 6, 23, 0.62));
  }
  .shift-notice-read-state {
    flex: 1 1 auto;
    min-width: 0;
  }
  .shift-notice-read-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .shift-notice-wait {
    min-width: 0;
    color: var(--sn-muted);
    font-size: clamp(13px, 1.4vw, 15px);
    font-weight: 800;
  }
  .shift-notice-read-dot {
    width: 9px;
    height: 9px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: var(--sn-accent);
    box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.35);
    animation: shiftNoticeDot 1.35s infinite;
  }
  .shift-notice-read-state.is-ready .shift-notice-read-dot {
    background: var(--sn-accent-2);
    animation: none;
    box-shadow: 0 0 0 7px rgba(20, 184, 166, 0.12);
  }
  @keyframes shiftNoticeDot {
    70% { box-shadow: 0 0 0 9px rgba(245, 158, 11, 0); }
    100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
  }
  .shift-notice-progress {
    position: relative;
    height: 8px;
    overflow: hidden;
    border: 1px solid rgba(120, 113, 108, 0.16);
    border-radius: 999px;
    background: rgba(120, 113, 108, 0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.58) inset;
  }
  html.dark .shift-notice-progress {
    border-color: rgba(148, 163, 184, 0.16);
    background: rgba(15, 23, 42, 0.72);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
  }
  .shift-notice-progress::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: linear-gradient(120deg, transparent 0 30%, rgba(255,255,255,0.34) 45%, transparent 60% 100%);
    transform: translateX(-100%);
    animation: shiftNoticeProgressShine 1.8s linear infinite;
  }
  .shift-notice-read-state.is-ready .shift-notice-progress::after { display: none; }
  #shift-notice-progress-bar {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 42%, #14b8a6 100%);
    box-shadow: 0 9px 22px -10px rgba(20, 184, 166, 0.9);
    transition: width 0.28s linear;
  }
  @keyframes shiftNoticeProgressShine {
    to { transform: translateX(100%); }
  }
  .shift-notice-foot-actions {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #shift-notice-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 46px;
    padding: 0 16px;
    border: 1px solid var(--sn-line);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.55);
    color: var(--sn-muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
    transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  #shift-notice-back-btn[hidden] { display: none; }
  #shift-notice-back-btn svg { width: 18px; height: 18px; }
  #shift-notice-back-btn:hover {
    transform: translateY(-2px);
    color: var(--sn-accent);
    border-color: rgba(217, 119, 6, 0.4);
  }
  html.dark #shift-notice-back-btn {
    background: rgba(15, 23, 42, 0.5);
  }
  #shift-notice-read-btn {
    position: relative;
    min-width: clamp(140px, 16vw, 180px);
    height: 46px;
    border: 0;
    border-radius: 14px;
    background: linear-gradient(135deg, #0f766e, #14b8a6 58%, #f59e0b);
    color: #ffffff;
    cursor: pointer;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.01em;
    box-shadow: 0 18px 38px -20px rgba(15, 118, 110, 0.9), 0 1px 0 rgba(255,255,255,0.28) inset;
    transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    overflow: hidden;
  }
  #shift-notice-read-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.32), transparent);
    transform: translateX(-120%);
    transition: transform 0.6s ease;
  }
  #shift-notice-read-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    filter: saturate(1.08);
    box-shadow: 0 24px 46px -22px rgba(15, 118, 110, 0.95), 0 1px 0 rgba(255,255,255,0.3) inset;
  }
  #shift-notice-read-btn:hover:not(:disabled)::before { transform: translateX(120%); }
  #shift-notice-read-btn:active:not(:disabled) { transform: translateY(0); }
  #shift-notice-read-btn:disabled {
    background: linear-gradient(135deg, #d6d3d1, #e7e5e4);
    color: #78716c;
    box-shadow: none;
    cursor: not-allowed;
  }
  html.dark #shift-notice-read-btn:disabled {
    background: linear-gradient(135deg, #334155, #1e293b);
    color: #94a3b8;
  }
  @media (max-width: 720px) {
    .shift-notice-overlay { padding: 10px; align-items: end; }
    .shift-notice-panel {
      width: 100%;
      max-height: calc(100dvh - 20px);
      border-radius: 26px 26px 18px 18px;
    }
    .shift-notice-head { align-items: flex-start; }
    .shift-notice-count { padding: 8px 12px; }
    .shift-notice-foot { flex-direction: column; align-items: stretch; }
    #shift-notice-read-btn { width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .shift-notice-overlay,
    .shift-notice-panel,
    .shift-notice-timeline-step,
    #shift-notice-read-btn,
    #shift-notice-progress-bar { transition: none !important; }
    .shift-notice-timeline-step.active::before,
    .shift-notice-read-dot,
    .shift-notice-progress::after { animation: none !important; }
  }

  /* === Full-screen image viewer === */
  .snv-overlay[hidden] { display: none !important; }
  .snv-overlay {
    position: fixed;
    inset: 0;
    z-index: 2147483600;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    overflow: hidden;
  }
  .snv-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    cursor: default;
  }
  .snv-img {
    max-width: 90vw;
    max-height: 86vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    transition: transform 0.15s ease-out;
    user-select: none;
    -webkit-user-drag: none;
  }
  .snv-img.is-grabbable { cursor: grab; }
  .snv-img.is-grabbing { cursor: grabbing; transition: none; }
  .snv-toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
    z-index: 5;
    cursor: default;
  }
  .snv-counter {
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
    font-weight: 700;
  }
  .snv-tools {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .snv-tools button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.18s;
  }
  .snv-tools button:hover { background: rgba(255, 255, 255, 0.28); }
  .snv-tools button svg { width: 18px; height: 18px; }
  .snv-close-btn { background: rgba(220, 38, 38, 0.55) !important; }
  .snv-close-btn:hover { background: rgba(220, 38, 38, 0.9) !important; }
  .snv-zoom {
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    min-width: 42px;
    text-align: center;
  }
  .snv-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.18s;
    z-index: 5;
  }
  .snv-nav[hidden] { display: none; }
  .snv-nav:hover { background: rgba(255, 255, 255, 0.3); }
  .snv-nav svg { width: 24px; height: 24px; }
  .snv-prev { left: 20px; }
  .snv-next { right: 20px; }
  @media (max-width: 640px) {
    .snv-nav { width: 40px; height: 40px; }
    .snv-prev { left: 8px; }
    .snv-next { right: 8px; }
    .snv-tools button { width: 34px; height: 34px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .snv-img { transition: none !important; }
  }
</style>

<script>
(() => {
  const overlay = document.getElementById('shift-notice-overlay');
  if (!overlay) return;

  const titleEl = document.getElementById('shift-notice-title');
  const bodyEl = document.getElementById('shift-notice-body');
  const countEl = document.getElementById('shift-notice-count');
  const waitEl = document.getElementById('shift-notice-wait');
  const readBtn = document.getElementById('shift-notice-read-btn');
  const progressBar = document.getElementById('shift-notice-progress-bar');
  const readState = document.querySelector('.shift-notice-read-state');
  const backBtn = document.getElementById('shift-notice-back-btn');

  let items = [];
  let index = 0;
  let timer = null;
  let current = null;
  let maxReached = 0;
  const ackedIds = new Set();
  const lockCompleted = new Set();

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function safeUrl(value, image = false) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (/^\/uploads\//i.test(raw)) return raw;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (!image && /^(mailto:|tel:)/i.test(raw)) return raw;
    if (image && /^data:image\/(png|jpe?g|gif|webp);base64,/i.test(raw)) return raw;
    return '';
  }

  function sanitizeRichHtml(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const template = document.createElement('template');
    template.innerHTML = raw;
    const allowed = new Set(['P', 'BR', 'DIV', 'SPAN', 'STRONG', 'B', 'EM', 'I', 'U', 'S', 'UL', 'OL', 'LI', 'BLOCKQUOTE', 'A', 'IMG', 'H1', 'H2', 'H3', 'PRE', 'CODE', 'FONT', 'SVG', 'PATH']);
    const cleanNode = (node) => {
      [...node.childNodes].forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) return;
        if (child.nodeType !== Node.ELEMENT_NODE) {
          child.remove();
          return;
        }
        const tag = child.tagName;
        const originalHref = child.getAttribute('href') || '';
        const originalSrc = child.getAttribute('src') || '';
        const originalAlt = child.getAttribute('alt') || '';
        const originalStyle = child.getAttribute('style') || '';
        const originalClass = child.getAttribute('class') || '';
        const originalDownload = child.getAttribute('download') || '';
        
        if (!allowed.has(tag)) {
          if (['SCRIPT', 'STYLE', 'IFRAME', 'OBJECT', 'EMBED'].includes(tag)) {
            child.remove();
            return;
          }
          child.replaceWith(...child.childNodes);
          return;
        }
        
        const svgAttrs = {
          viewBox: child.getAttribute('viewbox') || child.getAttribute('viewBox') || '0 0 24 24',
          fill: child.getAttribute('fill') || 'none',
          stroke: child.getAttribute('stroke') || 'currentColor',
          strokeWidth: child.getAttribute('stroke-width') || child.getAttribute('strokeWidth') || '2',
          d: child.getAttribute('d') || ''
        };

        [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
        
        if (tag === 'A') {
          const href = safeUrl(originalHref);
          if (!href) {
            child.replaceWith(...child.childNodes);
            return;
          }
          child.setAttribute('href', href);
          child.setAttribute('target', '_blank');
          child.setAttribute('rel', 'noopener noreferrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalDownload) child.setAttribute('download', originalDownload);
        }
        else if (tag === 'IMG') {
          const src = safeUrl(originalSrc, true);
          if (!src) {
            child.remove();
            return;
          }
          child.setAttribute('src', src);
          child.setAttribute('alt', originalAlt);
          child.setAttribute('loading', 'lazy');
          child.setAttribute('referrerpolicy', 'no-referrer');
          if (originalClass) child.setAttribute('class', originalClass);
          if (originalStyle) child.setAttribute('style', originalStyle);
        }
        else if (tag === 'SVG') {
          child.setAttribute('viewBox', svgAttrs.viewBox);
          child.setAttribute('fill', svgAttrs.fill);
          child.setAttribute('stroke', svgAttrs.stroke);
          child.setAttribute('stroke-width', svgAttrs.strokeWidth);
          if (originalClass) child.setAttribute('class', originalClass);
        }
        else if (tag === 'PATH') {
          if (svgAttrs.d) {
            child.setAttribute('d', svgAttrs.d);
          }
        }
        else if (['P', 'DIV', 'SPAN', 'H1', 'H2', 'H3', 'BLOCKQUOTE'].includes(tag)) {
          const align = originalStyle.match(/text-align\s*:\s*(left|center|right|justify)/i);
          const color = originalStyle.match(/(^|[^-])color\s*:\s*([^;]+)/i);
          const bg = originalStyle.match(/background-color\s*:\s*([^;]+)/i);
          const fontSize = originalStyle.match(/font-size\s*:\s*(12px|15px|20px|28px)/i);
          const fontFamily = originalStyle.match(/font-family\s*:\s*([^;]+)/i);
          const styles = [];
          if (align) styles.push(`text-align: ${align[1].toLowerCase()}`);
          if (color) styles.push(`color: ${color[2].trim()}`);
          if (bg) styles.push(`background-color: ${bg[1].trim()}`);
          if (fontSize) styles.push(`font-size: ${fontSize[1].toLowerCase()}`);
          if (fontFamily) {
            const allowedFonts = ['inter', 'arial', 'times new roman', 'roboto', 'be vietnam pro'];
            const fam = fontFamily[1].trim().replace(/["']/g, '').toLowerCase();
            if (allowedFonts.some(f => fam.includes(f))) styles.push(`font-family: ${fontFamily[1].trim().replace(/["']/g, '')}`);
          }
          if (styles.length) child.setAttribute('style', styles.join('; '));
          if (originalClass) child.setAttribute('class', originalClass);
        }
          cleanNode(child);
      });
    };
    cleanNode(template.content);
    return template.content.firstChild ? template.innerHTML.trim() : raw;
  }

  function updateReadProgress(remaining, total) {
    if (!progressBar) return;
    const percent = Math.max(0, Math.min(100, ((total - remaining) / total) * 100));
    progressBar.style.width = `${percent}%`;
  }

  function lock(seconds) {
    const total = Math.max(1, Number(seconds || 5));
    let remaining = total;
    readBtn.disabled = true;
    readBtn.textContent = `Đã đọc (${remaining}s)`;
    waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    if (readState) readState.classList.remove('is-ready');
    updateReadProgress(remaining, total);
    clearInterval(timer);
    timer = setInterval(() => {
      remaining -= 1;
      updateReadProgress(remaining, total);
      if (remaining <= 0) {
        clearInterval(timer);
        readBtn.disabled = false;
        readBtn.textContent = 'Đã đọc';
        waitEl.textContent = 'Bạn có thể xác nhận sau khi đã đọc xong.';
        if (readState) readState.classList.add('is-ready');
        if (progressBar) progressBar.style.width = '100%';
        if (current) lockCompleted.add(current.id);
        return;
      }
      readBtn.textContent = `Đã đọc (${remaining}s)`;
      waitEl.textContent = `Vui lòng đọc thông báo trong ${remaining} giây`;
    }, 1000);
  }

  function showOverlay() {
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    overlay.offsetHeight;
    overlay.classList.add('is-open');
  }

  function hideOverlay() {
    overlay.classList.remove('is-open');
    setTimeout(() => {
      if (!overlay.classList.contains('is-open')) {
        overlay.hidden = true;
        document.body.style.removeProperty('overflow');
      }
    }, 300);
  }

  function updateTimeline() {
    const timelineEl = document.getElementById('shift-notice-timeline');
    if (!timelineEl) return;
    timelineEl.innerHTML = '';
    if (items.length > 1) {
      timelineEl.style.display = 'flex';
      for (let i = 0; i < items.length; i++) {
        const step = document.createElement('div');
        step.className = 'shift-notice-timeline-step';
        if (i < maxReached) {
          step.classList.add('completed');
        }
        if (i === index) {
          step.classList.add('active');
        }
        if (i <= maxReached) {
          step.classList.add('is-clickable');
          step.addEventListener('click', () => goTo(i));
        }
        timelineEl.appendChild(step);
      }
    } else {
      timelineEl.style.display = 'none';
    }
  }

  function goTo(target) {
    if (target < 0 || target > maxReached || target >= items.length) return;
    if (target === index) return;
    index = target;
    render();
  }

  function updateBackBtn() {
    if (!backBtn) return;
    backBtn.hidden = index <= 0;
  }

  function setReadyState(label) {
    clearInterval(timer);
    readBtn.disabled = false;
    readBtn.textContent = label;
    if (readState) readState.classList.add('is-ready');
    if (progressBar) progressBar.style.width = '100%';
  }

  function render() {
    current = items[index];
    if (!current) {
      hideOverlay();
      return;
    }
    showOverlay();
    updateTimeline();
    updateBackBtn();

    titleEl.textContent = current.title || 'Thông báo nội bộ';
    bodyEl.innerHTML = sanitizeRichHtml(current.body || '');
    bindBodyImages();
    countEl.textContent = `${index + 1}/${items.length}`;
    countEl.style.display = items.length > 1 ? '' : 'none';

    const alreadyRead = index < maxReached || ackedIds.has(current.id) || lockCompleted.has(current.id);
    if (alreadyRead) {
      const more = index < maxReached;
      waitEl.textContent = more ? 'Bạn đã đọc thông báo này.' : 'Bạn có thể xác nhận sau khi đã đọc xong.';
      setReadyState(more ? 'Tiếp theo' : 'Đã đọc');
    } else {
      lock(current.min_read_seconds || 5);
    }
  }

  async function acknowledge() {
    if (!current || readBtn.disabled) return;
    const reviewing = index < maxReached;
    if (reviewing) {
      goTo(index + 1);
      return;
    }
    readBtn.disabled = true;
    try {
      await fetch(`/attendance/api/shift-notifications/${current.id}/ack`, {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (e) {
      readBtn.disabled = false;
      return;
    }
    ackedIds.add(current.id);
    if (index + 1 > maxReached) maxReached = index + 1;
    if (maxReached >= items.length) {
      hideOverlay();
      return;
    }
    index += 1;
    render();
  }

  readBtn.addEventListener('click', acknowledge);
  if (backBtn) backBtn.addEventListener('click', () => goTo(index - 1));

  // === Full-screen image viewer (giống CRM xem giấy tờ) ===
  const viewer = document.getElementById('shift-notice-imgviewer');
  const vImg = document.getElementById('snv-img');
  const vStage = document.getElementById('snv-stage');
  const vCounter = document.getElementById('snv-counter');
  const vZoomLabel = document.getElementById('snv-zoom');
  const vPrev = document.getElementById('snv-prev');
  const vNext = document.getElementById('snv-next');
  let vUrls = [];
  let vIndex = -1;
  let vZoom = 1, vRotation = 0, vPanX = 0, vPanY = 0;
  let vDragging = false, vDidPan = false, vDragOX = 0, vDragOY = 0;

  function bindBodyImages() {
    if (!bodyEl) return;
    bodyEl.querySelectorAll('img').forEach(img => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        const urls = [...bodyEl.querySelectorAll('img')].map(i => i.getAttribute('src')).filter(Boolean);
        const start = urls.indexOf(img.getAttribute('src'));
        openViewer(urls, start < 0 ? 0 : start);
      });
    });
  }

  function vApplyTransform() {
    vImg.style.transform = `translate(${vPanX}px,${vPanY}px) scale(${vZoom}) rotate(${vRotation}deg)`;
    vImg.classList.toggle('is-grabbable', vZoom > 1);
    vImg.classList.toggle('is-grabbing', vDragging);
    if (vZoomLabel) vZoomLabel.textContent = Math.round(vZoom * 100) + '%';
  }
  function vReset() {
    vZoom = 1; vRotation = 0; vPanX = 0; vPanY = 0; vDragging = false; vDidPan = false;
    vApplyTransform();
  }
  function vRender() {
    if (vIndex < 0 || vIndex >= vUrls.length) return;
    vImg.src = vUrls[vIndex];
    vCounter.textContent = vUrls.length > 1 ? `${vIndex + 1} / ${vUrls.length}` : '';
    const multi = vUrls.length > 1;
    vPrev.hidden = !multi;
    vNext.hidden = !multi;
    vReset();
  }
  function openViewer(urls, start) {
    vUrls = urls;
    vIndex = start;
    viewer.hidden = false;
    document.body.style.overflow = 'hidden';
    vRender();
  }
  function closeViewer() {
    viewer.hidden = true;
    vIndex = -1;
    if (overlay.classList.contains('is-open')) document.body.style.overflow = 'hidden';
    else document.body.style.removeProperty('overflow');
  }
  function vPrevImg() { if (vUrls.length > 1) { vIndex = (vIndex - 1 + vUrls.length) % vUrls.length; vRender(); } }
  function vNextImg() { if (vUrls.length > 1) { vIndex = (vIndex + 1) % vUrls.length; vRender(); } }
  function vZoomIn() { vZoom = Math.min(Math.round((vZoom + 0.25) * 100) / 100, 5); vApplyTransform(); }
  function vZoomOut() { vZoom = Math.max(Math.round((vZoom - 0.25) * 100) / 100, 0.25); if (vZoom <= 1) { vPanX = 0; vPanY = 0; } vApplyTransform(); }
  function vResetZoom() { vZoom = 1; vPanX = 0; vPanY = 0; vApplyTransform(); }
  function vRotate() { vRotation = (vRotation + 90) % 360; vApplyTransform(); }
  async function vDownload() {
    const url = vUrls[vIndex];
    if (!url) return;
    const ext = (url.split('?')[0].split('.').pop() || 'jpg');
    try {
      const res = await fetch(url, { credentials: 'omit' });
      if (!res.ok) throw new Error('fetch failed');
      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl;
      a.download = 'thong_bao.' + ext;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(objUrl), 1000);
    } catch (e) {
      window.open(url, '_blank');
    }
  }

  if (viewer) {
    document.getElementById('snv-zoom-in').addEventListener('click', (e) => { e.stopPropagation(); vZoomIn(); });
    document.getElementById('snv-zoom-out').addEventListener('click', (e) => { e.stopPropagation(); vZoomOut(); });
    document.getElementById('snv-reset').addEventListener('click', (e) => { e.stopPropagation(); vResetZoom(); });
    document.getElementById('snv-rotate').addEventListener('click', (e) => { e.stopPropagation(); vRotate(); });
    document.getElementById('snv-download').addEventListener('click', (e) => { e.stopPropagation(); vDownload(); });
    document.getElementById('snv-close').addEventListener('click', (e) => { e.stopPropagation(); closeViewer(); });
    vPrev.addEventListener('click', (e) => { e.stopPropagation(); vPrevImg(); });
    vNext.addEventListener('click', (e) => { e.stopPropagation(); vNextImg(); });

    viewer.addEventListener('click', () => closeViewer());
    vStage.addEventListener('click', (e) => e.stopPropagation());

    vImg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.15 : -0.15;
      vZoom = Math.min(Math.max(Math.round((vZoom + delta) * 100) / 100, 0.25), 5);
      if (vZoom <= 1) { vPanX = 0; vPanY = 0; }
      vApplyTransform();
    }, { passive: false });
    vImg.addEventListener('dblclick', () => { vZoom > 1 ? vResetZoom() : vZoomIn(); });
    vImg.addEventListener('mousedown', (e) => {
      if (vZoom <= 1) return;
      e.preventDefault();
      vDragging = true; vDidPan = false;
      vDragOX = e.clientX - vPanX; vDragOY = e.clientY - vPanY;
      vApplyTransform();
    });
    vImg.addEventListener('click', (e) => { if (vDidPan) e.stopPropagation(); });
    window.addEventListener('mousemove', (e) => {
      if (!vDragging) return;
      vPanX = e.clientX - vDragOX; vPanY = e.clientY - vDragOY; vDidPan = true;
      vApplyTransform();
    });
    window.addEventListener('mouseup', () => { if (vDragging) { vDragging = false; vApplyTransform(); } });
    vImg.addEventListener('touchstart', (e) => {
      if (vZoom <= 1) return;
      const t = e.touches[0];
      vDragging = true; vDidPan = false;
      vDragOX = t.clientX - vPanX; vDragOY = t.clientY - vPanY;
    }, { passive: true });
    window.addEventListener('touchmove', (e) => {
      if (!vDragging) return;
      const t = e.touches[0];
      vPanX = t.clientX - vDragOX; vPanY = t.clientY - vDragOY; vDidPan = true;
      vApplyTransform();
    }, { passive: true });
    window.addEventListener('touchend', () => { vDragging = false; });

    window.addEventListener('keydown', (e) => {
      if (viewer.hidden) return;
      switch (e.key) {
        case 'Escape': closeViewer(); break;
        case 'ArrowLeft': vPrevImg(); break;
        case 'ArrowRight': vNextImg(); break;
        case '+': case '=': vZoomIn(); break;
        case '-': case '_': vZoomOut(); break;
      }
    });
  }

  async function loadPending() {
    try {
      const res = await fetch('/attendance/api/shift-notifications/pending', { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json();
      items = Array.isArray(data.items) ? data.items : [];
      index = 0;
      if (items.length) render();
    } catch (e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPending, { once: true });
  } else {
    loadPending();
  }
})();
</script>
