<!-- ═══ MODAL CHECK-OUT (Small) ═══ -->
<div class="v-modal" id="coModal">
  <div class="v-dialog" style="max-width:420px;">
    <div class="v-header">
      <div style="width:42px;height:42px;border-radius:10px;background:#fee2e2;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <div>
        <h5 class="v-title" id="co-title">Trả phòng</h5>
        <div class="v-sub" id="co-sub"></div>
      </div>
      <button class="v-close" onclick="closeModal('coModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="v-body">
      <input type="hidden" id="co-stay-id">

      <div style="background:#f9fafb;border:1px solid #f1f3f5;border-radius:10px;padding:16px;margin-bottom:16px;">
        <table style="width:100%;font-size:13px;">
          <tr><td style="color:#6b7280;padding:4px 0;width:120px;">Check-in:</td><td style="text-align:right;font-weight:600;" id="co-ci"></td></tr>
          <tr><td style="color:#6b7280;padding:4px 0;">Check-out:</td><td style="text-align:right;font-weight:600;color:#dc2626;" id="co-now"></td></tr>
          <tr><td style="color:#6b7280;padding:4px 0;">Thời gian:</td><td style="text-align:right;font-weight:600;" id="co-dur"></td></tr>
          <tr><td style="color:#6b7280;padding:4px 0;">Đặt cọc:</td><td style="text-align:right;" id="co-dep"></td></tr>
          <tr><td colspan="2" style="border-top:1px dashed #d1d5db;margin-top:8px;padding-top:8px;"></td></tr>
          <tr><td style="font-weight:700;padding-top:4px;">Tổng tiền:</td><td style="text-align:right;font-weight:700;color:#dc2626;font-size:16px;" id="co-total"></td></tr>
        </table>
      </div>

      <div class="f-grp" style="margin-bottom:0;">
        <label>Giảm giá / Khuyến mãi</label>
        <input type="text" class="f-ctrl currency-input" id="co-discount" placeholder="0" oninput="pmsCoCalcTotal()" onblur="pmsCoFormatCurrency(this)">
      </div>
      <div class="f-grp" style="margin-bottom:0;">
        <label>Phụ thu khác</label>
        <input type="text" class="f-ctrl currency-input" id="co-extra" placeholder="0" oninput="pmsCoCalcTotal()" onblur="pmsCoFormatCurrency(this)">
      </div>
      <div class="f-grp" style="margin-bottom:0;">
        <label>Điều chỉnh giá (nếu cần)</label>
        <input type="text" class="f-ctrl currency-input" id="co-override" placeholder="Để trống = tính tự động" oninput="pmsCoCalcTotal()" onblur="pmsCoFormatCurrency(this)">
      </div>
    </div>
    <div class="v-footer">
      <button class="v-btn light" onclick="closeModal('coModal')">Huỷ</button>
      <button class="v-btn danger" onclick="submitCO()">Xác nhận Trả phòng</button>
    </div>
  </div>
</div>
