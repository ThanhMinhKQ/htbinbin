{# app/templates/pms/modals/scan_modal.html #}
{# CCCD QR Scan Overlay — shared across check-in & add-guest modals #}

<div class="v-modal" id="scanModal">
  <div class="sm-dialog" id="sm-dialog">

    <!-- HEADER -->
    <div class="sm-header">
      <div class="sm-icon-wrap" id="sm-icon-wrap">
        <svg id="sm-icon-svg" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
      </div>
      <div class="sm-header-text">
        <h5 class="sm-title" id="sm-title">Quét CCCD / Căn cước</h5>
        <p class="sm-sub" id="sm-sub">Đọc mã QR từ thẻ CCCD gắn chip hoặc giấy tờ</p>
      </div>
      <button class="sm-close" onclick="scanModalClose()" title="Đóng">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- BODY -->
    <div class="sm-body">

      <!-- SCANNER PANEL — visible while waiting, hidden after success -->
      <div class="sm-scanner-panel" id="sm-scanner-panel">
        <div class="sm-scanner-viewport">
          <div class="sm-corner-tl"></div>
          <div class="sm-corner-tr"></div>
          <div class="sm-corner-bl"></div>
          <div class="sm-corner-br"></div>
          <div class="sm-scan-line" id="sm-scan-line"></div>
        </div>
        <div class="sm-scanner-status" id="sm-scanner-status">
          <span class="sm-status-dot"></span>
          <span id="sm-status-text">Đang chờ quét&hellip;</span>
        </div>
        <div class="sm-live-preview" id="sm-live-preview"></div>
      </div>

      <!-- INFO PANEL — guest card, injected by JS -->
      <div class="sm-info-panel" id="sm-info-panel"></div>

      <!-- MANUAL TEST INPUT -->
      <div class="sm-test-row">
        <p class="sm-test-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Dán chuỗi QR thủ công
        </p>
        <div class="sm-test-group">
          <input
            type="text"
            id="sm-test-input"
            class="sm-test-input"
            placeholder="Dán chuỗi QR CCCD vào đây…"
            autocomplete="off"
            spellcheck="false"
            onkeydown="if(event.key==='Enter'){event.preventDefault();scanModalTestInput();}"
          />
          <button class="sm-test-submit" onclick="scanModalTestInput()" title="Parse chuỗi này">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="sm-btn-row" id="sm-btn-row">
        <button class="sm-btn-secondary" id="sm-rescan-btn" onclick="scanModalBack()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.06"/></svg>
          Quét lại
        </button>
        <button class="sm-btn-primary" id="sm-confirm-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Xác nhận &amp; điền form
        </button>
      </div>

    </div>
  </div>
</div>
