<div class="v-modal" id="rdModal">
  <div class="v-dialog" id="rd-dialog">

    <style>
      #rd-dialog {
        background-color: #f8fafc;
        max-width: 1450px;
        width: 95%;
        max-height: 96vh;
        margin: 2vh auto;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .rd-modal-busy-overlay {
        position: absolute;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(248, 250, 252, 0.72);
        backdrop-filter: blur(2px);
      }
      #rd-dialog.rd-busy .rd-modal-busy-overlay {
        display: flex;
      }
      #rd-dialog.rd-busy .rd-header,
      #rd-dialog.rd-busy .v-body {
        filter: grayscale(0.12);
        pointer-events: none;
      }
      .rd-modal-busy-panel {
        min-width: 220px;
        padding: 18px 20px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #dbe3ee;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
        display: flex;
        align-items: center;
        gap: 12px;
        color: #0f172a;
        font-size: 13px;
        font-weight: 800;
      }
      .rd-modal-busy-spinner,
      .rd-skeleton-spinner {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        border: 3px solid #cbd5e1;
        border-top-color: #088395;
        animation: rdBusySpin 0.75s linear infinite;
        flex: 0 0 auto;
      }
      .rd-modal-skeleton {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
      }
      .rd-skeleton-card {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
        padding: 12px;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .rd-skeleton-avatar {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 37%, #e2e8f0 63%);
        background-size: 400% 100%;
        animation: rdSkeletonShimmer 1.15s ease-in-out infinite;
      }
      .rd-skeleton-line {
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 37%, #e2e8f0 63%);
        background-size: 400% 100%;
        animation: rdSkeletonShimmer 1.15s ease-in-out infinite;
      }
      @keyframes rdSkeletonShimmer {
        0% { background-position: 100% 0; }
        100% { background-position: 0 0; }
      }
      @keyframes rdBusySpin {
        to { transform: rotate(360deg); }
      }

      /* Dark Mode */
      .dark #rd-dialog,
      html.dark #rd-dialog { background-color: #0f172a; }

      html.dark .rd-modal-busy-overlay { background: rgba(15, 23, 42, 0.7); }

      .rd-body {
        display: flex;
        gap: 20px;
        padding: 20px;
        flex: 1;
        overflow-y: auto;
        background: #f8fafc;
      }

      .dark .rd-body,
      html.dark .rd-body { background: #1e293b; }

      .rd-col-main {

      /* ══════════════════════════════════════════════════════
         TIMELINE UI - Guest Activity Timeline
         ══════════════════════════════════════════════════════ */

      .rd-timeline-wrap {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        padding: 12px 20px 16px;
        overflow: hidden;
      }

      .rd-tl-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 10px 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid #f1f5f9;
        flex-shrink: 0;
      }

      html.dark .rd-tl-toolbar {
        border-color: #334155;
      }

      .rd-tl-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        flex: 1 1 280px;
        min-width: min(100%, 320px);
      }

      @media (max-width: 640px) {
        .rd-tl-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      html.dark .rd-tl-stats {
        border-color: transparent;
      }

      .rd-tl-stat {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 8px;
        background: #fff;

<script>
  // Sync dark mode with rdModal
  function syncRdModalDarkMode() {
    const modal = document.getElementById('rdModal');
    if (!modal) return;
    if (document.documentElement.classList.contains('dark')) {
      modal.classList.add('dark');
    } else {
      modal.classList.remove('dark');
    }
  }

  // Sync when modal is shown
  const rdModalObserver = new MutationObserver(() => {
    syncRdModalDarkMode();
  });

  document.addEventListener('DOMContentLoaded', () => {
    // Observe html class changes
    const htmlEl = document.documentElement;
    const observer = new MutationObserver(() => {
      syncRdModalDarkMode();
    });
    observer.observe(htmlEl, { attributes: true, attributeFilter: ['class'] });

    // Initial sync
    syncRdModalDarkMode();
  });
</script>
