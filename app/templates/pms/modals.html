<!-- ═══ MODAL ADD GUEST ═══ -->
<div class="v-modal" id="agModal">
  <div class="v-dialog" style="max-width:540px;">
    <div class="v-header">
      <div style="width:42px;height:42px;border-radius:10px;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      </div>
      <h5 class="v-title" id="ag-title" style="margin-top:9px;">Thêm khách</h5>
      <button class="v-close" onclick="closeModal('agModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="v-body">
      <input type="hidden" id="ag-stay-id">
      <div class="f-grid">
        <div class="f-grp f-grid-full">
          <label>Họ và tên <span class="f-req">*</span></label>
          <input type="text" class="f-ctrl" id="ag-name" style="text-transform:uppercase;">
        </div>
        <div class="f-grp">
          <label>CCCD</label>
          <input type="text" class="f-ctrl" id="ag-cccd">
        </div>
        <div class="f-grp">
          <label>Giới tính</label>
          <select class="f-ctrl" id="ag-gender"><option value="">—</option><option>Nam</option><option>Nữ</option><option>Khác</option></select>
        </div>
        <div class="f-grp" style="margin-bottom:0;">
          <label>Ngày sinh</label>
          <input type="date" class="f-ctrl" id="ag-birth">
        </div>
        <div class="f-grp" style="margin-bottom:0;">
          <label>Điện thoại</label>
          <input type="tel" class="f-ctrl" id="ag-phone">
        </div>
        <div class="f-grp" style="margin-bottom:0;">
          <label>Phương tiện</label>
          <input type="text" class="f-ctrl" id="ag-vehicle">
        </div>
        <div class="f-grp f-grid-full" style="margin-bottom:0;">
          <label>Ghi chú (khách)</label>
          <input type="text" class="f-ctrl" id="ag-notes">
        </div>
      </div>
    </div>
    <div class="v-footer">
      <button class="v-btn light" onclick="closeModal('agModal')">Huỷ</button>
      <button class="v-btn primary" onclick="submitAG()">Thêm khách</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL TRANSFER ═══ -->
<div class="v-modal" id="tfModal">
  <div class="v-dialog" style="max-width:480px;">
    <div class="v-header">
      <div style="width:42px;height:42px;border-radius:10px;background:#ede9fe;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <div>
        <h5 class="v-title">Đổi phòng</h5>
        <div class="v-sub" id="tf-info"></div>
      </div>
      <button class="v-close" onclick="closeModal('tfModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="v-body">
      <input type="hidden" id="tf-stay-id">
      <div class="f-grp" style="margin-bottom:0;">
        <label>Phòng trống khả dụng</label>
        <select class="f-ctrl" id="tf-room" size="6" style="height:auto;padding:4px;"></select>
      </div>
    </div>
    <div class="v-footer">
      <button class="v-btn light" onclick="closeModal('tfModal')">Huỷ</button>
      <button class="v-btn primary" style="background:#111827;" onclick="submitTF()">Xác nhận đổi phòng</button>
    </div>
  </div>
</div>
