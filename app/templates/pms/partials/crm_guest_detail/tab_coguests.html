{# CRM Guest Detail - Tab Co-Guests #}

<!-- ── TAB: Co-guests ── -->
<div class="gd-panel gd-panel-enter" x-show="activeTab === 'coguests'" x-cloak>
  <template x-if="coGuestsLoading">
    <div class="gd-loading">
      <div class="gd-spinner"></div> Đang tải...
    </div>
  </template>
  <template x-if="!coGuestsLoading && coGuests.length === 0">
    <div class="gd-card">
      <div class="gd-empty">
        <div class="gd-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div class="gd-empty-text">Chưa có ai cùng ở với khách này</div>
      </div>
    </div>
  </template>
  <template x-if="!coGuestsLoading && coGuests.length > 0">
    <div>
      <!-- Summary card -->
      <div class="gd-card gd-co-summary">
        <div class="gd-card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Người cùng ở
          <span class="gd-card-count" x-text="coGuests.length + ' người'"></span>
        </div>
        <div class="gd-card-subtitle">
          Những người đã từng ở cùng phòng với <strong x-text="guest?.full_name"></strong>
        </div>
      </div>

      <!-- Co-guests list -->
      <div class="gd-co-list">
        <template x-for="cg in coGuests" :key="cg.guest_id">
          <div class="gd-card gd-co-card" @click="window.location.href='/pms/crm/guest/' + cg.guest_id">
            <div class="gd-co-main">
              <div class="gd-avatar gd-co-avatar" :style="'background:' + avatarColor(cg.full_name)">
                <span x-text="(cg.full_name||'?')[0].toUpperCase()"></span>
              </div>

              <div class="gd-co-info">
                <div class="gd-co-name-row">
                  <span class="gd-co-name" x-text="cg.full_name"></span>
                  <span class="tier-badge" :class="'tier-' + cg.tier" x-text="cg.tier_display"></span>
                </div>
                <div class="gd-co-meta">
                  <span x-text="cg.phone || cg.cccd || '-'"></span>
                  <span x-text="cg.total_stays + ' lần ở'"></span>
                  <span x-text="'Cùng ở ' + cg.stay_count + ' lần'"></span>
                </div>
              </div>

              <div class="gd-co-preview">
                <div class="gd-co-preview-room">
                  <template x-if="cg.stays && cg.stays.length > 0">
                    <span>
                      P.<strong x-text="cg.stays[0].room_number"></strong>
                      <span x-text="fmtDate(cg.stays[0].check_in_at)"></span>
                    </span>
                  </template>
                </div>
                <div class="gd-co-link">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                    <polyline points="15 3 21 3 21 9" />
                    <line x1="10" y1="14" x2="21" y2="3" />
                  </svg>
                  Xem hồ sơ
                </div>
              </div>
            </div>

            <div class="gd-co-history">
              <div class="gd-co-history-title">Lịch sử cùng ở</div>
              <div class="gd-co-history-list">
                <template x-for="(stay, idx) in cg.stays.slice(0, 3)" :key="idx">
                  <div class="gd-co-history-item">
                    <span class="gd-co-history-room" x-text="'P.' + stay.room_number"></span>
                    <span x-text="fmtDate(stay.check_in_at)"></span>
                    <template x-if="stay.check_out_at">
                      <span>→</span>
                    </template>
                    <template x-if="stay.check_out_at">
                      <span x-text="fmtDate(stay.check_out_at)"></span>
                    </template>
                  </div>
                </template>
                <template x-if="cg.stays.length > 3">
                  <div class="gd-co-more">
                    + <span x-text="cg.stays.length - 3"></span> lần khác
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>
</div>
