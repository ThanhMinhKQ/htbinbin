{# CRM Guest Detail - Tab Co-Guests #}

<!-- ── TAB: Co-guests ── -->
<div class="gd-panel gd-panel-enter" x-show="activeTab === 'coguests'" x-cloak>
  <template x-if="coGuestsLoading">
    <div class="gd-loading">
      <div class="gd-spinner"></div> Đang tải...
    </div>
  </template>
  <template x-if="!coGuestsLoading && coGuests.length === 0">
    <div class="gd-card">
      <div class="gd-empty">
        <div class="gd-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div class="gd-empty-text">Chưa có ai cùng ở với khách này</div>
      </div>
    </div>
  </template>
  <template x-if="!coGuestsLoading && coGuests.length > 0">
    <div>
      <!-- Summary card -->
      <div class="gd-card">
        <div class="gd-card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Người cùng ở
          <span style="margin-left:auto;font-size:12px;color:var(--crm-text-muted);"
            x-text="coGuests.length + ' người'"></span>
        </div>
        <div style="font-size:13px;color:var(--crm-text-secondary);">
          Những người đã từng ở cùng phòng với <strong x-text="guest?.full_name"></strong>
        </div>
      </div>

      <!-- Co-guests list -->
      <template x-for="cg in coGuests" :key="cg.guest_id">
        <div class="gd-card" style="cursor:pointer;"
          @click="window.location.href='/pms/crm/guest/' + cg.guest_id">
          <div style="display:flex;align-items:center;gap:16px;">
            <!-- Avatar -->
            <div class="gd-avatar"
              :style="'background:' + avatarColor(cg.full_name) + ';width:48px;height:48px;font-size:18px;">
              <span x-text="(cg.full_name||'?')[0].toUpperCase()"></span>
            </div>

            <!-- Info -->
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span style="font-weight:700;font-size:15px;" x-text="cg.full_name"></span>
                <span class="tier-badge" :class="'tier-' + cg.tier" x-text="cg.tier_display"></span>
              </div>
              <div style="font-size:12px;color:var(--crm-text-muted);margin-top:4px;">
                <span x-text="cg.phone || cg.cccd || '-'"></span>
                <span style="margin:0 8px;">·</span>
                <span x-text="cg.total_stays + ' lần ở'"></span>
                <span style="margin:0 8px;">·</span>
                <span x-text="'Cùng ở ' + cg.stay_count + ' lần'"></span>
              </div>
            </div>

            <!-- Stay preview -->
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:12px;color:var(--crm-text-muted);">
                <template x-if="cg.stays && cg.stays.length > 0">
                  <span>
                    P.<strong x-text="cg.stays[0].room_number"></strong>
                    <span x-text="fmtDate(cg.stays[0].check_in_at)"></span>
                  </span>
                </template>
              </div>
              <div style="font-size:11px;color:var(--crm-accent);margin-top:4px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  style="width:12px;height:12px;vertical-align:middle;margin-right:4px;">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                Xem hồ sơ
              </div>
            </div>
          </div>

          <!-- Stay history -->
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--crm-border);">
            <div
              style="font-size:11px;font-weight:600;color:var(--crm-text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">
              Lịch sử cùng ở
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <template x-for="(stay, idx) in cg.stays.slice(0, 3)" :key="idx">
                <div style="display:flex;align-items:center;gap:12px;font-size:12px;">
                  <span style="font-weight:700;color:var(--crm-accent);"
                    x-text="'P.' + stay.room_number"></span>
                  <span style="color:var(--crm-text-secondary);" x-text="fmtDate(stay.check_in_at)"></span>
                  <template x-if="stay.check_out_at">
                    <span style="color:var(--crm-text-muted);">→</span>
                  </template>
                  <template x-if="stay.check_out_at">
                    <span style="color:var(--crm-text-secondary);" x-text="fmtDate(stay.check_out_at)"></span>
                  </template>
                </div>
              </template>
              <template x-if="cg.stays.length > 3">
                <div style="font-size:12px;color:var(--crm-text-muted);font-style:italic;">
                  + <span x-text="cg.stays.length - 3"></span> lần khác
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
