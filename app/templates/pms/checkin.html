              <label><input type="radio" name="st" id="st-hour" value="hour"></label>
            </div>

            <!-- Room info compact strip -->
            <div class="ci-room-strip">
              <div class="ci-room-strip-item">
                <label>Phòng</label>
                <input type="text" class="strip-val" id="ci-room-num" readonly
                  style="border:none; background:transparent; padding:0; font-size:14px; font-weight:600; color:#1e293b; width:100%; outline:none;">
              </div>
              <div class="ci-room-strip-item">
                <label>Loại phòng</label>
                <select class="strip-val" id="ci-room-type" disabled
                  style="border:none; background:transparent; padding:0; font-size:14px; font-weight:600; color:#1e293b; appearance:none; outline:none; cursor:default;">
                  <option id="ci-room-type-opt">—</option>
                </select>
              </div>
            </div>

            <!-- Time fields -->
            <div class="ci-time-grid">
              <div class="ci-time-field">
                <label>Nhận phòng <span class="f-req">*</span></label>
                <input type="datetime-local" class="f-ctrl" id="ci-in" onchange="pmsCalcPrice()" style="padding-left:12px;">
              </div>
              <div class="ci-time-field">
                <label>Trả phòng dự kiến</label>
                <input type="datetime-local" class="f-ctrl" id="ci-out" onchange="pmsCalcPrice()" style="padding-left:12px;">
              </div>
            </div>

            <!-- Vehicle & Notes row -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
              <div class="f-grp" style="margin-bottom:0;">
                <label>Phương tiện</label>
                <input type="text" class="f-ctrl" id="ci-vehicle" placeholder="Biển số xe, loại xe...">
              </div>
              <div class="f-grp" style="margin-bottom:0;">
                <label>Ghi chú</label>
                <input type="text" class="f-ctrl" id="ci-notes" placeholder="Ghi chú lưu trú"
                  onblur="pmsCiFormatSentence(this)">
              </div>
            </div>
          </div>
        </div>

        <!-- ❷ Thanh toán -->
        <div class="ci-section">
          <div class="ci-section-header">
            <div class="ci-section-badge green">2</div>
            <h6 class="ci-section-title">Thanh toán</h6>
          </div>
          <div class="ci-section-body">
            <div class="ci-pay-grid">
              <div class="ci-pay-item">
                <label>Loại giá</label>
                <select class="f-ctrl" id="ci-price-type"
                  style="border:none; padding:0; font-size:14px; font-weight:600; color:#1e293b; background:transparent;">
                  <option value="default">Mặc định</option>
                  <option value="promo">Khuyến mãi</option>
                </select>
              </div>
              <div class="ci-pay-item">
                <label>Giá phòng</label>
                <div class="ci-pay-val" id="ci-price">0</div>
              </div>
              <div class="ci-pay-item ci-pay-item--deposit">
                <label>Trả trước (VND)</label>
                <input type="text" class="f-ctrl" id="ci-deposit" value="0" placeholder="0"
                  oninput="pmsCiFormatCurrency(this)"
                  style="border:none; padding:0; font-size:16px; font-weight:700; background:transparent; color:#1e293b;">
              </div>

              <!-- New Row for Prepayment Type -->
              <div class="ci-pay-item">
                <label>Phân loại trả trước</label>
                <select class="f-ctrl" id="ci-deposit-type" onchange="pmsCiOnDepositTypeChange(this)"
                  style="border:none; padding:0; font-size:14px; font-weight:600; color:#1e293b; background:transparent;">
                  <option value="Chi nhánh">Chi nhánh</option>
                  <option value="Công ty">Công ty</option>
                  <option value="OTA">OTA</option>
                  <option value="UNC">UNC</option>
                  <option value="Quẹt thẻ">Quẹt thẻ</option>
                </select>
              </div>

              <!-- Conditional Meta Field -->
              <div class="ci-pay-item" id="ci-deposit-meta-grp" style="grid-column: span 2; display:none;">
                <div id="ci-meta-company" style="display:none;">
                  <label style="font-size:11.5px; font-weight:600; color:#64748b; margin-bottom:4px; display:block;">Tài khoản thụ hưởng</label>
                  <input type="text" class="f-ctrl" id="ci-deposit-beneficiary" placeholder="Nhập số tài khoản/tên tài khoản"
                    style="border:none; padding:0; font-size:14px; font-weight:600; color:#1e293b; background:transparent; width:100%;">
                </div>
                <div id="ci-meta-ota" style="display:none;">
                  <label style="font-size:11.5px; font-weight:600; color:#64748b; margin-bottom:4px; display:block;">Kênh OTA</label>
                  <select class="f-ctrl" id="ci-deposit-ota"
                    style="border:none; padding:0; font-size:14px; font-weight:600; color:#1e293b; background:transparent; width:100%;">
                    <option value="Agoda">Agoda</option>
                    <option value="Booking">Booking</option>
                    <option value="Ctrip">Ctrip</option>
                    <option value="Go2Joy">Go2Joy</option>
                    <option value="Traveloka">Traveloka</option>
                    <option value="Expedia">Expedia</option>
                    <option value="Mytour">Mytour</option>
                    <option value="AirBnB">AirBnB</option>
                  </select>
                </div>
                <div id="ci-meta-unc" style="display:none;">
                  <label style="font-size:11.5px; font-weight:600; color:#64748b; margin-bottom:4px; display:block;">Mã hoá đơn (UNC)</label>
                  <input type="text" class="f-ctrl" id="ci-deposit-invoice" placeholder="Nhập mã UNC"
                    style="border:none; padding:0; font-size:14px; font-weight:600; color:#1e293b; background:transparent; width:100%;">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ❸ Xuất hoá đơn -->
        <div class="ci-section">
          <div class="ci-section-header">
            <div class="ci-section-badge amber">3</div>
            <h6 class="ci-section-title">Xuất hoá đơn</h6>
          </div>
          <div class="ci-section-body" style="padding: 14px 20px;">
            <div class="ci-invoice-toggle" style="margin-bottom:0;">
              <label><input type="radio" name="ci-invoice" value="0" checked onchange="pmsCiToggleInvoice(this)">
                Không xuất</label>
              <label><input type="radio" name="ci-invoice" value="1" onchange="pmsCiToggleInvoice(this)">
                Có xuất hoá đơn</label>
            </div>
            <div id="ci-invoice-fields" style="display:none; margin-top:14px;">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="f-grp" id="ci-grp-tax" style="margin-bottom:0;">
                  <label>Mã số thuế <span class="f-req">*</span></label>
                  <input type="text" class="f-ctrl" id="ci-tax-code" placeholder="Mã số thuế"
                    oninput="pmsCiFormatBasicNumeric(this)">
                </div>
                <div class="f-grp" id="ci-grp-tax-contact" style="margin-bottom:0;">
                  <label>Liên hệ hoá đơn <span class="f-req">*</span></label>
                  <input type="text" class="f-ctrl" id="ci-tax-contact" placeholder="Email hoặc SĐT">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- COLUMN 2: Thông tin khách -->
      <div class="ci-section" style="flex:1.5; display:flex; flex-direction:column; max-height:100%; overflow:hidden;">
        <div class="ci-section-header" style="flex-shrink:0;">
          <div class="ci-section-badge purple">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff"
              stroke-width="2.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <h6 class="ci-section-title">Thông tin khách</h6>
        </div>

        <div style="flex:1; overflow-y:auto; padding:18px 20px 24px;">
          <div id="ci-capacity-warn" class="ci-capacity-warn"></div>

          <!-- Toolbar -->
          <div class="ci-guest-toolbar">
            <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
              <button type="button" class="v-btn primary" onclick="ciAddGuest()" id="ci-add-guest-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                  <circle cx="8.5" cy="7" r="4" />
                  <line x1="20" y1="8" x2="20" y2="14" />
                  <line x1="23" y1="11" x2="17" y2="11" />
                </svg>
                Thêm khách
              </button>
              <button type="button" class="v-btn success" onclick="ciUpdateGuest()" id="ci-update-guest-btn"
                style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                Cập nhật
              </button>
              <button type="button" class="v-btn outline" onclick="ciCancelEdit()" id="ci-cancel-edit-btn"
                style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                Huỷ
              </button>
              <button type="button" class="v-btn outline" onclick="ciRefreshGuestForm()" id="ci-refresh-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <polyline points="23 4 23 10 17 10" />
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                </svg>
                Làm mới
              </button>
              <button type="button" class="v-btn primary" onclick="ciScanCode()" title="F1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <path d="M3 7V5a2 2 0 0 1 2-2h2" />
                  <path d="M17 3h2a2 2 0 0 1 2 2v2" />
                  <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
                  <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
                  <path d="M7 12h10" />
                </svg>
                Quét mã (F1)
              </button>
              <button type="button" class="v-btn outline" id="ci-toggle-list-btn" onclick="ciToggleGuestList()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <line x1="8" y1="6" x2="21" y2="6" />
                  <line x1="8" y1="12" x2="21" y2="12" />
                  <line x1="8" y1="18" x2="21" y2="18" />
                  <line x1="3" y1="6" x2="3.01" y2="6" />
                  <line x1="3" y1="12" x2="3.01" y2="12" />
                  <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                Danh sách khách (<span id="ci-guest-count">0</span>)
              </button>
            </div>
          </div>
          <div id="ci-guest-list-panel" class="ci-guest-list-panel"></div>

          <div class="ci-id-section">
            <div class="f-grid" id="ci-id-grid" style="grid-template-columns: 2fr 1fr 1fr; align-items: flex-end; gap: 16px 20px;">
              <div class="f-grp">
                <label>Số giấy tờ <span class="f-req">*</span></label>
                <div style="display:flex; gap:8px; align-items:center;">
                  <input type="text" class="f-ctrl" id="ci-cccd" placeholder="Nhập số giấy tờ"
                    oninput="pmsCiFormatID(this)"
                    style="flex:1;">
                  <button type="button" onclick="pmsCiSearchOldGuest()" title="Tìm khách cũ"
                    style="padding:8px 12px; background:#fff; border:1px solid #bfdbfe; border-radius:8px; cursor:pointer; color:#2563eb; display:flex; align-items:center; gap:4px; font-size:13px; white-space:nowrap; font-weight:600; transition:all .15s;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2">
                      <circle cx="11" cy="11" r="8" />
                      <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Tìm
                  </button>
                </div>
              </div>
              <div class="f-grp">
                <label>Loại giấy tờ <span class="f-req">*</span></label>
                <select class="f-ctrl" id="ci-id-type"
                  onchange="pmsCiToggleIdFields(this); pmsCiFormatID(document.getElementById('ci-cccd'));">
                  <option value="cccd">CCCD</option>
                  <option value="cmnd">CMND</option>
                  <option value="passport">Passport</option>
                  <option value="visa">Visa</option>
                  <option value="gplx">GPLX</option>
                </select>
              </div>
              <div class="f-grp" id="ci-grp-expire">
                <label>Ngày hết hạn <span class="f-req">*</span></label>
                <input type="date" class="f-ctrl" id="ci-id-expire" onblur="pmsCiCheckIdExpire(this)">
              </div>
            </div>
          </div>

          <!-- Personal Info -->
          <div class="ci-personal-section">
            <div class="f-grp">
              <label>Họ và tên <span class="f-req">*</span></label>
              <input type="text" class="f-ctrl" id="ci-name" placeholder="Họ và tên"
                onblur="pmsCiFormatCapitalize(this)">
            </div>
            <div class="f-grp">
              <label>Giới tính <span class="f-req">*</span></label>
              <select class="f-ctrl" id="ci-gender">
                <option value="">Chọn giới tính</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
              </select>
            </div>
            <div class="f-grp">
              <label>Ngày sinh <span class="f-req">*</span></label>
              <input type="date" class="f-ctrl" id="ci-birth" onblur="pmsCiCheckBirth(this)">
            </div>
            <div class="f-grp">
              <label>Số điện thoại</label>
              <input type="text" class="f-ctrl" id="ci-phone" placeholder="Số điện thoại"
                oninput="pmsCiFormatBasicNumeric(this)">
            </div>
            <div class="f-grp">
              <label>Quốc tịch <span class="f-req">*</span></label>
              <input list="dl-nationality" class="f-ctrl" id="ci-nationality" placeholder="Chọn hoặc gõ Quốc tịch"
                value="VNM - Việt Nam">
              <datalist id="dl-nationality">
                <!-- Populated dynamically from nationalities.js -->
              </datalist>
            </div>
            <div class="f-grp">
              <label>Ghi chú</label>
              <input type="text" class="f-ctrl" id="ci-guest-notes" placeholder="Ghi chú"
                onblur="pmsCiFormatSentence(this)">
            </div>
          </div>

          <!-- Address Section -->
          <div class="ci-address-section">
            <div class="f-grid" style="grid-template-columns: repeat(2, 1fr);">
              <div class="f-grp f-grid-full" id="ci-grp-area" style="margin-bottom:4px;">
                <div class="ci-radio-group" style="display:flex; gap:20px; align-items:center;">
                  <label><input type="radio" name="ci-area" value="new" checked onchange="vnSwitchMode('new');"> Địa bàn mới (2025)</label>
                  <label><input type="radio" name="ci-area" value="old" onchange="vnSwitchMode('old');"> Địa bàn cũ</label>
                </div>
              </div>
              <div class="f-grp" id="ci-grp-province">
                <label id="ci-lbl-province">Tỉnh/Thành phố <span class="f-req">*</span></label>
                <input list="dl-province" class="f-ctrl" id="ci-province" placeholder="Chọn Tỉnh/Thành"
                  data-dl="dl-province"
                  oninput="vnOnProvinceChange(this)" onchange="vnOnProvinceChange(this)"
                  onblur="vnValidateDatalist(this)">
                <datalist id="dl-province"></datalist>
              </div>
              <!-- District: only visible in OLD mode -->
              <div class="f-grp" id="ci-grp-district" style="display:none;">
                <label id="ci-lbl-district">Quận/Huyện <span class="f-req">*</span></label>
                <input list="dl-district" class="f-ctrl" id="ci-district" placeholder="Chọn Quận/Huyện"
                  data-dl="dl-district"
                  oninput="vnOnDistrictChange(this)" onchange="vnOnDistrictChange(this)"
                  onblur="vnValidateDatalist(this)">
                <datalist id="dl-district"></datalist>
              </div>
              <div class="f-grp" id="ci-grp-ward">
                <label id="ci-lbl-ward">Phường/Xã <span class="f-req">*</span></label>
                <input list="dl-ward" class="f-ctrl" id="ci-ward" placeholder="Chọn Phường/Xã"
                  data-dl="dl-ward"
                  oninput="vnOnWardChange(this)" onchange="vnOnWardChange(this)"
                  onblur="vnValidateDatalist(this)">
                <datalist id="dl-ward"></datalist>
              </div>
              <!-- Conversion display: only visible in OLD mode -->
              <div class="f-grp" id="ci-conversion-grp" style="display:none; grid-column: span 2;">
                <div style="background:linear-gradient(135deg,#f0fdf4,#dcfce7); border:1px solid #86efac; border-radius:8px; padding:10px 14px;">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px; color:#15803d; font-weight:600; font-size:12px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    Chuyển đổi sang địa bàn mới:
                  </div>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div>
                      <label style="font-size:11px; color:#64748b; margin-bottom:2px; display:block;">Tỉnh/TP (mới)</label>
                      <input type="text" class="f-ctrl" id="ci-new-province" readonly
                        style="background:#fff; border:1px solid #86efac; color:#15803d; font-weight:600; cursor:default;">
                    </div>
                    <div>
                      <label style="font-size:11px; color:#64748b; margin-bottom:2px; display:block;">Phường/Xã (mới)</label>
                      <input type="text" class="f-ctrl" id="ci-new-ward" readonly
                        style="background:#fff; border:1px solid #86efac; color:#15803d; font-weight:600; cursor:default;">
                    </div>
                  </div>
                </div>
              </div>

              <!-- Address Validation Warning Panel -->
              <div id="ci-addr-warning-panel" style="display:none; margin-bottom:12px;">
                <div style="background:linear-gradient(135deg,#fffbeb,#fef3c7); border:1px solid #fcd34d; border-radius:8px; padding:12px;">
                  <div style="display:flex; align-items:flex-start; gap:8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" style="flex-shrink:0; margin-top:2px;">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                      <line x1="12" y1="9" x2="12" y2="13"></line>
                      <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <div style="flex:1;">
                      <div style="font-weight:600; font-size:12px; color:#92400e; margin-bottom:4px;">Cảnh báo địa chỉ</div>
                      <div id="ci-addr-warning-list" style="font-size:11.5px; color:#a16207; line-height:1.5;"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="f-grp f-grid-full" id="ci-grp-address">
                <label>Địa chỉ chi tiết <span class="f-req">*</span></label>
                <input type="text" class="f-ctrl" id="ci-address" placeholder="Số nhà, ngách, hẻm, đường"
                  onblur="pmsCiFormatCapitalize(this)">
              </div>
              <!-- Progressive Normalization State Badge -->
              <div class="addr-state-badge" id="_addr_state_badge"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
    <div class="v-footer">
      <button class="v-btn outline" onclick="closeModal('ciModal')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
        Đóng
      </button>
      <button class="v-btn success" onclick="submitCI()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
        Nhận phòng
      </button>
    </div>
  </div>
</div>
